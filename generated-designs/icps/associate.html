<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Associate Workflow Graph</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #1a1a1a; }
        .canvas-container { width: 760px; height: 400px; background-color: #2D2D2D; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        @keyframes subtle-pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; filter: brightness(1.2); }
            100% { opacity: 0.8; }
        }
        .node-active { animation: subtle-pulse 3s infinite ease-in-out; }
    </style>
</head>
<body>

    <div class="canvas-container">
        <svg class="svg-canvas" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
                    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur1" />
                        <feMergeNode in="blur2" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
                    <path d="M -2 0 L 2 0 M 0 -2 L 0 2" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" transform="translate(40,40)"/>
                </pattern>
            </defs>

            <!-- Background -->
            <rect width="100%" height="100%" fill="url(#grid)" />
            <circle cx="340" cy="200" r="280" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" fill="none" />
            <circle cx="340" cy="200" r="180" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" fill="none" />
            <circle cx="340" cy="200" r="90" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="2 6" fill="none" />

            <!-- Research Streams (Left) -->
            <g id="research-streams" stroke="#FFFFFF" fill="none" stroke-linejoin="round" stroke-linecap="round">
                <path d="M -20 80 H 160 L 220 140 H 290" stroke-opacity="0.15" stroke-width="1.5" />
                <path d="M -20 136 H 186 L 246 196 H 290" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 20 140 H 190 L 250 200 H 290" stroke-opacity="0.4" stroke-width="2" />
                <path d="M -20 140 H 190 L 250 200 H 290" stroke="#E7E70D" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="3 6" />
                <path d="M -20 144 H 194 L 254 204 H 290" stroke-opacity="0.2" stroke-width="1" />
                <path d="M -20 280 H 170 L 230 220 H 290" stroke-opacity="0.25" stroke-width="1.5" />
                <path d="M 40 340 H 130 L 190 280 H 290" stroke-opacity="0.15" stroke-width="1" />
                <path d="M 160 80 V 140" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 4" />
                <path d="M 120 144 V 280" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 130 340 V 280" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 4" />
                <path d="M 270 150 V 270" stroke-opacity="0.15" stroke-width="2" />
            </g>

            <!-- Output Streams (Right) -->
            <g id="output-streams" stroke="#FFFFFF" fill="none" stroke-linejoin="round" stroke-linecap="round">
                <path d="M 390 192 H 442 L 562 72 H 800" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 390 196 H 446 L 566 76 H 800" stroke-opacity="0.5" stroke-width="1.5" />
                <path d="M 390 200 H 450 L 570 80 H 800" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 390 200 H 800" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="6 4" />
                <path d="M 390 200 H 450 L 570 320 H 800" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 390 204 H 454 L 574 324 H 800" stroke-opacity="0.4" stroke-width="1.5" />
                <path d="M 390 208 H 458 L 578 328 H 800" stroke-opacity="0.2" stroke-width="1" />
                <path d="M 500 76 V 200" stroke-opacity="0.15" stroke-width="1" />
                <path d="M 640 200 V 324" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="2 4" />
            </g>

            <!-- Nodes -->
            <g id="left-nodes">
                <circle cx="60" cy="80" r="3" fill="#FFFFFF" opacity="0.6" />
                <circle cx="90" cy="140" r="2.5" fill="#FFFFFF" opacity="0.8" />
                <circle cx="100" cy="280" r="3" fill="#FFFFFF" opacity="0.4" />
                <circle cx="80" cy="340" r="2" fill="#FFFFFF" opacity="0.9" />
                <circle cx="140" cy="144" r="2" fill="#FFFFFF" />
                <circle cx="120" cy="280" r="2.5" fill="#FFFFFF" />

                <g transform="translate(160, 80) rotate(45)"><rect x="-4" y="-4" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5"/></g>
                <g transform="translate(170, 280) rotate(45)"><rect x="-3" y="-3" width="6" height="6" fill="#FFFFFF" opacity="0.8"/></g>
                <g transform="translate(130, 340) rotate(45)"><rect x="-4" y="-4" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1.5"/></g>

                <rect x="216" y="136" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5" />
                <rect x="226" y="216" width="8" height="8" fill="#2D2D2D" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" />

                <circle cx="190" cy="140" r="3" fill="#E7E70D" />
                <circle cx="270" cy="150" r="2.5" fill="#E7E70D" opacity="0.8"/>
                <circle cx="270" cy="270" r="2.5" fill="#E7E70D" opacity="0.8"/>
                <circle cx="250" cy="200" r="4" fill="#E7E70D" class="node-active" filter="url(#glow)"/>
            </g>

            <g id="right-nodes">
                <circle cx="450" cy="200" r="2" fill="#FFFFFF" />
                <circle cx="500" cy="132" r="2" fill="#FFFFFF" opacity="0.5" />
                <circle cx="570" cy="320" r="3" fill="#FFFFFF" opacity="0.8" />
                <circle cx="680" cy="76" r="2" fill="#FFFFFF" />
                <circle cx="720" cy="200" r="3" fill="#FFFFFF" opacity="0.4" />

                <g transform="translate(620, 60)">
                    <rect x="0" y="0" width="16" height="22" rx="1" fill="#2D2D2D" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1.5" />
                    <line x1="4" y1="6" x2="12" y2="6" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                    <line x1="4" y1="11" x2="10" y2="11" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                    <line x1="4" y1="16" x2="12" y2="16" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                </g>

                <g transform="translate(640, 324) rotate(45)">
                    <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />
                    <rect x="-4" y="-4" width="8" height="8" fill="#FFFFFF" opacity="0.9" />
                </g>

                <circle cx="500" cy="76" r="3" fill="#E7E70D" />
                <circle cx="574" cy="324" r="3" fill="#E7E70D" class="node-active" filter="url(#glow)" />
                <circle cx="640" cy="200" r="4" fill="#E7E70D" />
            </g>

            <!-- Center Hub -->
            <g id="center-hub">
                <line x1="290" y1="130" x2="290" y2="280" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" />
                <line x1="390" y1="180" x2="390" y2="220" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" />
                <rect x="300" y="140" width="80" height="120" rx="4" fill="#2D2D2D" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4" />
                <rect x="310" y="150" width="60" height="100" fill="#2D2D2D" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />
                <path d="M 290 170 H 330 L 340 160 H 370" stroke="#FFFFFF" stroke-opacity="0.3" fill="none" stroke-width="1.5" />
                <path d="M 290 230 H 320 L 330 240 H 370" stroke="#FFFFFF" stroke-opacity="0.3" fill="none" stroke-width="1.5" />
                <path d="M 310 200 H 380" stroke="#E7E70D" stroke-opacity="0.7" stroke-dasharray="2 2" fill="none" stroke-width="2" />
                <rect x="350" y="156" width="12" height="8" fill="none" stroke="#E7E70D" stroke-opacity="0.8" stroke-width="1" />
                <rect x="340" y="236" width="12" height="8" fill="#FFFFFF" opacity="0.3" />

                <g id="apex-node" transform="translate(340, 200)">
                    <polygon points="0,-20 20,0 0,20 -20,0" fill="#1a1a1a" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" />
                    <polygon points="0,-12 12,0 0,12 -12,0" fill="none" stroke="#E7E70D" stroke-width="2" />
                    <circle cx="0" cy="0" r="4" fill="#E7E70D" class="node-active" filter="url(#glow)" />
                    <line x1="-20" y1="0" x2="-26" y2="0" stroke="#FFFFFF" stroke-opacity="0.6"/>
                    <line x1="20" y1="0" x2="26" y2="0" stroke="#FFFFFF" stroke-opacity="0.6"/>
                </g>
            </g>

            <!-- Ambient Particles -->
            <g id="ambient-particles" fill="#FFFFFF">
                <rect x="420" y="100" width="2" height="2" opacity="0.2" />
                <rect x="430" y="100" width="2" height="2" opacity="0.2" />
                <rect x="440" y="100" width="2" height="2" opacity="0.2" />
                <rect x="200" y="310" width="3" height="3" opacity="0.1" />
                <rect x="208" y="310" width="3" height="3" opacity="0.1" />
                <path d="M 680 160 L 690 150 H 710" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
                <circle cx="710" cy="150" r="1.5" fill="#FFFFFF" opacity="0.3" />
            </g>

        </svg>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating Partner Workflow Illustration</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .pulse-yellow {
            animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.8)); }
            50% { filter: drop-shadow(0 0 12px rgba(231, 231, 13, 1)); }
        }

        .flow-line {
            stroke-dasharray: 8 6;
            animation: flow-dash 20s linear infinite;
        }

        .flow-line-fast {
            stroke-dasharray: 4 4;
            animation: flow-dash 10s linear infinite reverse;
        }

        @keyframes flow-dash {
            to { stroke-dashoffset: 200; }
        }

        .rotate-slow {
            transform-origin: center;
            animation: rotate-inf 30s linear infinite;
        }

        .rotate-slow-reverse {
            transform-origin: center;
            animation: rotate-inf 40s linear infinite reverse;
        }

        @keyframes rotate-inf {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div style="width: 760px; height: 400px; overflow: hidden; background-color: #2D2D2D; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-radius: 4px;">

        <svg viewBox="0 0 760 400" width="760" height="400" xmlns="http://www.w3.org/2000/svg">

            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <rect width="40" height="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" />
                    <circle cx="40" cy="40" r="1" fill="rgba(255,255,255,0.1)" />
                </pattern>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <linearGradient id="flowGradY" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#E5E7EB" stop-opacity="0.8" />
                    <stop offset="100%" stop-color="#E5E7EB" stop-opacity="0.2" />
                </linearGradient>
                <g id="diamond-node">
                    <rect x="-6" y="-6" width="12" height="12" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2" transform="rotate(45)" />
                </g>
                <g id="square-node">
                    <rect x="-5" y="-5" width="10" height="10" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2" />
                </g>
                <g id="circle-node">
                    <circle cx="0" cy="0" r="6" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2" />
                </g>
                <g id="yellow-junction">
                    <circle cx="0" cy="0" r="4" fill="#E7E70D" filter="url(#glow)" />
                </g>
            </defs>

            <rect width="100%" height="100%" fill="url(#grid)" />

            <!-- Structural Lines -->
            <g stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" fill="none">
                <line x1="160" y1="0" x2="160" y2="400" />
                <line x1="380" y1="0" x2="380" y2="400" />
                <line x1="600" y1="0" x2="600" y2="400" />
                <line x1="0" y1="360" x2="760" y2="360" />
            </g>

            <!-- Inputs (Left) -->
            <g fill="none">
                <path d="M 0 220 L 80 220 L 120 280 L 220 280" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                <path d="M 0 340 L 100 340 L 160 280" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" />
                <path d="M 40 180 L 100 180 L 160 220 L 220 220" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" class="flow-line" />
            </g>

            <!-- Core Operational Routing -->
            <g fill="none">
                <path d="M 160 280 L 320 280" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
                <path d="M 220 340 L 440 340" stroke="rgba(255, 255, 255, 0.5)" stroke-width="2" class="flow-line-fast" />
                <path d="M 260 220 L 320 220" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                <path d="M 440 280 L 520 280" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
                <path d="M 440 220 L 520 220" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
            </g>

            <!-- Outputs (Right) -->
            <g fill="none">
                <path d="M 520 280 L 600 280 L 640 240 L 760 240" stroke="rgba(255, 255, 255, 0.8)" stroke-width="2" />
                <path d="M 520 220 L 580 220 L 620 180 L 760 180" stroke="rgba(255, 255, 255, 0.7)" stroke-width="1.5" class="flow-line" />
                <path d="M 440 340 L 560 340 L 640 300 L 760 300" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1" />
            </g>

            <!-- Vertical Bridges -->
            <g fill="none" stroke="rgba(255, 255, 255, 0.5)" stroke-width="2">
                <path d="M 160 80 L 160 280" stroke="url(#flowGradY)" />
                <path d="M 380 80 L 380 220" />
                <path d="M 600 80 L 600 280" stroke="url(#flowGradY)" />
                <line x1="280" y1="80" x2="280" y2="280" stroke-width="1" stroke="rgba(255, 255, 255, 0.3)" />
                <line x1="480" y1="80" x2="480" y2="280" stroke-width="1" stroke="rgba(255, 255, 255, 0.3)" />
            </g>

            <!-- Top Strategic Layer -->
            <line x1="60" y1="80" x2="700" y2="80" stroke="rgba(255, 255, 255, 0.9)" stroke-width="2.5" />
            <line x1="120" y1="65" x2="640" y2="65" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" />
            <line x1="160" y1="65" x2="160" y2="80" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1.5" />
            <line x1="380" y1="65" x2="380" y2="80" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1.5" />
            <line x1="600" y1="65" x2="600" y2="80" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1.5" />

            <!-- Center Mechanical Engine -->
            <g transform="translate(380, 280)">
                <g class="rotate-slow">
                    <circle cx="0" cy="0" r="60" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
                    <circle cx="0" cy="0" r="56" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="8 4" />
                    <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6" stroke-dasharray="2 12" />
                </g>
                <circle cx="0" cy="0" r="38" fill="#1A1A1A" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1.5" />
                <g class="rotate-slow-reverse">
                    <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" />
                    <line x1="-28" y1="0" x2="28" y2="0" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                    <line x1="0" y1="-28" x2="0" y2="28" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                    <line x1="-20" y1="-20" x2="20" y2="20" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                    <line x1="-20" y1="20" x2="20" y2="-20" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" />
                    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255, 255, 255, 0.8)" stroke-width="4" stroke-dasharray="4 4" />
                </g>
                <circle cx="0" cy="0" r="12" fill="#2D2D2D" stroke="#E7E70D" stroke-width="3" filter="url(#glow)" />
                <circle cx="0" cy="0" r="4" fill="#FFFFFF" />
                <g transform="translate(-60, -60)">
                    <circle cx="0" cy="0" r="24" fill="#2D2D2D" stroke="rgba(255, 255, 255, 0.5)" stroke-width="1.5" stroke-dasharray="6 3" class="rotate-slow" />
                    <use href="#square-node" x="0" y="0" />
                </g>
                <g transform="translate(60, 60)">
                    <circle cx="0" cy="0" r="20" fill="#2D2D2D" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" stroke-dasharray="4 2" class="rotate-slow-reverse" />
                    <use href="#circle-node" x="0" y="0" />
                </g>
            </g>

            <!-- Strategic Nodes -->
            <use href="#diamond-node" x="160" y="80" />
            <use href="#diamond-node" x="280" y="80" />
            <use href="#diamond-node" x="380" y="80" />
            <use href="#diamond-node" x="480" y="80" />
            <use href="#diamond-node" x="600" y="80" />

            <!-- Input Nodes -->
            <use href="#square-node" x="80" y="220" />
            <use href="#square-node" x="100" y="180" />
            <use href="#square-node" x="100" y="340" />
            <use href="#square-node" x="160" y="280" />

            <!-- Integration Nodes -->
            <use href="#circle-node" x="220" y="280" />
            <use href="#circle-node" x="260" y="220" />
            <use href="#circle-node" x="280" y="220" />
            <use href="#circle-node" x="280" y="280" />
            <use href="#circle-node" x="480" y="280" />
            <use href="#circle-node" x="480" y="220" />
            <use href="#circle-node" x="520" y="280" />

            <!-- Output Nodes -->
            <use href="#diamond-node" x="600" y="280" />
            <use href="#square-node" x="640" y="240" />
            <use href="#circle-node" x="620" y="180" />
            <use href="#square-node" x="640" y="300" />
            <use href="#diamond-node" x="720" y="240" />

            <!-- Yellow Junctions -->
            <g class="pulse-yellow">
                <use href="#yellow-junction" x="160" y="65" />
                <use href="#yellow-junction" x="380" y="65" />
                <use href="#yellow-junction" x="600" y="65" />
                <use href="#yellow-junction" x="120" y="280" />
                <use href="#yellow-junction" x="160" y="220" />
                <use href="#yellow-junction" x="220" y="220" />
                <use href="#yellow-junction" x="320" y="220" />
                <use href="#yellow-junction" x="320" y="280" />
                <use href="#yellow-junction" x="220" y="340" />
                <use href="#yellow-junction" x="440" y="340" />
                <use href="#yellow-junction" x="440" y="280" />
                <use href="#yellow-junction" x="440" y="220" />
                <use href="#yellow-junction" x="580" y="220" />
                <use href="#yellow-junction" x="560" y="340" />
            </g>

            <!-- Frame Markers -->
            <g stroke="rgba(255, 255, 255, 0.3)" stroke-width="1">
                <line x1="20" y1="20" x2="40" y2="20" />
                <line x1="20" y1="20" x2="20" y2="40" />
                <line x1="740" y1="20" x2="720" y2="20" />
                <line x1="740" y1="20" x2="740" y2="40" />
                <line x1="20" y1="380" x2="40" y2="380" />
                <line x1="20" y1="380" x2="20" y2="360" />
                <line x1="740" y1="380" x2="720" y2="380" />
                <line x1="740" y1="380" x2="740" y2="360" />
                <path d="M 60 360 L 60 365 M 100 360 L 100 365 M 140 360 L 140 365 M 180 360 L 180 365 M 620 360 L 620 365 M 660 360 L 660 365 M 700 360 L 700 365" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            </g>
        </svg>

    </div>

</body>
</html>

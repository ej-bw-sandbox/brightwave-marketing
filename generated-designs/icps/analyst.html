<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyst Workflow Structure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow-node {
            filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.6));
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }
        .anim-pulse {
            animation: pulse-slow 4s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
        .flow-line {
            stroke-dasharray: 4 6;
            animation: flow 1.5s linear infinite;
        }
    </style>
</head>
<body>

    <div class="illustration-card">

        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <rect width="20" height="20" fill="none" />
                    <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.08)" />
                    <path d="M 20 0 L 20 20 L 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" />
                </pattern>

                <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
                    <stop offset="60%" stop-color="#2D2D2D" stop-opacity="0" />
                    <stop offset="100%" stop-color="#191919" stop-opacity="0.4" />
                </radialGradient>

                <g id="diamond-node">
                    <polygon points="0,-4 4,0 0,4 -4,0" fill="white" />
                </g>
                <g id="diamond-node-yellow">
                    <polygon points="0,-5 5,0 0,5 -5,0" fill="#E7E70D" class="glow-node" />
                </g>
                <g id="square-outline">
                    <rect x="-3" y="-3" width="6" height="6" fill="#2D2D2D" stroke="rgba(255,255,255,0.7)" stroke-width="1" />
                </g>
                <g id="hollow-circle">
                    <circle cx="0" cy="0" r="3" fill="#2D2D2D" stroke="#E7E70D" stroke-width="1" />
                </g>
            </defs>

            <rect width="100%" height="100%" fill="url(#blueprint-grid)" />

            <!-- STAGE 1: RAW DATA GATHERING (Left Side) -->
            <g stroke="rgba(255,255,255,0.15)" stroke-width="0.5" fill="none">
                <path d="M 40 60 L 80 80 L 120 70 L 160 110" />
                <path d="M 20 100 L 70 120 L 110 90 L 180 140" />
                <path d="M 30 180 L 90 170 L 140 210 L 200 190" />
                <path d="M 50 220 L 100 240 L 150 200 L 220 220" />
                <path d="M 20 280 L 80 310 L 130 270 L 170 330" />
                <path d="M 60 360 L 110 340 L 160 360 L 210 290" />
            </g>

            <g fill="rgba(255,255,255,0.6)">
                <circle cx="40" cy="60" r="1.5" /><circle cx="80" cy="80" r="2" /><circle cx="120" cy="70" r="1" />
                <circle cx="20" cy="100" r="1.5" /><circle cx="70" cy="120" r="1" /><circle cx="110" cy="90" r="2.5" />
                <circle cx="30" cy="180" r="2" /><circle cx="90" cy="170" r="1.5" /><circle cx="140" cy="210" r="2" />
                <circle cx="50" cy="220" r="1" /><circle cx="100" cy="240" r="2.5" /><circle cx="150" cy="200" r="1.5" />
                <circle cx="20" cy="280" r="1.5" /><circle cx="80" cy="310" r="1" /><circle cx="130" cy="270" r="2" />
                <circle cx="60" cy="360" r="2" /><circle cx="110" cy="340" r="1.5" /><circle cx="160" cy="360" r="1" />
                <rect x="65" y="195" width="3" height="3" opacity="0.8" />
                <rect x="180" y="80" width="4" height="4" fill="none" stroke="white" stroke-width="1" />
                <rect x="190" y="320" width="2" height="2" />
            </g>

            <!-- STAGE 2: PIPELINING & FILTERING -->
            <g stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none">
                <path d="M 160 110 L 220 110 L 280 170 L 340 170" />
                <path d="M 180 140 L 230 140 L 270 185 L 340 185" />
                <path d="M 200 190 L 260 190 L 290 200 L 340 200" />
                <path d="M 220 220 L 250 220 L 280 215 L 340 215" stroke-width="1.5" stroke="rgba(255,255,255,0.7)" />
                <path d="M 170 330 L 210 330 L 280 245 L 340 245" />
                <path d="M 210 290 L 250 290 L 290 230 L 340 230" />
            </g>

            <g stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="2 4">
                <line x1="280" y1="120" x2="280" y2="280" />
                <line x1="310" y1="140" x2="310" y2="260" />
            </g>

            <circle cx="220" cy="110" r="2.5" fill="#E7E70D" />
            <circle cx="250" cy="220" r="2.5" fill="#E7E70D" />
            <circle cx="250" cy="290" r="2.5" fill="#E7E70D" />

            <!-- STAGE 3: SPREADSHEET MODELING CORE -->
            <rect x="340" y="150" width="160" height="110" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

            <g stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none">
                <path d="M 340 170 L 400 170 L 400 185 L 500 185" />
                <path d="M 340 200 L 500 200" stroke-width="2" stroke="white" class="flow-line" />
                <path d="M 340 230 L 380 230 L 380 215 L 500 215" />
                <path d="M 340 245 L 440 245 L 440 260 L 500 260" stroke-width="1" stroke="rgba(255,255,255,0.4)" />
            </g>

            <use href="#square-outline" x="370" y="170" />
            <use href="#square-outline" x="400" y="200" />
            <use href="#square-outline" x="430" y="215" />
            <use href="#square-outline" x="460" y="245" />

            <line x1="400" y1="170" x2="400" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <line x1="440" y1="215" x2="440" y2="245" stroke="rgba(255,255,255,0.3)" stroke-width="1" />

            <use href="#diamond-node-yellow" x="400" y="200" class="anim-pulse" />

            <!-- STAGE 4: STRUCTURED ANALYSIS OUTPUTS -->
            <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none">
                <path d="M 500 185 L 540 185 L 540 120 L 620 120" />
                <path d="M 540 150 L 580 150 L 580 80 L 640 80" stroke-width="1" stroke="rgba(255,255,255,0.2)" />
                <path d="M 500 200 L 570 200 L 570 200 L 660 200" stroke="white" stroke-width="2" />
                <path d="M 500 215 L 540 215 L 540 280 L 630 280" />
                <path d="M 500 260 L 560 260 L 560 320 L 610 320" stroke-width="1" stroke="rgba(255,255,255,0.3)" />
            </g>

            <!-- Output 1: Diamond Array -->
            <g transform="translate(620, 120)">
                <line x1="0" y1="0" x2="20" y2="-20" stroke="rgba(255,255,255,0.4)" />
                <line x1="0" y1="0" x2="20" y2="20" stroke="rgba(255,255,255,0.4)" />
                <line x1="20" y1="-20" x2="40" y2="0" stroke="rgba(255,255,255,0.4)" />
                <line x1="20" y1="20" x2="40" y2="0" stroke="rgba(255,255,255,0.4)" />
                <use href="#diamond-node" x="0" y="0" />
                <use href="#diamond-node" x="20" y="-20" />
                <use href="#diamond-node" x="20" y="20" />
                <use href="#diamond-node-yellow" x="40" y="0" />
            </g>

            <!-- Output 2: Final Deliverable Core -->
            <g transform="translate(660, 200)">
                <circle cx="0" cy="0" r="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
                <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
                <rect x="-5" y="-5" width="10" height="10" fill="white" transform="rotate(45)" />
                <circle cx="-25" cy="0" r="2" fill="white" />
                <rect x="23" y="-2" width="4" height="4" fill="white" />
            </g>

            <!-- Output 3: Data Grid -->
            <g transform="translate(610, 270)">
                <rect x="0" y="0" width="60" height="40" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <line x1="0" y1="13" x2="60" y2="13" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <line x1="0" y1="26" x2="60" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <line x1="20" y1="0" x2="20" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <line x1="40" y1="0" x2="40" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <rect x="3" y="3" width="14" height="7" fill="rgba(255,255,255,0.4)" />
                <rect x="23" y="3" width="14" height="7" fill="rgba(255,255,255,0.8)" />
                <rect x="43" y="3" width="14" height="7" fill="rgba(255,255,255,0.2)" />
                <rect x="3" y="16" width="14" height="7" fill="rgba(255,255,255,0.6)" />
                <rect x="23" y="16" width="14" height="7" fill="#E7E70D" />
                <rect x="43" y="16" width="14" height="7" fill="rgba(255,255,255,0.5)" />
                <rect x="3" y="29" width="14" height="7" fill="rgba(255,255,255,0.3)" />
                <rect x="23" y="29" width="14" height="7" fill="rgba(255,255,255,0.2)" />
                <rect x="43" y="29" width="14" height="7" fill="white" />
                <path d="M 0 10 L -20 10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
                <path d="M 0 30 L -50 30" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <use href="#hollow-circle" x="-20" y="10" />
            </g>

            <circle cx="540" cy="120" r="1.5" fill="#E7E70D" />
            <circle cx="580" cy="80" r="1" fill="#E7E70D" opacity="0.6" />
            <circle cx="540" cy="280" r="2" fill="#E7E70D" />

            <rect width="100%" height="100%" fill="url(#vignette)" pointer-events="none" />

        </svg>

    </div>

</body>
</html>

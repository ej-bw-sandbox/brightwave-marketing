<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Workflow Illustration</title>
    <style>
        body {
            background-color: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            overflow: hidden;
        }

        .artwork-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        svg { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="artwork-card">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">

            <defs>
                <filter id="accent-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
                    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur1" />
                        <feMergeNode in="blur2" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <g id="node-hex">
                    <polygon points="0,-7 6,-3.5 6,3.5 0,7 -6,3.5 -6,-3.5" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2.5" stroke-linejoin="round"/>
                </g>
                <g id="node-diamond">
                    <polygon points="0,-7.5 7.5,0 0,7.5 -7.5,0" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2.5" stroke-linejoin="round"/>
                </g>
                <g id="node-square">
                    <rect x="-5.5" y="-5.5" width="11" height="11" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2.5" stroke-linejoin="round"/>
                </g>
                <g id="node-circle">
                    <circle cx="0" cy="0" r="5.5" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2.5"/>
                </g>
                <g id="node-accent">
                    <circle cx="0" cy="0" r="4" fill="#E7E70D" stroke="#2D2D2D" stroke-width="1.5"/>
                </g>
                <g id="node-accent-large">
                    <circle cx="0" cy="0" r="5.5" fill="#E7E70D" stroke="#2D2D2D" stroke-width="1.5" filter="url(#accent-glow)"/>
                </g>
                <g id="crosshair">
                    <line x1="-12" y1="0" x2="-4" y2="0" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                    <line x1="4" y1="0" x2="12" y2="0" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                    <line x1="0" y1="-12" x2="0" y2="-4" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                    <line x1="0" y1="4" x2="0" y2="12" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
                </g>
            </defs>

            <!-- Background Lines -->
            <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
                <line x1="0" y1="100" x2="760" y2="100" />
                <line x1="0" y1="200" x2="760" y2="200" />
                <line x1="0" y1="300" x2="760" y2="300" />
            </g>

            <!-- Momentum Wedges -->
            <polygon points="120,90 280,110 480,140 700,200 480,200 280,200 80,200" fill="#FFFFFF" fill-opacity="0.015" />
            <polygon points="80,200 280,200 480,200 700,200 540,300 480,250 360,340 280,270 180,360 140,290" fill="#E7E70D" fill-opacity="0.008" />
            <polygon points="120,90 700,200 80,200" fill="#FFFFFF" fill-opacity="0.02" />

            <!-- Phase Gates -->
            <g stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 4">
                <line x1="210" y1="30" x2="210" y2="350" />
                <line x1="410" y1="30" x2="410" y2="350" />
                <line x1="610" y1="30" x2="610" y2="350" />
            </g>

            <g fill="#FFFFFF" fill-opacity="0.3">
                <rect x="207" y="20" width="6" height="2" />
                <rect x="207" y="358" width="6" height="2" />
                <rect x="407" y="20" width="6" height="2" fill-opacity="0.5"/>
                <rect x="407" y="358" width="6" height="2" fill-opacity="0.5"/>
                <rect x="607" y="20" width="6" height="2" fill-opacity="0.8"/>
                <rect x="607" y="358" width="6" height="2" fill-opacity="0.8"/>
            </g>

            <!-- Network Lines -->
            <g stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="0.75" fill="none">
                <path d="M 120 90 L 80 200 L 140 290 L 180 360" />
                <path d="M 280 110 L 280 200 L 280 270" stroke-opacity="0.05"/>
                <path d="M 140 290 L 280 200 L 360 340" />
                <path d="M 480 140 L 480 200 L 480 250" stroke-opacity="0.05"/>
                <path d="M 280 270 L 480 200 L 540 300" />
                <path d="M 480 140 L 540 300" />
            </g>

            <!-- Core Paths -->
            <path d="M 180 360 L 360 340 L 540 300 L 700 200" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1" />
            <path d="M 140 290 L 280 270 L 480 250 L 700 200" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1" />
            <path d="M 60 200 L 80 200 L 280 200 L 480 200 L 700 200" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2" />
            <path d="M 120 90 L 280 110 L 480 140 L 700 200" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" />

            <!-- Authority Lines -->
            <g stroke="#E7E70D" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="3 3">
                <line x1="280" y1="110" x2="280" y2="270" />
                <line x1="480" y1="140" x2="480" y2="250" />
            </g>

            <g stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 2">
                <line x1="360" y1="260" x2="360" y2="340" />
                <line x1="540" y1="240" x2="540" y2="300" />
            </g>

            <!-- Energy Sparks -->
            <g stroke="#E7E70D" stroke-width="2" stroke-linecap="round">
                <line x1="160" y1="200" x2="180" y2="200" stroke-opacity="0.9" filter="url(#accent-glow)"/>
                <line x1="350" y1="200" x2="370" y2="200" stroke-opacity="0.9" />
                <line x1="580" y1="200" x2="595" y2="200" stroke-opacity="0.9" />
                <line x1="210" y1="280" x2="220" y2="278" stroke-opacity="0.5" stroke-width="1.5"/>
                <line x1="600" y1="245" x2="615" y2="238" stroke-opacity="0.5" stroke-width="1.5"/>
            </g>

            <!-- Radar Rings -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1">
                <circle cx="120" cy="90" r="14" />
                <circle cx="120" cy="90" r="22" stroke-opacity="0.05" />
            </g>

            <!-- Nodes -->
            <use href="#node-circle" x="180" y="360" opacity="0.6"/>
            <use href="#node-circle" x="360" y="340" opacity="0.8"/>
            <use href="#node-circle" x="540" y="300" />
            <use href="#node-square" x="140" y="290" opacity="0.7"/>
            <use href="#node-square" x="280" y="270" />
            <use href="#node-square" x="480" y="250" />
            <use href="#node-diamond" x="80" y="200" opacity="0.8"/>
            <use href="#node-diamond" x="280" y="200" />
            <use href="#node-diamond" x="480" y="200" />
            <use href="#node-hex" x="120" y="90" />
            <use href="#node-hex" x="280" y="110" />
            <use href="#node-hex" x="480" y="140" />

            <!-- Apex Target -->
            <g transform="translate(700, 200)">
                <circle cx="0" cy="0" r="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
                <circle cx="0" cy="0" r="26" fill="none" stroke="#E7E70D" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 6"/>
                <use href="#crosshair" />
                <use href="#node-diamond" transform="scale(1.5)" />
            </g>

            <!-- Yellow Accents -->
            <use href="#node-accent" x="280" y="110" />
            <use href="#node-accent" x="280" y="200" />
            <use href="#node-accent" x="480" y="250" />
            <use href="#node-accent-large" x="700" y="200" />
            <circle cx="360" cy="340" r="2" fill="#E7E70D" />

            <!-- Progress Pipeline -->
            <g transform="translate(0, 385)">
                <line x1="40" y1="0" x2="720" y2="0" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" />
                <line x1="40" y1="0" x2="350" y2="0" stroke="#E7E70D" stroke-opacity="0.5" stroke-width="2" />
                <circle cx="40" cy="0" r="2" fill="#FFFFFF" opacity="0.3" />
                <circle cx="80" cy="0" r="2.5" fill="#FFFFFF" />
                <rect x="208" y="-3" width="4" height="6" fill="#FFFFFF" fill-opacity="0.5" />
                <circle cx="280" cy="0" r="2.5" fill="#E7E70D" />
                <rect x="408" y="-3" width="4" height="6" fill="#FFFFFF" fill-opacity="0.3" />
                <circle cx="480" cy="0" r="2.5" fill="#FFFFFF" fill-opacity="0.5" />
                <rect x="608" y="-3" width="4" height="6" fill="#FFFFFF" fill-opacity="0.15" />
                <circle cx="700" cy="0" r="3" fill="#FFFFFF" fill-opacity="0.2" />
            </g>

        </svg>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal Workflow Illustration</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        svg {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="illustration-card">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">

            <defs>
                <g id="node-diamond">
                    <polygon points="0,-6 6,0 0,6 -6,0" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                </g>
                <g id="node-diamond-solid">
                    <polygon points="0,-5 5,0 0,5 -5,0" fill="#FFFFFF" />
                </g>
                <g id="node-square">
                    <rect x="-4.5" y="-4.5" width="9" height="9" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                </g>
                <g id="node-square-solid">
                    <rect x="-3.5" y="-3.5" width="7" height="7" fill="#FFFFFF" />
                </g>
                <g id="node-circle">
                    <circle cx="0" cy="0" r="4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                </g>
                <g id="node-circle-solid">
                    <circle cx="0" cy="0" r="3.5" fill="#FFFFFF" />
                </g>
                <g id="accent-dot">
                    <circle cx="0" cy="0" r="2.5" fill="#E7E70D" />
                </g>
                <g id="accent-pulse">
                    <circle cx="0" cy="0" r="6" fill="none" stroke="#E7E70D" stroke-width="0.75" />
                </g>
            </defs>

            <!-- Radar Rings -->
            <path d="M 90 200 m -50 0 a 50 50 0 1 1 100 0 a 50 50 0 1 1 -100 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="2 4" />
            <path d="M 90 200 m -120 0 a 120 120 0 1 1 240 0 a 120 120 0 1 1 -240 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 8" />
            <path d="M 90 200 m -200 0 a 200 200 0 1 1 400 0 a 200 200 0 1 1 -400 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />

            <!-- Scan Beams -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="0.75" stroke-linecap="round">
                <path d="M 90 200 L 260 50 L 320 50" />
                <path d="M 90 200 L 280 120 L 350 120" />
                <path d="M 90 200 L 270 280 L 330 280" />
                <path d="M 90 200 L 240 340 L 290 340" />
                <path d="M 90 200 L 300 200" />
                <line x1="340" y1="30" x2="380" y2="30" stroke-dasharray="1 3" />
                <line x1="360" y1="360" x2="410" y2="360" stroke-dasharray="2 4" />
            </g>

            <!-- Opportunity Nodes -->
            <g transform="translate(260, 50)"><use href="#node-circle" /></g>
            <g transform="translate(320, 50)"><use href="#node-square-solid" /></g>
            <g transform="translate(200, 90)"><use href="#node-diamond" /></g>
            <g transform="translate(280, 120)"><use href="#node-diamond-solid" /><use href="#accent-dot" /></g>
            <g transform="translate(350, 120)"><use href="#node-circle" /></g>
            <g transform="translate(220, 160)"><use href="#node-square" /></g>
            <g transform="translate(260, 240)"><use href="#node-square" /></g>
            <g transform="translate(270, 280)"><use href="#node-circle-solid" /><use href="#accent-dot" /></g>
            <g transform="translate(330, 280)"><use href="#node-diamond" /></g>
            <g transform="translate(240, 340)"><use href="#node-circle" /></g>
            <g transform="translate(290, 340)"><use href="#node-square-solid" /></g>

            <!-- Active Targeting Paths -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1.2" stroke-linecap="square">
                <path d="M 90 200 L 160 120 L 280 120 L 320 160 L 370 160 L 400 200" />
                <path d="M 90 200 L 300 200 L 370 200 L 400 200" />
                <path d="M 90 200 L 180 280 L 270 280 L 330 240 L 380 240 L 400 200" />
            </g>

            <!-- Funnel Guides -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1">
                <path d="M 330 80 L 380 170 L 400 170" />
                <path d="M 310 320 L 360 230 L 400 230" />
                <polyline points="390,165 400,165 400,235 390,235" />
            </g>

            <g transform="translate(320, 160)"><use href="#accent-dot" /></g>
            <g transform="translate(330, 240)"><use href="#accent-dot" /></g>
            <g transform="translate(370, 160)"><use href="#node-square-solid" /></g>
            <g transform="translate(380, 240)"><use href="#node-circle-solid" /></g>

            <!-- Pipeline -->
            <line x1="400" y1="180" x2="680" y2="180" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" />
            <line x1="400" y1="220" x2="680" y2="220" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" />
            <line x1="400" y1="200" x2="670" y2="200" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" stroke-dasharray="6 4" />

            <!-- Pipeline Gates -->
            <g stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1" stroke-linecap="round">
                <line x1="460" y1="170" x2="460" y2="230" />
                <line x1="456" y1="170" x2="464" y2="170" />
                <line x1="456" y1="230" x2="464" y2="230" />
                <line x1="540" y1="165" x2="540" y2="235" />
                <line x1="620" y1="175" x2="620" y2="225" />
                <line x1="616" y1="200" x2="624" y2="200" />
            </g>

            <!-- Pipeline Nodes -->
            <g transform="translate(400, 200)"><use href="#node-diamond-solid" /><use href="#accent-pulse" /><use href="#accent-dot" /></g>
            <g transform="translate(500, 200)">
                <rect x="-7" y="-7" width="14" height="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1" />
                <use href="#node-square-solid" />
                <use href="#accent-dot" />
            </g>
            <g transform="translate(580, 200)">
                <circle cx="0" cy="0" r="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="2 2" />
                <use href="#node-circle-solid" />
            </g>
            <g transform="translate(670, 200)">
                <polygon points="0,-12 10,-5 10,5 0,12 -10,5 -10,-5" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                <polygon points="0,-8 7,-3.5 7,3.5 0,8 -7,3.5 -7,-3.5" fill="#2D2D2D" />
                <polygon points="0,-5 4,-2 4,2 0,5 -4,2 -4,-2" fill="#FFFFFF" />
                <use href="#accent-dot" />
                <use href="#accent-pulse" />
                <line x1="15" y1="0" x2="25" y2="0" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1" />
                <line x1="11" y1="-11" x2="18" y2="-18" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1" />
                <line x1="11" y1="11" x2="18" y2="18" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1" />
            </g>

            <!-- Team Coordination (Lower) -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" stroke-linejoin="miter">
                <path d="M 460 230 L 460 290 L 420 290 L 420 330" />
                <path d="M 460 290 L 520 290 L 520 330" />
                <path d="M 520 290 L 580 290 L 580 320" />
                <path d="M 500 200 L 500 260 L 550 260 L 550 310" />
                <path d="M 540 235 L 540 275 L 630 275 L 630 330" />
                <path d="M 630 275 L 670 275 L 670 310" />
            </g>

            <g transform="translate(460, 290)"><use href="#accent-dot" /></g>
            <g transform="translate(520, 290)"><use href="#node-square" /></g>
            <g transform="translate(540, 275)"><use href="#accent-dot" /></g>
            <g transform="translate(630, 275)"><use href="#node-diamond-solid" /><use href="#accent-dot" /></g>
            <g transform="translate(420, 330)"><use href="#node-circle-solid" /></g>
            <g transform="translate(520, 330)"><use href="#node-square-solid" /></g>
            <g transform="translate(550, 310)"><use href="#node-circle" /></g>
            <g transform="translate(580, 320)"><use href="#node-diamond" /></g>
            <g transform="translate(630, 330)"><use href="#node-circle-solid" /></g>
            <g transform="translate(670, 310)"><use href="#node-square" /></g>

            <!-- Team Coordination (Upper) -->
            <g fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" stroke-linejoin="miter" stroke-dasharray="3 3">
                <path d="M 460 170 L 460 110 L 510 110 L 510 70" />
                <path d="M 460 110 L 430 110 L 430 80" />
                <path d="M 540 165 L 540 130 L 600 130 L 600 90" />
                <path d="M 600 130 L 650 130 L 650 100" />
            </g>

            <g transform="translate(460, 110)"><use href="#accent-dot" /></g>
            <g transform="translate(600, 130)"><use href="#accent-dot" /></g>
            <g transform="translate(430, 80)"><use href="#node-square" /></g>
            <g transform="translate(510, 70)"><use href="#node-diamond" /></g>
            <g transform="translate(600, 90)"><use href="#node-circle-solid" /></g>
            <g transform="translate(650, 100)"><use href="#node-square-solid" /></g>

            <!-- Focal Point -->
            <g transform="translate(90, 200)">
                <path d="M -15 -10 L -20 -10 L -20 10 L -15 10" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" />
                <path d="M 15 -10 L 20 -10 L 20 10 L 15 10" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" />
                <circle cx="0" cy="0" r="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="1 2" />
                <polygon points="0,-10 10,0 0,10 -10,0" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="2" />
                <circle cx="0" cy="0" r="4" fill="#E7E70D" />
                <circle cx="0" cy="0" r="8" fill="none" stroke="#E7E70D" stroke-width="1" stroke-opacity="0.5" />
            </g>

            <!-- Background Grid -->
            <g stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1">
                <line x1="90" y1="0" x2="90" y2="400" stroke-dasharray="4 4" />
                <line x1="400" y1="0" x2="400" y2="400" stroke-dasharray="4 4" />
                <line x1="670" y1="0" x2="670" y2="400" stroke-dasharray="4 4" />
            </g>

        </svg>
    </div>

</body>
</html>

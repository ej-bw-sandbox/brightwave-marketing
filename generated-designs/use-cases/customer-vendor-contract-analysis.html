<!--
  aesthetic_dna: Minimalist Technical Schematic / Blueprint Geometric
  ui_paradigm: Fixed-Canvas Vector Illustration (Abstract Data Visualization)
  palette: Charcoal (#2D2D2D), Signal Yellow (#E7E70D), Optic White (#FFFFFF)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Analysis Architecture</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #111111; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }
        .active-node {
            animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            transform-origin: center;
        }
        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
        .data-stream {
            stroke-dasharray: 4 6;
            animation: flow 2s linear infinite;
        }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;box-shadow:0 20px 50px rgba(0,0,0,0.5);overflow:hidden;border:1px solid rgba(255,255,255,0.05);border-radius:2px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" style="position:absolute;inset:0;display:block;">
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
            </defs>
            <g id="guide-matrix" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="1 3" fill="none">
                <circle cx="380" cy="140" r="120" stroke-width="0.25" opacity="0.5" />
                <circle cx="380" cy="260" r="80" stroke-width="0.25" opacity="0.5" />
                <line x1="380" y1="0" x2="380" y2="400" stroke-width="0.5" stroke-dasharray="4 8" />
            </g>
            <g id="contract-alpha">
                <rect x="40" y="40" width="140" height="320" fill="none" stroke="#555555" stroke-width="1" stroke-dasharray="6 6" rx="4" />
                <g fill="#444444">
                    <rect x="60" y="60" width="35" height="2" rx="1"/>
                    <rect x="60" y="66" width="20" height="2" rx="1"/>
                    <rect x="60" y="140" width="45" height="2" rx="1"/>
                    <rect x="60" y="146" width="30" height="2" rx="1"/>
                    <rect x="60" y="240" width="25" height="2" rx="1"/>
                    <rect x="60" y="310" width="40" height="2" rx="1"/>
                </g>
                <line x1="110" y1="40" x2="110" y2="360" stroke="#777777" stroke-width="1.5" />
                <line x1="150" y1="80" x2="150" y2="320" stroke="#777777" stroke-width="1" />
                <line x1="110" y1="100" x2="150" y2="100" stroke="#AAAAAA" stroke-width="1" />
                <line x1="110" y1="160" x2="150" y2="160" stroke="#AAAAAA" stroke-width="1" />
                <line x1="110" y1="220" x2="150" y2="220" stroke="#AAAAAA" stroke-width="1" />
                <line x1="110" y1="280" x2="150" y2="280" stroke="#AAAAAA" stroke-width="1" />
                <rect x="107" y="97" width="6" height="6" fill="#FFFFFF" />
                <polygon points="150,96 154,100 150,104 146,100" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" />
                <polygon points="110,157 113,158.5 113,161.5 110,163 107,161.5 107,158.5" fill="#FFFFFF" />
                <circle cx="150" cy="160" r="3" fill="#FFFFFF" />

                <circle cx="110" cy="280" r="3" fill="#FFFFFF" />
                <polygon points="150,276 154,280 150,284 146,280" fill="#FFFFFF" />
            </g>
            <g id="contract-beta">
                <rect x="580" y="40" width="140" height="320" fill="none" stroke="#555555" stroke-width="1" stroke-dasharray="6 6" rx="4" />
                <g fill="#444444">
                    <rect x="655" y="70" width="40" height="2" rx="1"/>
                    <rect x="655" y="76" width="25" height="2" rx="1"/>
                    <rect x="655" y="150" width="30" height="2" rx="1"/>
                    <rect x="655" y="220" width="45" height="2" rx="1"/>
                    <rect x="655" y="226" width="20" height="2" rx="1"/>
                    <rect x="655" y="300" width="35" height="2" rx="1"/>
                </g>
                <line x1="650" y1="40" x2="650" y2="360" stroke="#777777" stroke-width="1.5" />
                <line x1="610" y1="80" x2="610" y2="320" stroke="#777777" stroke-width="1" />
                <line x1="650" y1="110" x2="610" y2="110" stroke="#AAAAAA" stroke-width="1" />
                <line x1="650" y1="180" x2="610" y2="180" stroke="#AAAAAA" stroke-width="1" />
                <line x1="650" y1="240" x2="610" y2="240" stroke="#AAAAAA" stroke-width="1" />
                <line x1="650" y1="290" x2="610" y2="290" stroke="#AAAAAA" stroke-width="1" />
                <polygon points="650,106 654,110 650,114 646,110" fill="#FFFFFF" />
                <circle cx="610" cy="110" r="3.5" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" />
                <circle cx="650" cy="180" r="3" fill="#FFFFFF" />
                <rect x="607" y="177" width="6" height="6" fill="#FFFFFF" />
                <rect x="647" y="237" width="6" height="6" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" />

                <polygon points="650,286 654,290 650,294 646,290" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" />
                <circle cx="610" cy="290" r="3" fill="#FFFFFF" />
            </g>
            <g id="logic-vectors" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="3 4">
                <line x1="270" y1="50" x2="270" y2="350" />
                <line x1="490" y1="50" x2="490" y2="350" />
                <rect x="330" y="90" width="100" height="220" stroke="#444444" stroke-width="0.5" stroke-dasharray="1 2" />
            </g>
            <polygon points="380,95 425,118 425,162 380,185 335,162 335,118" fill="none" stroke="#888888" stroke-width="1.5" />
            <polygon points="380,215 425,238 425,282 380,305 335,282 335,238" fill="none" stroke="#888888" stroke-width="1.5" />
            <line x1="380" y1="185" x2="380" y2="215" stroke="#FFFFFF" stroke-width="2" />

            <g id="primary-circuits" fill="none" stroke="#D4D4D4" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="square">
                <path d="M150,100 L240,100 L270,118 L335,118 L380,140" class="data-stream" stroke="#A3A3A3" stroke-width="1" />
                <path d="M150,100 L240,100 L270,118 L335,118 L380,140" />
                <path d="M610,110 L460,110 L425,128 L380,140" />
                <path d="M150,280 L335,280 L380,260" />
                <path d="M610,290 L460,290 L425,272 L380,260" />
                <path d="M150,160 L240,160 L270,130 L270,50 L490,50 L490,180 L520,240 L610,240" />
                <path d="M610,180 L540,180 L490,230 L490,350 L270,350 L240,320 L150,320" />
            </g>
            <g id="logic-nodes">
                <circle cx="270" cy="50" r="2.5" fill="#E7E70D" filter="url(#soft-glow)"/>
                <circle cx="490" cy="50" r="2.5" fill="#E7E70D" filter="url(#soft-glow)"/>
                <circle cx="490" cy="350" r="2.5" fill="#E7E70D" filter="url(#soft-glow)"/>
                <circle cx="270" cy="350" r="2.5" fill="#E7E70D" filter="url(#soft-glow)"/>
                <rect x="238.5" y="98.5" width="3" height="3" fill="#FFFFFF" />
                <rect x="268.5" y="116.5" width="3" height="3" fill="#FFFFFF" />
                <rect x="458.5" y="108.5" width="3" height="3" fill="#FFFFFF" />
                <rect x="518.5" y="238.5" width="3" height="3" fill="#FFFFFF" />
                <rect x="538.5" y="178.5" width="3" height="3" fill="#FFFFFF" />
                <rect x="238.5" y="318.5" width="3" height="3" fill="#FFFFFF" />
                <g id="analysis-match" transform="translate(380, 140)">
                    <circle cx="0" cy="0" r="18" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="2 3" class="active-node"/>
                    <circle cx="0" cy="0" r="12" fill="none" stroke="#555555" stroke-width="1"/>
                    <polygon points="0,-10 10,0 0,10 -10,0" fill="#E7E70D" opacity="0.2" filter="url(#neon-glow)" />
                    <polygon points="0,-7 7,0 0,7 -7,0" fill="#E7E70D" />
                    <circle cx="0" cy="0" r="2" fill="#2D2D2D" />
                </g>
                <g id="analysis-conflict" transform="translate(380, 260)">
                    <rect x="-16" y="-16" width="32" height="32" fill="none" stroke="#555555" stroke-width="0.5" stroke-dasharray="1 4" />
                    <polygon points="0,-12 12,0 0,12 -12,0" fill="none" stroke="#FFFFFF" stroke-width="2" />
                    <circle cx="-3" cy="0" r="4" fill="#E7E70D" filter="url(#soft-glow)" />
                    <circle cx="4" cy="0" r="2" fill="#FFFFFF" />
                </g>
            </g>
        </svg>
    </div>
</body>
</html>

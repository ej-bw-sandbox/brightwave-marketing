<!-- aesthetic_dna: minimalist_geometric | ui_paradigm: abstract_data_visualization | palette: dark_charcoal_white_yellow -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Research Analytical Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .canvas-container {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.02); }
        }
        @keyframes radar-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes node-flash {
            0%, 95%, 100% { fill: #FFFFFF; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            97% { fill: #E7E70D; filter: drop-shadow(0 0 8px rgba(231,231,13,0.8)); }
        }
        .animate-core {
            transform-origin: 380px 200px;
            animation: subtle-pulse 4s ease-in-out infinite;
        }
        .animate-radar {
            transform-origin: 380px 200px;
            animation: radar-sweep 24s linear infinite;
        }
        .flash-1 { animation: node-flash 6s infinite 1s; }
        .flash-2 { animation: node-flash 7s infinite 3s; }
        .flash-3 { animation: node-flash 5s infinite 2s; }
    </style>
</head>
<body>
    <div class="canvas-container">
        <svg viewBox="0 0 760 400" width="760" height="400" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
            <defs>
                <linearGradient id="radarSweepGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
                </linearGradient>
                <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#E7E70D" stop-opacity="0.2" />
                    <stop offset="100%" stop-color="#E7E70D" stop-opacity="0" />
                </radialGradient>
                <g id="node-hex"><polygon points="0,-7 6,-3.5 6,3.5 0,7 -6,3.5 -6,-3.5" fill="#ffffff" /></g>
                <g id="node-square"><rect x="-5" y="-5" width="10" height="10" fill="#ffffff" /></g>
                <g id="node-diamond"><polygon points="0,-7 7,0 0,7 -7,0" fill="#ffffff" /></g>
                <g id="node-circle"><circle r="5" fill="#ffffff" /></g>
                <g id="accent-dot">
                    <circle r="3.5" fill="#E7E70D" />
                    <circle r="8" fill="#E7E70D" opacity="0.3" />
                </g>
            </defs>
            <g stroke-width="1" fill="none">
                <circle cx="380" cy="200" r="380" stroke="#3A3A3A" stroke-dasharray="4 12" />
                <circle cx="380" cy="200" r="300" stroke="#444444" stroke-dasharray="2 6" />
                <circle cx="380" cy="200" r="220" stroke="#555555" stroke-dasharray="1 4" />
                <circle cx="380" cy="200" r="150" stroke="#666666" opacity="0.7" />
                <circle cx="380" cy="200" r="90" stroke="#777777" stroke-dasharray="8 4" />
                <circle cx="380" cy="200" r="45" stroke="#999999" stroke-width="1.5" />
            </g>
            <g stroke="#404040" stroke-width="1" stroke-dasharray="3 5">
                <line x1="380" y1="-20" x2="380" y2="420" />
                <line x1="-20" y1="200" x2="780" y2="200" />
                <line x1="-20" y1="200" x2="780" y2="200" transform="rotate(30 380 200)" />
                <line x1="-20" y1="200" x2="780" y2="200" transform="rotate(60 380 200)" />
                <line x1="-20" y1="200" x2="780" y2="200" transform="rotate(120 380 200)" />
                <line x1="-20" y1="200" x2="780" y2="200" transform="rotate(150 380 200)" />
            </g>
            <g class="animate-radar">
                <path d="M 380,200 L 730,200 A 350,350 0 0,0 627,-47 Z" fill="url(#radarSweepGrad)" />
                <line x1="380" y1="200" x2="627" y2="-47" stroke="#ffffff" stroke-width="1" opacity="0.3" />
            </g>
            <path d="M 230,200 A 150,150 0 0,1 380,50" fill="none" stroke="#E7E70D" stroke-width="2" opacity="0.4" />
            <path d="M 380,290 A 90,90 0 0,0 470,200" fill="none" stroke="#E7E70D" stroke-width="2" opacity="0.6" stroke-dasharray="4 4" />
            <path d="M 160,200 A 220,220 0 0,0 224,355" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" />
            <g fill="none" stroke="#A0A0A0" stroke-width="1.5" stroke-linejoin="round">
                <path d="M 50,50 L 130,50 L 210,130 L 290,130 L 360,200" opacity="0.8" />
                <path d="M 130,50 L 130,15 L 170,15" stroke-width="1" opacity="0.5" />
                <path d="M 210,130 L 210,170 L 250,170" stroke-width="1" opacity="0.6" />
                <path d="M 40,340 L 120,340 L 180,280 L 260,280 L 340,200" opacity="0.75" />
                <path d="M 260,280 L 260,350 L 300,350" stroke-width="1" opacity="0.5" />
                <path d="M 120,340 L 120,380 L 80,380" stroke-width="1" opacity="0.4" />
                <path d="M 710,40 L 610,40 L 510,140 L 440,140 L 380,200" opacity="0.85" />
                <path d="M 510,140 L 510,70 L 470,70" stroke-width="1" opacity="0.5" />
                <path d="M 720,350 L 650,350 L 550,250 L 450,250 L 400,200" stroke="#DDDDDD" opacity="0.9" />
                <path d="M 650,350 L 650,380" stroke-width="1" opacity="0.5" />
                <path d="M 550,250 L 550,180 L 600,180" stroke-width="1" opacity="0.7" />
                <path d="M 450,250 L 450,300 L 410,300" stroke-width="1" opacity="0.6" />
                <path d="M 290,130 L 290,70 L 250,70" stroke="#555555" stroke-width="1" stroke-dasharray="2 2" />
                <path d="M 440,140 L 440,200 L 500,200" stroke="#555555" stroke-width="1" stroke-dasharray="2 2" />
            </g>
            <g opacity="0.25">
                <use href="#node-circle" x="110" y="90" />
                <use href="#node-square" x="660" y="110" />
                <use href="#node-diamond" x="610" y="310" />
                <use href="#node-hex" x="160" y="330" />
                <use href="#node-circle" x="320" y="40" />
                <use href="#node-square" x="430" y="360" />
                <use href="#node-diamond" x="40" y="180" />
                <use href="#node-hex" x="720" y="190" />
            </g>
            <use href="#node-square" x="50" y="50" class="flash-1" />
            <use href="#node-hex" x="170" y="15" />
            <use href="#node-circle" x="250" y="170" />
            <use href="#node-diamond" x="290" y="130" />
            <use href="#node-circle" x="40" y="340" />
            <use href="#node-diamond" x="180" y="280" class="flash-2" />
            <use href="#node-square" x="300" y="350" />
            <use href="#node-hex" x="80" y="380" />
            <use href="#node-diamond" x="710" y="40" />
            <use href="#node-square" x="510" y="140" />
            <use href="#node-circle" x="440" y="140" class="flash-3" />
            <use href="#node-hex" x="470" y="70" />
            <use href="#node-hex" x="720" y="350" />
            <use href="#node-square" x="650" y="380" />
            <use href="#node-diamond" x="550" y="250" />
            <use href="#node-circle" x="600" y="180" />
            <use href="#node-square" x="410" y="300" />
            <use href="#accent-dot" x="130" y="50" />
            <use href="#accent-dot" x="210" y="130" />
            <use href="#accent-dot" x="120" y="340" />
            <use href="#accent-dot" x="260" y="280" />
            <use href="#accent-dot" x="610" y="40" />
            <use href="#accent-dot" x="650" y="350" />
            <use href="#accent-dot" x="450" y="250" />
            <g class="animate-core">
                <circle cx="380" cy="200" r="50" fill="url(#hubGlow)" />
                <circle cx="380" cy="200" r="28" fill="#2D2D2D" stroke="#E7E70D" stroke-width="1.5" />
                <circle cx="380" cy="200" r="22" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="2 2" />
                <g fill="none" stroke="#A0A0A0" stroke-width="1" transform="rotate(15 380 200)">
                    <rect x="364" y="184" width="32" height="32" />
                </g>
                <polygon points="380,183 394.7,191.5 394.7,208.5 380,217 365.3,208.5 365.3,191.5" fill="#ffffff" />
                <circle cx="380" cy="200" r="7" fill="#2D2D2D" />
                <circle cx="380" cy="200" r="3" fill="#E7E70D" />
            </g>
            <g stroke="#555555" stroke-width="2" fill="none">
                <polyline points="20,40 20,20 40,20" />
                <polyline points="20,360 20,380 40,380" />
                <polyline points="740,40 740,20 720,20" />
                <polyline points="740,360 740,380 720,380" />
            </g>
        </svg>
    </div>
</body>
</html>

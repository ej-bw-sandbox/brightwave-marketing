<!-- aesthetic_dna: Technical Minimalism / Geometric Drafting, palette: Charcoal (#2D2D2D), White, Yellow (#E7E70D) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Memo Drafting - Illustration</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .illustration-container {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .node-pulse {
            transform-origin: center;
            animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .flow-line {
            stroke-dasharray: 4 6;
            animation: flow-dash 20s linear infinite;
        }
        @keyframes flow-dash {
            to { stroke-dashoffset: -100; }
        }
    </style>
</head>
<body>
    <div class="illustration-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
            <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.1)" />
                </pattern>
                <g id="accent-junction">
                    <circle cx="0" cy="0" r="5" fill="rgba(231, 231, 13, 0.2)" class="node-pulse" />
                    <circle cx="0" cy="0" r="2.5" fill="#E7E70D" />
                </g>
                <g id="node-circle">
                    <circle cx="0" cy="0" r="16" stroke="#ffffff" stroke-width="1.5" fill="#2D2D2D" />
                    <circle cx="0" cy="0" r="8" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none" stroke-dasharray="2 2" />
                    <circle cx="0" cy="0" r="2" fill="#ffffff" />
                </g>
                <g id="node-diamond">
                    <polygon points="0,-16 16,0 0,16 -16,0" stroke="#ffffff" stroke-width="1.5" fill="#2D2D2D" />
                    <polygon points="0,-8 8,0 0,8 -8,0" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none" />
                </g>
                <g id="node-hexagon">
                    <polygon points="-10,-17.32 10,-17.32 20,0 10,17.32 -10,17.32 -20,0" stroke="#ffffff" stroke-width="1.5" fill="#2D2D2D" />
                    <circle cx="0" cy="0" r="4" fill="none" stroke="#ffffff" stroke-width="1" />
                </g>
                <g id="node-square">
                    <rect x="-14" y="-14" width="28" height="28" stroke="#ffffff" stroke-width="1.5" fill="#2D2D2D" />
                    <line x1="-14" y1="-14" x2="14" y2="14" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                    <line x1="-14" y1="14" x2="14" y2="-14" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                </g>
            </defs>
            <rect width="100%" height="100%" fill="#2D2D2D" />
            <rect width="100%" height="100%" fill="url(#grid)" />
            <path d="M 20 20 L 40 20 M 20 20 L 20 40" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none" />
            <path d="M 740 20 L 720 20 M 740 20 L 740 40" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none" />
            <path d="M 20 380 L 40 380 M 20 380 L 20 360" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none" />
            <path d="M 740 380 L 720 380 M 740 380 L 740 360" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none" />
            <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
                <line x1="220" y1="0" x2="220" y2="400" />
                <line x1="360" y1="0" x2="360" y2="400" />
                <line x1="460" y1="0" x2="460" y2="400" />
                <line x1="0" y1="200" x2="760" y2="200" />
            </g>
            <rect x="525" y="55" width="190" height="290" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2 4" />
            <rect x="510" y="40" width="190" height="320" fill="#212121" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" />
            <rect x="525" y="55" width="160" height="290" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
            <rect x="535" y="70" width="140" height="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.5)" stroke-width="1" />
            <rect x="545" y="80" width="10" height="10" fill="#ffffff" />
            <line x1="565" y1="85" x2="660" y2="85" stroke="#ffffff" stroke-width="2" />
            <line x1="535" y1="115" x2="675" y2="115" stroke="rgba(231, 231, 13, 0.4)" stroke-width="1" stroke-dasharray="2 2" />
            <g stroke="#ffffff" stroke-width="1.5" opacity="0.8">
                <line x1="535" y1="135" x2="675" y2="135" />
                <line x1="535" y1="150" x2="660" y2="150" />
                <line x1="535" y1="165" x2="675" y2="165" />
                <line x1="535" y1="180" x2="620" y2="180" />
            </g>
            <g transform="translate(535, 210)">
                <rect x="0" y="0" width="65" height="65" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
                <line x1="0" y1="21.6" x2="65" y2="21.6" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <line x1="0" y1="43.3" x2="65" y2="43.3" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <rect x="10" y="30" width="10" height="35" fill="rgba(255,255,255,0.7)" />
                <rect x="27.5" y="15" width="10" height="50" fill="#ffffff" />
                <rect x="45" y="40" width="10" height="25" fill="rgba(255,255,255,0.3)" />
            </g>
            <g transform="translate(610, 210)">
                <rect x="0" y="0" width="65" height="65" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
                <line x1="32.5" y1="0" x2="32.5" y2="65" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <line x1="0" y1="32.5" x2="65" y2="32.5" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <circle cx="32.5" cy="32.5" r="16" fill="none" stroke="#E7E70D" stroke-width="2" />
                <path d="M 32.5 32.5 L 32.5 16 A 16 16 0 0 1 48.5 32.5 Z" fill="rgba(231, 231, 13, 0.4)" />
                <circle cx="10" cy="10" r="1" fill="#fff" /> <circle cx="20" cy="10" r="1" fill="#fff" />
                <circle cx="10" cy="20" r="1" fill="#fff" /> <circle cx="20" cy="20" r="1" fill="#fff" />
            </g>
            <rect x="535" y="295" width="40" height="4" fill="rgba(255,255,255,0.2)" />
            <rect x="655" y="295" width="20" height="4" fill="rgba(255,255,255,0.2)" />
            <g fill="none">
                <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
                    <path d="M 116 80 L 220 80 L 220 85 L 535 85" />
                    <path class="flow-line" d="M 220 85 L 535 85" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" />
                </g>
                <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
                    <path d="M 140 180 L 360 180 L 360 135 L 535 135" />
                </g>
                <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
                    <path d="M 116 280 L 280 280 L 280 242.5 L 535 242.5" />
                    <path d="M 280 280 L 460 280 L 460 300 L 567.5 300 L 567.5 275" stroke="rgba(255,255,255,0.2)" />
                </g>
                <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
                    <path d="M 174 340 L 460 340 L 460 242.5 L 610 242.5" />
                    <path class="flow-line" d="M 460 340 L 460 242.5 L 610 242.5" stroke="#E7E70D" stroke-width="1" opacity="0.6"/>
                </g>
                <g stroke="rgba(255,255,255,0.1)" stroke-width="0.5">
                    <path d="M 100 180 L 100 360 L 700 360 L 700 320" />
                    <path d="M 220 160 L 400 160 L 400 120" />
                    <path d="M 360 250 L 360 300 L 410 300" />
                </g>
            </g>
            <use href="#node-circle" x="100" y="80" />
            <use href="#node-hexagon" x="120" y="180" />
            <use href="#node-diamond" x="100" y="280" />
            <use href="#node-square" x="160" y="340" />
            <circle cx="80" cy="140" r="3" fill="rgba(255,255,255,0.4)" />
            <circle cx="150" cy="240" r="2" fill="rgba(255,255,255,0.6)" />
            <circle cx="90" cy="360" r="4" fill="none" stroke="rgba(255,255,255,0.3)" />
            <use href="#accent-junction" x="220" y="80" />
            <use href="#accent-junction" x="220" y="85" />
            <use href="#accent-junction" x="535" y="85" />
            <use href="#accent-junction" x="360" y="180" />
            <use href="#accent-junction" x="360" y="135" />
            <use href="#accent-junction" x="535" y="135" />
            <use href="#accent-junction" x="280" y="280" />
            <use href="#accent-junction" x="280" y="242.5" />
            <use href="#accent-junction" x="535" y="242.5" />
            <use href="#accent-junction" x="460" y="300" />
            <use href="#accent-junction" x="460" y="340" />
            <use href="#accent-junction" x="460" y="242.5" />
            <use href="#accent-junction" x="610" y="242.5" />
        </svg>
    </div>
</body>
</html>

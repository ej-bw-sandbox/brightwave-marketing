<!-- aesthetic_dna: minimalist_geometric_network, ui_paradigm: pure_illustration_card, palette: charcoal_white_yellow -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Review Materials Synthesis</title>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes flow-dash {
            to { stroke-dashoffset: -24; }
        }
        .data-flow {
            stroke-dasharray: 4 8;
            animation: flow-dash 1.5s linear infinite;
        }
        .pulse-node {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        body {
            margin: 0;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>

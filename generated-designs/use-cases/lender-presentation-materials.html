<!-- aesthetic_dna: Modern Technical / Minimalist Geometric, palette: Charcoal (#2D2D2D), White, Yellow (#E7E70D) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lender Presentation Data Flow</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .illustration-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        svg {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="slideShadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
                </filter>
                <polygon id="hex" points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5" fill="#2D2D2D" stroke="#ffffff" stroke-width="1.5"/>
                <polygon id="diamond" points="0,-9 9,0 0,9 -9,0" fill="#2D2D2D" stroke="#ffffff" stroke-width="1.5"/>
                <rect id="square" x="-7" y="-7" width="14" height="14" fill="#2D2D2D" stroke="#ffffff" stroke-width="1.5"/>
                <circle id="circle-hollow" cx="0" cy="0" r="7" fill="#2D2D2D" stroke="#ffffff" stroke-width="1.5"/>
                <circle id="circle-solid" cx="0" cy="0" r="4.5" fill="#ffffff"/>
                <circle id="dot-yellow" cx="0" cy="0" r="3.5" fill="#E7E70D"/>
                <polyline id="chevron" points="-4,-3 0,0 -4,3" fill="none" stroke="#E7E70D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </defs>
            <g stroke="rgba(255, 255, 255, 0.12)" stroke-width="1" fill="none">
                <line x1="60" y1="100" x2="130" y2="70" />
                <line x1="130" y1="70" x2="200" y2="110" />
                <line x1="60" y1="100" x2="80" y2="180" />
                <line x1="80" y1="180" x2="150" y2="210" />
                <line x1="200" y1="110" x2="150" y2="210" />
                <line x1="150" y1="210" x2="220" y2="250" />
                <line x1="80" y1="180" x2="90" y2="300" />
                <line x1="90" y1="300" x2="170" y2="340" />
                <line x1="220" y1="250" x2="170" y2="340" />
            </g>
            <g stroke="rgba(255, 255, 255, 0.35)" stroke-width="1.5" fill="none" stroke-linejoin="round">
                <path d="M 130 70 L 150 70 L 250 170 L 450 170 L 510 110 L 540 110" />
                <path d="M 200 110 L 230 110 L 310 190 L 450 190 L 460 190 L 470 180 L 540 180" />
                <path d="M 150 210 L 450 210 L 460 210 L 470 220 L 540 220" />
                <path d="M 220 250 L 240 250 L 260 230 L 450 230 L 490 230 L 530 270 L 540 270" />
                <path d="M 170 340 L 250 340 L 330 260 L 450 260 L 490 260 L 530 300 L 540 300" />
            </g>
            <g stroke-width="2" fill="none" stroke-linecap="round">
                <line x1="270" y1="170" x2="285" y2="170" stroke="#ffffff" opacity="0.8"/>
                <line x1="410" y1="170" x2="415" y2="170" stroke="#E7E70D" />
                <line x1="330" y1="190" x2="345" y2="190" stroke="#ffffff" opacity="0.8"/>
                <line x1="200" y1="210" x2="210" y2="210" stroke="#E7E70D" />
                <line x1="370" y1="210" x2="390" y2="210" stroke="#ffffff" opacity="0.8"/>
                <line x1="290" y1="230" x2="305" y2="230" stroke="#ffffff" opacity="0.8"/>
                <line x1="420" y1="230" x2="425" y2="230" stroke="#E7E70D" />
                <line x1="360" y1="260" x2="375" y2="260" stroke="#ffffff" opacity="0.8"/>
            </g>
            <use href="#diamond" x="60" y="100" />
            <use href="#square" x="130" y="70" />
            <use href="#circle-solid" x="200" y="110" />
            <use href="#hex" x="80" y="180" />
            <use href="#circle-hollow" x="150" y="210" />
            <use href="#square" x="220" y="250" />
            <use href="#diamond" x="90" y="300" />
            <use href="#hex" x="170" y="340" />
            <use href="#dot-yellow" x="250" y="170" />
            <use href="#dot-yellow" x="310" y="190" />
            <use href="#dot-yellow" x="260" y="230" />
            <use href="#dot-yellow" x="330" y="260" />
            <use href="#dot-yellow" x="510" y="110" />
            <use href="#dot-yellow" x="470" y="180" />
            <use href="#dot-yellow" x="470" y="220" />
            <use href="#dot-yellow" x="530" y="270" />
            <use href="#chevron" x="540" y="110" />
            <use href="#chevron" x="540" y="180" />
            <use href="#chevron" x="540" y="220" />
            <use href="#chevron" x="540" y="270" />
            <use href="#chevron" x="540" y="300" />
            <g filter="url(#slideShadow)">
                <rect x="546" y="65" width="164" height="80" rx="4" fill="#2D2D2D" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5" />
                <g opacity="0.9">
                    <rect x="560" y="78" width="50" height="6" fill="#ffffff" />
                    <rect x="560" y="93" width="10" height="10" fill="none" stroke="#E7E70D" stroke-width="1.5" />
                    <line x1="578" y1="98" x2="680" y2="98" stroke="#ffffff" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
                    <rect x="560" y="111" width="10" height="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
                    <line x1="578" y1="116" x2="650" y2="116" stroke="#ffffff" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
                    <rect x="560" y="129" width="10" height="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
                    <line x1="578" y1="134" x2="665" y2="134" stroke="#ffffff" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
                </g>
                <rect x="546" y="160" width="164" height="85" rx="4" fill="#2D2D2D" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5" />
                <g opacity="0.9">
                    <line x1="565" y1="175" x2="565" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
                    <line x1="565" y1="230" x2="690" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
                    <rect x="580" y="210" width="14" height="20" fill="#ffffff" opacity="0.2" />
                    <rect x="604" y="190" width="14" height="40" fill="#ffffff" opacity="0.5" />
                    <rect x="628" y="180" width="14" height="50" fill="#E7E70D" />
                    <rect x="652" y="200" width="14" height="30" fill="#ffffff" opacity="0.2" />
                    <polyline points="587,205 611,180 635,170 659,190" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
                    <circle cx="635" cy="170" r="3" fill="#ffffff" />
                </g>
                <rect x="546" y="260" width="164" height="80" rx="4" fill="#2D2D2D" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5" />
                <g opacity="0.9">
                    <rect x="560" y="275" width="62" height="28" rx="2" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />
                    <circle cx="572" cy="289" r="3" fill="#E7E70D" />
                    <line x1="582" y1="289" x2="610" y2="289" stroke="#ffffff" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
                    <rect x="632" y="275" width="62" height="28" rx="2" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />
                    <circle cx="644" cy="289" r="3" fill="#ffffff" opacity="0.6"/>
                    <line x1="654" y1="289" x2="682" y2="289" stroke="#ffffff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
                    <rect x="560" y="313" width="134" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />
                    <line x1="565" y1="320" x2="630" y2="320" stroke="#ffffff" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
                </g>
            </g>
        </svg>
    </div>
</body>
</html>

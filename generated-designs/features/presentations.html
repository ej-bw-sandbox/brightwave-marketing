<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations</title>
    <style>
        body { min-height: 100vh; background: #111111; display: flex; align-items: center; justify-content: center; margin: 0; }
        .data-flow-anim { stroke-dasharray: 6 12; animation: flowData 3s linear infinite; }
        .data-flow-fast { stroke-dasharray: 4 8; animation: flowData 1.5s linear infinite; }
        @keyframes flowData { from { stroke-dashoffset: 36; } to { stroke-dashoffset: 0; } }
        @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.4)); transform: scale(1); } 50% { filter: drop-shadow(0 0 10px rgba(231, 231, 13, 0.8)); transform: scale(1.05); } }
        .accent-node { transform-origin: center; transform-box: fill-box; animation: pulseGlow 4s ease-in-out infinite; }
        .glass-panel { fill: #222222; fill-opacity: 0.95; stroke-width: 1.5; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;overflow:hidden;border-radius:6px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);">
        <div style="position:absolute;inset:0;background:linear-gradient(to top right, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.05));pointer-events:none;"></div>
        <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="techGrid" width="30" height="30" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="30" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1" stroke-dasharray="2 4"/><line x1="0" y1="0" x2="0" y2="30" stroke="rgba(255,255,255,0.03)" stroke-width="1" stroke-dasharray="2 4"/><circle cx="0" cy="0" r="0.5" fill="rgba(255,255,255,0.1)" /></pattern>
                <filter id="accentGlow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
            </defs>
            <rect width="1000" height="600" x="-100" y="-100" fill="url(#techGrid)" />
            <g transform="skewY(-6) translate(0, 40)">
                <path d="M-20 280 L780 280" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <path d="M-20 200 L780 200" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <path d="M300 -100 L300 500" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <path d="M500 -100 L500 500" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <!-- Slide 3 connections -->
                <path d="M420 220 L480 220" stroke="#ABABAB" stroke-width="1.5" fill="none" class="data-flow-anim"/>
                <path d="M440 260 L480 260" stroke="#ABABAB" stroke-width="1.5" fill="none" />
                <path d="M420 200 L460 200 L460 180 L480 180" stroke="#555555" stroke-width="1" fill="none" />
                <!-- Slide 3 -->
                <g transform="translate(480, 160)">
                    <rect x="0" y="0" width="220" height="140" rx="4" class="glass-panel" stroke="#444444" />
                    <line x1="20" y1="25" x2="200" y2="25" stroke="#E5E7EB" stroke-width="2" />
                    <line x1="20" y1="35" x2="160" y2="35" stroke="#6B7280" stroke-width="1" />
                    <circle cx="20" cy="25" r="4" fill="#E7E70D" filter="url(#accentGlow)" class="accent-node" />
                    <rect x="20" y="55" width="80" height="65" rx="2" fill="#1A1A1A" stroke="#555555" stroke-width="1" stroke-dasharray="4 2" />
                    <path d="M 30 110 L 50 80 L 65 95 L 90 65 L 90 110 Z" fill="#2A2A2A" />
                    <circle cx="75" cy="70" r="3" fill="#666666" />
                    <line x1="115" y1="65" x2="200" y2="65" stroke="#FFFFFF" stroke-width="2" />
                    <line x1="115" y1="80" x2="185" y2="80" stroke="#888888" stroke-width="1.5" />
                    <line x1="115" y1="95" x2="170" y2="95" stroke="#888888" stroke-width="1.5" />
                    <line x1="115" y1="110" x2="190" y2="110" stroke="#888888" stroke-width="1.5" />
                </g>
                <!-- Slide 2 connections -->
                <path d="M 240 160 L 260 160 L 260 180 L 280 180" stroke="#ABABAB" stroke-width="1.5" fill="none" class="data-flow-anim"/>
                <path d="M 240 200 L 280 200" stroke="#FFFFFF" stroke-width="2" fill="none" />
                <path d="M 240 240 L 250 240 L 250 260 L 280 260" stroke="#555555" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
                <circle cx="260" cy="160" r="2" fill="#E7E70D" />
                <!-- Slide 2 -->
                <g transform="translate(280, 140)">
                    <rect x="0" y="0" width="220" height="140" rx="4" class="glass-panel" stroke="#5C5C5C" />
                    <line x1="0" y1="60" x2="220" y2="60" stroke="#444444" stroke-width="1" stroke-dasharray="4 4" />
                    <line x1="110" y1="0" x2="110" y2="140" stroke="#444444" stroke-width="1" stroke-dasharray="4 4" />
                    <path d="M 20 40 L 40 40 L 40 20 L 55 20" stroke="#AAAAAA" stroke-width="1.5" fill="none" />
                    <path d="M 40 40 L 40 60 L 55 60" stroke="#AAAAAA" stroke-width="1.5" fill="none" />
                    <path d="M 40 40 L 70 40" stroke="#FFFFFF" stroke-width="2" fill="none" />
                    <rect x="55" y="17" width="20" height="6" fill="#333333" stroke="#888888" stroke-width="1" />
                    <rect x="55" y="57" width="25" height="6" fill="#333333" stroke="#888888" stroke-width="1" />
                    <polygon points="70,36 74,40 70,44 66,40" fill="#E7E70D" />
                    <rect x="130" y="25" width="60" height="8" fill="#555555" rx="1" />
                    <rect x="130" y="45" width="45" height="8" fill="#777777" rx="1" />
                    <rect x="130" y="65" width="75" height="8" fill="#AAAAAA" rx="1" />
                    <line x1="125" y1="20" x2="125" y2="80" stroke="#666666" stroke-width="1.5" />
                    <circle cx="80" cy="110" r="5" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                    <circle cx="140" cy="110" r="5" fill="#FFFFFF" />
                    <line x1="85" y1="110" x2="135" y2="110" stroke="#666666" stroke-width="1" />
                    <line x1="85" y1="110" x2="135" y2="110" stroke="#FFFFFF" stroke-width="2" class="data-flow-fast" />
                </g>
                <!-- Input trunk -->
                <path d="M-20 180 L 30 180 L 50 160 C 60 150, 70 150, 80 150" stroke="#666666" stroke-width="1" fill="none" />
                <path d="M-20 220 L 40 220 L 50 200 L 80 200" stroke="#888888" stroke-width="1.5" fill="none" />
                <path d="M-20 260 L 60 260 L 60 240 L 80 240" stroke="#555555" stroke-width="1" fill="none" />
                <path d="M-20 200 L 20 200 C 40 200, 40 180, 80 180" stroke="#FFFFFF" stroke-width="2" fill="none" class="data-flow-anim" />
                <circle cx="30" cy="180" r="3" fill="#E7E70D" />
                <!-- Slide 1 -->
                <g transform="translate(80, 120)">
                    <rect x="0" y="0" width="220" height="140" rx="4" class="glass-panel" stroke="#8E8E8E" />
                    <path d="M 30 60 L 80 40 L 120 70 L 160 30 L 190 80 L 150 110 Z" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />
                    <path d="M 80 40 L 80 100 L 150 110" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />
                    <path d="M 30 60 L 80 100" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />
                    <rect x="25" y="55" width="10" height="10" fill="#E7E70D" filter="url(#accentGlow)" class="accent-node" />
                    <circle cx="80" cy="40" r="4" fill="#FFFFFF" />
                    <rect x="116" y="66" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                    <circle cx="160" cy="30" r="3" fill="#AAAAAA" />
                    <polygon points="190,75 195,80 190,85 185,80" fill="#FFFFFF" />
                    <circle cx="150" cy="110" r="4" fill="#E7E70D" />
                    <rect x="76" y="96" width="8" height="8" fill="#888888" />
                    <line x1="190" y1="80" x2="220" y2="80" stroke="#FFFFFF" stroke-width="2" class="data-flow-anim" />
                    <line x1="150" y1="110" x2="220" y2="110" stroke="#E7E70D" stroke-width="1.5" />
                </g>
            </g>
        </svg>
    </div>
</body>
</html>

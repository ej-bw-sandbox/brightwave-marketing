<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifacts</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        @keyframes flowData { 0% { stroke-dashoffset: 200; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0; } }
        @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 6px rgba(231, 231, 13, 0.4)); opacity: 0.8; transform: scale(1); } 50% { filter: drop-shadow(0 0 12px rgba(231, 231, 13, 0.9)); opacity: 1; transform: scale(1.15); } }
        @keyframes floatSlow { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
        @keyframes floatMedium { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        @keyframes floatFast { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-3px) rotate(0.5deg); } }
        .animate-data-stream { stroke-dasharray: 12 188; animation: flowData 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .animate-data-stream-delayed { stroke-dasharray: 15 185; animation: flowData 5s cubic-bezier(0.4, 0, 0.2, 1) infinite; animation-delay: 2s; }
        .pulse-junction { transform-origin: center; transform-box: fill-box; animation: pulseGlow 3s ease-in-out infinite; }
        .pulse-junction:nth-child(even) { animation-delay: 1.5s; }
        .layer-1 { animation: floatSlow 8s ease-in-out infinite; transform-origin: center; }
        .layer-2 { animation: floatMedium 10s ease-in-out infinite; transform-origin: center; animation-delay: 1s; }
        .layer-3 { animation: floatFast 6s ease-in-out infinite; transform-origin: center; animation-delay: 2s; }
        svg { shape-rendering: geometricPrecision; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);border-radius:8px;flex-shrink:0;">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;">
            <defs>
                <pattern id="structural-grid" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="15" cy="15" r="0.5" fill="rgba(255,255,255,0.05)" /><path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/></pattern>
                <filter id="doc-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/></filter>
                <filter id="inner-glow"><feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/><feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/><feFlood flood-color="#ffffff" flood-opacity="0.15"/><feComposite in2="shadowDiff" operator="in"/><feComposite in2="SourceGraphic" operator="over"/></filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#structural-grid)" />
            <g fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linejoin="round">
                <path d="M -20 280 L 120 280 L 160 320 L 780 320" />
                <path d="M 680 -20 L 680 180 L 620 240 L 620 420" />
                <path d="M 120 -20 L 120 60 L 220 60" />
                <path d="M 440 420 L 440 380 L 320 260 L 320 200" />
            </g>
            <g class="layer-1" filter="url(#doc-shadow)">
                <rect x="480" y="40" width="220" height="150" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#inner-glow)"/>
                <rect x="500" y="60" width="120" height="8" rx="2" fill="rgba(255,255,255,0.08)" />
                <rect x="500" y="85" width="180" height="4" rx="2" fill="rgba(255,255,255,0.04)" />
                <rect x="500" y="97" width="150" height="4" rx="2" fill="rgba(255,255,255,0.04)" />
                <rect x="500" y="119" width="80" height="40" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-dasharray="2 3"/>
            </g>
            <g class="layer-2" filter="url(#doc-shadow)">
                <rect x="220" y="90" width="340" height="240" rx="10" fill="rgba(26,26,26,0.8)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#inner-glow)"/>
                <path d="M 220 120 L 560 120" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
                <circle cx="235" cy="105" r="3" fill="rgba(255,255,255,0.2)" />
                <circle cx="247" cy="105" r="3" fill="rgba(255,255,255,0.2)" />
                <rect x="250" y="140" width="280" height="110" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" />
                <path d="M 290 170 L 340 220 L 400 170 L 480 200" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <circle cx="290" cy="170" r="4" fill="#2D2D2D" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" />
                <rect x="336" y="216" width="8" height="8" fill="#2D2D2D" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" transform="rotate(45 340 220)"/>
                <polygon points="400,165 405,170 400,175 395,170" fill="#ffffff" />
                <rect x="250" y="270" width="220" height="6" rx="3" fill="rgba(255,255,255,0.07)" />
                <rect x="250" y="286" width="160" height="6" rx="3" fill="rgba(255,255,255,0.05)" />
                <rect x="250" y="302" width="190" height="6" rx="3" fill="rgba(255,255,255,0.03)" />
            </g>
            <g class="layer-3" filter="url(#doc-shadow)">
                <rect x="60" y="160" width="140" height="120" rx="8" fill="rgba(45,45,45,0.95)" stroke="rgba(255,255,255,0.25)" stroke-width="1" filter="url(#inner-glow)"/>
                <path d="M 80 240 Q 100 240 110 210 T 140 230 T 180 180" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
                <rect x="80" y="250" width="15" height="12" rx="2" fill="rgba(255,255,255,0.15)" />
                <rect x="100" y="244" width="15" height="18" rx="2" fill="rgba(255,255,255,0.3)" />
                <rect x="120" y="254" width="15" height="8" rx="2" fill="rgba(255,255,255,0.1)" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linejoin="round">
                <path d="M 200 200 L 235 200 L 250 185 L 250 170" />
                <path d="M 500 180 L 530 180 L 530 130 L 480 130" />
                <path d="M 280 -20 L 280 60 L 360 60 L 360 90" />
            </g>
            <g fill="none" stroke="#E7E70D" stroke-width="2" stroke-linecap="round">
                <path d="M 200 200 L 235 200 L 250 185 L 250 170" class="animate-data-stream" />
                <path d="M 500 180 L 530 180 L 530 130 L 480 130" class="animate-data-stream-delayed" />
                <path d="M 280 -20 L 280 60 L 360 60 L 360 90" class="animate-data-stream" style="animation-duration: 3.5s;" />
                <path d="M -20 280 L 120 280 L 160 320 L 780 320" stroke="rgba(255,255,255,0.8)" class="animate-data-stream-delayed" style="animation-duration: 6s;" />
            </g>
            <g fill="#ffffff">
                <rect x="231" y="196" width="8" height="8" />
                <rect x="116" y="276" width="8" height="8" />
                <rect x="526" y="126" width="8" height="8" />
                <rect x="356" y="56" width="8" height="8" transform="rotate(45 360 60)" />
                <rect x="156" y="316" width="8" height="8" transform="rotate(45 160 320)" />
                <polygon points="620,234 626,237.5 626,244.5 620,248 614,244.5 614,237.5" fill="none" stroke="#fff" stroke-width="1.5"/>
                <circle cx="620" cy="241" r="1.5"/>
                <polygon points="320,254 326,257.5 326,264.5 320,268 314,264.5 314,257.5" fill="none" stroke="#fff" stroke-width="1.5"/>
                <circle cx="280" cy="60" r="3" />
                <circle cx="220" cy="60" r="3" />
                <circle cx="680" cy="180" r="3" />
            </g>
            <g fill="#E7E70D">
                <circle cx="200" cy="200" r="4.5" class="pulse-junction" />
                <circle cx="250" cy="170" r="4.5" class="pulse-junction" />
                <circle cx="360" cy="90" r="4.5" class="pulse-junction" />
                <circle cx="500" cy="180" r="4.5" class="pulse-junction" />
                <circle cx="480" cy="130" r="4.5" class="pulse-junction" />
                <circle cx="680" cy="320" r="4.5" class="pulse-junction" />
                <circle cx="480" cy="200" r="4.5" class="pulse-junction" />
            </g>
        </svg>
    </div>
</body>
</html>

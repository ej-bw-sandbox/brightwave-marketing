<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Extraction & Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .illustration-card { width: 760px; height: 400px; background-color: #2D2D2D; overflow: hidden; position: relative; }
        .bg-tech-grid { position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 20px 20px; z-index: 1; }
        .crosshair { position: absolute; width: 10px; height: 10px; z-index: 2; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background-color: rgba(255,255,255,0.2); }
        .crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
        .crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .flow-line { stroke-dasharray: 4 6; animation: flow 20s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -200; } }
        .text-line { height: 2px; background-color: rgba(255,255,255,0.15); border-radius: 1px; }
    </style>
</head>
<body class="bg-[#111] min-h-screen flex items-center justify-center p-8 antialiased">
    <div class="illustration-card rounded-xl border border-white/10 isolate">
        <div class="bg-tech-grid"></div>
        <div class="crosshair top-8 left-8"></div>
        <div class="crosshair top-8 right-8"></div>
        <div class="crosshair bottom-8 left-8"></div>
        <div class="crosshair bottom-8 right-8"></div>
        <div class="absolute top-[20%] left-[10%] w-[150px] h-[150px] border border-white/5 rounded-full z-[1]"></div>
        <svg class="absolute inset-0 w-full h-full z-10" pointer-events="none">
            <defs>
                <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                    <stop offset="10%" stop-color="rgba(255,255,255,0.1)" />
                    <stop offset="90%" stop-color="rgba(255,255,255,0.3)" />
                    <stop offset="100%" stop-color="rgba(231,231,13,0.8)" />
                </linearGradient>
                <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.05)" />
                    <stop offset="100%" stop-color="rgba(255,255,255,0.2)" />
                </linearGradient>
            </defs>
            <path d="M 120 70 C 250 70, 300 150, 420 150" fill="none" stroke="url(#lineGrad2)" stroke-width="1" class="flow-line" />
            <path d="M 160 300 C 250 300, 320 220, 420 220" fill="none" stroke="url(#lineGrad2)" stroke-width="1" class="flow-line" />
            <path d="M 180 100 C 280 100, 320 155, 430 155" fill="none" stroke="url(#lineGrad1)" stroke-width="1.5" />
            <path d="M 120 180 C 240 180, 280 210, 430 210" fill="none" stroke="url(#lineGrad1)" stroke-width="1.5" />
            <path d="M 140 280 C 260 280, 300 265, 430 265" fill="none" stroke="url(#lineGrad1)" stroke-width="1.5" />
        </svg>
        <div class="absolute inset-y-0 left-0 w-[40%] z-20">
            <div class="absolute top-[50px] left-[60px] w-[140px] h-[100px] bg-white/[0.03] border border-white/10 rounded-sm -rotate-[4deg] p-3 flex flex-col gap-2">
                <div class="w-full text-line"></div>
                <div class="relative w-[60%] h-4 border border-[#E7E70D]/40 bg-[#E7E70D]/10 mt-1 flex items-center px-1">
                    <div class="w-2 h-2 rounded-sm bg-[#E7E70D] shadow-[0_0_8px_rgba(231,231,13,0.6)]"></div>
                    <div class="ml-2 w-full h-[2px] bg-[#E7E70D]/50"></div>
                </div>
                <div class="w-[80%] text-line mt-1"></div>
                <div class="w-[40%] text-line"></div>
            </div>
            <div class="absolute top-[160px] left-[30px] w-[90px] h-[120px] bg-white/[0.02] border border-white/5 rounded-sm p-3 flex flex-col justify-end gap-1.5 opacity-80 rotate-[2deg]">
                <div class="w-[70%] text-line"></div>
                <div class="w-full text-line"></div>
                <div class="relative w-full h-3 border border-[#E7E70D]/30 flex items-center justify-end px-1 my-1">
                    <div class="w-1.5 h-1.5 rounded-sm bg-[#E7E70D] shadow-[0_0_8px_rgba(231,231,13,0.6)]"></div>
                </div>
                <div class="w-[50%] text-line"></div>
            </div>
            <div class="absolute bottom-[60px] left-[80px] w-[160px] h-[80px] bg-white/[0.04] border border-white/10 rounded-sm p-3 flex flex-col gap-2 -rotate-[1deg]">
                <div class="w-[90%] text-line opacity-50"></div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-sm bg-[#E7E70D] shadow-[0_0_12px_rgba(231,231,13,0.8)] ring-2 ring-[#E7E70D]/20"></div>
                    <div class="flex-1 h-3 border-y border-dashed border-[#E7E70D]/40 bg-[#E7E70D]/5"></div>
                </div>
                <div class="w-full text-line mt-auto opacity-50"></div>
            </div>
        </div>
        <div class="absolute inset-y-0 right-10 w-[55%] z-20 flex items-center">
            <div class="w-full bg-[#2A2A2A]/80 border border-white/10 rounded-lg p-5 relative overflow-hidden">
                <div class="absolute right-0 top-1/2 -translate-y-1/2 w-64 h-64 bg-[#E7E70D]/[0.02] blur-3xl rounded-full pointer-events-none"></div>
                <div class="grid grid-cols-[10%,25%,20%,20%,25%] gap-3 pb-3 border-b border-white/10 mb-3 items-center">
                    <div class="w-3 h-3 border border-white/20 mx-auto"></div>
                    <div class="h-1.5 w-12 bg-white/20 rounded-full"></div>
                    <div class="h-1.5 w-8 bg-white/20 rounded-full"></div>
                    <div class="h-1.5 w-10 bg-white/20 rounded-full"></div>
                    <div class="h-1.5 w-14 bg-white/20 rounded-full"></div>
                </div>
                <div class="grid grid-cols-[10%,25%,20%,20%,25%] gap-3 py-2.5 items-center border-b border-white/[0.04]">
                    <div class="w-1 h-1 bg-white/30 rounded-full mx-auto"></div>
                    <div class="h-3 w-full bg-white/[0.07] rounded-sm relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-[80%] bg-white/[0.15]"></div></div>
                    <div class="h-3 w-[60%] bg-white/[0.15] rounded-sm"></div>
                    <div class="h-3 w-[70%] bg-white/[0.1] border border-white/10 rounded-sm"></div>
                    <div class="h-3 w-[90%] bg-white/[0.08] rounded-sm"></div>
                </div>
                <div class="grid grid-cols-[10%,25%,20%,20%,25%] gap-3 py-2.5 items-center bg-white/[0.02] border-b border-white/[0.04] -mx-5 px-5 relative">
                    <div class="absolute left-0 top-1/2 w-3 h-px bg-[#E7E70D]"></div>
                    <div class="w-1.5 h-1.5 bg-white/50 rounded-full mx-auto"></div>
                    <div class="h-3 w-full bg-white/[0.1] rounded-sm"></div>
                    <div class="flex items-center gap-2 w-full h-5 bg-[#E7E70D]/10 border border-[#E7E70D]/30 rounded-sm px-1.5 relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-0.5 bg-[#E7E70D]"></div>
                        <div class="w-2.5 h-2.5 rounded-[1px] bg-[#E7E70D] shadow-[0_0_8px_rgba(231,231,13,0.5)]"></div>
                        <div class="flex-1 h-1.5 bg-[#E7E70D]/80 rounded-sm"></div>
                    </div>
                    <div class="h-3 w-[85%] bg-white/[0.15] rounded-sm"></div>
                    <div class="h-3 w-[60%] bg-white/[0.2] border border-white/20 rounded-sm"></div>
                </div>
                <div class="grid grid-cols-[10%,25%,20%,20%,25%] gap-3 py-2.5 items-center border-b border-white/[0.04] relative">
                    <div class="w-1 h-1 bg-white/30 rounded-full mx-auto"></div>
                    <div class="h-3 w-[80%] bg-white/[0.15] rounded-sm"></div>
                    <div class="h-3 w-[40%] bg-white/[0.1] rounded-sm"></div>
                    <div class="flex items-center gap-1.5 h-4 w-[90%] border-b border-[#E7E70D]">
                        <div class="w-2 h-2 rounded-sm bg-[#E7E70D]"></div>
                        <div class="flex-1 h-1.5 bg-white/[0.3] rounded-sm"></div>
                    </div>
                    <div class="h-3 w-[75%] bg-white/[0.08] rounded-sm relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-[50%] bg-white/[0.2]"></div></div>
                </div>
                <div class="grid grid-cols-[10%,25%,20%,20%,25%] gap-3 py-2.5 items-center relative">
                    <div class="w-1 h-1 bg-white/30 rounded-full mx-auto"></div>
                    <div class="h-5 w-full bg-[#333] border border-[#E7E70D]/40 rounded-sm flex items-center justify-between px-2">
                         <div class="h-1.5 w-[40%] bg-white/40 rounded-sm"></div>
                         <div class="w-[4px] h-[4px] bg-[#E7E70D] rounded-full shadow-[0_0_5px_rgba(231,231,13,0.8)]"></div>
                    </div>
                    <div class="h-3 w-full bg-white/[0.1] rounded-sm"></div>
                    <div class="h-3 w-[60%] bg-white/[0.08] rounded-sm"></div>
                    <div class="h-3 w-[85%] bg-white/[0.15] rounded-sm"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

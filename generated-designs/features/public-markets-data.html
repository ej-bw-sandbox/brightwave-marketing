<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Markets Data</title>
    <style>
        body { background-color: #111111; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 2rem; }
        @keyframes flow-down { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
        @keyframes flow-up { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.4)); transform: scale(1); } 50% { filter: drop-shadow(0 0 12px rgba(231, 231, 13, 0.8)); transform: scale(1.1); } }
        .data-stream-down { stroke-dasharray: 4 6; animation: flow-down 1s linear infinite; }
        .data-stream-up { stroke-dasharray: 2 4; animation: flow-up 0.8s linear infinite; }
        .node-pulse { transform-origin: center; animation: pulse-glow 3s ease-in-out infinite; transform-box: fill-box; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div style="width:760px;height:400px;background:#2D2D2D;position:relative;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);overflow:hidden;">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1" /><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" /></linearGradient>
                <linearGradient id="fadeTop" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" /><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" /></linearGradient>
                <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.03" /></pattern>
                <g id="node-square"><rect x="-4" y="-4" width="8" height="8" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" /></g>
                <g id="node-diamond"><polygon points="0,-4.5 4.5,0 0,4.5 -4.5,0" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" /></g>
                <g id="node-circle-solid"><circle cx="0" cy="0" r="3.5" fill="#FFFFFF" /></g>
                <g id="node-circle-hollow"><circle cx="0" cy="0" r="4.5" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5" /></g>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotGrid)" />
            <!-- Volume histogram -->
            <g opacity="0.08">
                <rect x="40" y="360" width="8" height="40" fill="#FFFFFF" /><rect x="52" y="345" width="8" height="55" fill="#FFFFFF" />
                <rect x="64" y="375" width="8" height="25" fill="#FFFFFF" /><rect x="76" y="350" width="8" height="50" fill="#FFFFFF" />
                <rect x="180" y="320" width="6" height="80" fill="#FFFFFF" /><rect x="190" y="335" width="6" height="65" fill="#FFFFFF" />
                <rect x="200" y="310" width="6" height="90" fill="#FFFFFF" />
                <rect x="340" y="340" width="4" height="60" fill="#FFFFFF" /><rect x="348" y="355" width="4" height="45" fill="#FFFFFF" />
                <rect x="356" y="330" width="4" height="70" fill="#FFFFFF" /><rect x="364" y="365" width="4" height="35" fill="#FFFFFF" />
                <rect x="520" y="290" width="10" height="110" fill="#FFFFFF" /><rect x="534" y="305" width="10" height="95" fill="#FFFFFF" />
                <rect x="548" y="280" width="10" height="120" fill="#FFFFFF" /><rect x="562" y="320" width="10" height="80" fill="#FFFFFF" />
                <rect x="680" y="360" width="8" height="40" fill="#FFFFFF" /><rect x="692" y="340" width="8" height="60" fill="#FFFFFF" />
            </g>
            <!-- Stratification lines -->
            <line x1="0" y1="80" x2="760" y2="80" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1" />
            <line x1="0" y1="160" x2="760" y2="160" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
            <line x1="0" y1="240" x2="760" y2="240" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1" />
            <line x1="0" y1="320" x2="760" y2="320" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="2 4" />
            <!-- Vertical data feeds -->
            <g stroke="#FFFFFF" stroke-width="1">
                <line x1="90" y1="0" x2="90" y2="280" stroke-opacity="0.2" class="data-stream-down" />
                <line x1="190" y1="0" x2="190" y2="140" stroke-opacity="0.3" class="data-stream-down" />
                <line x1="270" y1="0" x2="270" y2="210" stroke-opacity="0.15" class="data-stream-down" />
                <line x1="350" y1="0" x2="350" y2="160" stroke-opacity="0.4" class="data-stream-down" />
                <line x1="430" y1="0" x2="430" y2="260" stroke-opacity="0.2" class="data-stream-down" />
                <line x1="520" y1="0" x2="520" y2="90" stroke-opacity="0.5" class="data-stream-down" />
                <line x1="610" y1="0" x2="610" y2="230" stroke-opacity="0.15" class="data-stream-down" />
                <line x1="690" y1="0" x2="690" y2="110" stroke-opacity="0.3" class="data-stream-down" />
            </g>
            <!-- Smooth waveform -->
            <path d="M -20 220 C 120 220, 160 120, 260 120 C 360 120, 390 280, 480 280 C 570 280, 600 110, 700 110 C 740 110, 760 140, 780 140" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />
            <path d="M -20 220 C 120 220, 160 120, 260 120 C 360 120, 390 280, 480 280 C 570 280, 600 110, 700 110 C 740 110, 760 140, 780 140 L 780 400 L -20 400 Z" fill="url(#fadeBottom)" />
            <!-- Orthogonal connections -->
            <g stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" fill="none">
                <polyline points="190,140 230,140 230,280 90,280" />
                <polyline points="350,160 410,160 410,90 520,90" />
                <polyline points="610,230 650,230 650,110 690,110" />
                <line x1="230" y1="280" x2="230" y2="400" class="data-stream-up" />
                <line x1="410" y1="160" x2="410" y2="400" stroke-opacity="0.05" class="data-stream-up" />
                <line x1="650" y1="230" x2="650" y2="400" class="data-stream-up" />
            </g>
            <!-- Primary angular line chart -->
            <path d="M -10 260 L 50 260 L 90 280 L 140 180 L 190 140 L 230 190 L 270 210 L 320 120 L 350 160 L 390 130 L 430 260 L 480 230 L 520 90 L 570 150 L 610 230 L 660 180 L 690 110 L 730 170 L 780 170" fill="none" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5" stroke-linejoin="round" />
            <!-- Junction nodes -->
            <use href="#node-square" x="90" y="280" /><use href="#node-circle-solid" x="140" y="180" />
            <use href="#node-diamond" x="190" y="140" /><use href="#node-circle-hollow" x="270" y="210" />
            <use href="#node-square" x="320" y="120" />
            <use href="#node-diamond" x="350" y="160" /><circle cx="350" cy="160" r="1.5" fill="#E7E70D" />
            <use href="#node-circle-solid" x="430" y="260" />
            <g class="node-pulse" style="transform-origin: 520px 90px;"><circle cx="520" cy="90" r="4" fill="#E7E70D" /></g>
            <circle cx="520" cy="90" r="8" fill="none" stroke="#E7E70D" stroke-width="1" stroke-opacity="0.3" class="node-pulse" style="transform-origin: 520px 90px; animation-delay: 1s;" />
            <use href="#node-square" x="610" y="230" />
            <use href="#node-diamond" x="690" y="110" /><circle cx="690" cy="110" r="4" fill="#E7E70D" />
            <!-- Crosshairs -->
            <g stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1">
                <line x1="266" y1="80" x2="274" y2="80" /><line x1="426" y1="160" x2="434" y2="160" /><line x1="606" y1="320" x2="614" y2="320" />
            </g>
            <!-- Data fragments -->
            <g fill="#FFFFFF" fill-opacity="0.6">
                <rect x="189" y="100" width="2" height="4" /><rect x="189" y="80" width="2" height="2" />
                <rect x="349" y="80" width="2" height="6" /><rect x="349" y="60" width="2" height="2" />
                <rect x="519" y="50" width="2" height="8" fill="#E7E70D" /><rect x="519" y="35" width="2" height="3" fill="#E7E70D" />
            </g>
            <rect x="0" y="0" width="100%" height="16" fill="url(#fadeTop)" />
        </svg>
    </div>
</body>
</html>

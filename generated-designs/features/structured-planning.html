<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Planning</title>
    <style>
        body { background-color: #121212; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.4)); opacity: 0.85; } 50% { filter: drop-shadow(0 0 10px rgba(231, 231, 13, 0.8)); opacity: 1; } }
        .ai-critical-path { animation: pulse-glow 4s ease-in-out infinite; }
        @keyframes flow { to { stroke-dashoffset: -20; } }
        .data-flow { animation: flow 30s linear infinite; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;max-width:760px;aspect-ratio:760/400;border-radius:8px;overflow:hidden;box-shadow:0 25px 60px -15px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.1);flex-shrink:0;">
        <svg viewBox="0 0 760 400" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;background:#2D2D2D;" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.03)" /><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/></pattern>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#blueprint-grid)" />
            <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"><line x1="0" y1="85" x2="760" y2="85" /><line x1="0" y1="170" x2="760" y2="170" /><line x1="0" y1="270" x2="760" y2="270" /></g>
            <g fill="rgba(255,255,255,0.15)"><rect x="60" y="40" width="20" height="2" rx="1" /><rect x="60" y="45" width="35" height="2" rx="1" /><rect x="60" y="50" width="12" height="2" rx="1" /><rect x="660" y="240" width="15" height="2" rx="1" /><rect x="660" y="245" width="28" height="2" rx="1" /><rect x="660" y="250" width="20" height="2" rx="1" /></g>
            <circle cx="380" cy="40" r="38" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2 6" fill="none" />
            <circle cx="380" cy="40" r="48" stroke="rgba(231,231,13,0.08)" stroke-width="1" stroke-dasharray="1 8" fill="none" />
            <g stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"><path d="M 20,40 H 35 M 20,40 V 55" /><path d="M 740,40 H 725 M 740,40 V 55" /><path d="M 20,360 H 35 M 20,360 V 345" /><path d="M 740,360 H 725 M 740,360 V 345" /></g>
            <!-- Dependency arcs -->
            <g stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-dasharray="4 6" fill="none" class="data-flow">
                <path d="M 110,220 Q 220,130 290,210" /><path d="M 340,260 Q 425,330 510,220" /><path d="M 650,200 Q 550,110 380,162" />
                <path d="M 160,310 Q 220,380 280,290" /><path d="M 480,310 Q 550,380 610,290" />
            </g>
            <g fill="#E7E70D" opacity="0.6"><circle cx="110" cy="220" r="2"/><circle cx="290" cy="210" r="2"/><circle cx="340" cy="260" r="2"/><circle cx="510" cy="220" r="2"/><circle cx="650" cy="200" r="2"/><circle cx="380" cy="162" r="2"/><circle cx="160" cy="310" r="2"/><circle cx="280" cy="290" r="2"/><circle cx="480" cy="310" r="2"/><circle cx="610" cy="290" r="2"/></g>
            <!-- Hierarchical paths -->
            <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none" stroke-linejoin="round">
                <path d="M 380,65 V 85 H 200 V 108" /><path d="M 380,65 V 138" /><path d="M 380,65 V 85 H 560 V 98" />
                <path d="M 200,132 V 170 H 110 V 212" /><path d="M 200,132 V 234" /><path d="M 200,132 V 170 H 290 V 202" />
                <path d="M 380,162 V 210 H 340 V 254" /><path d="M 380,162 V 190 H 430 V 222" />
                <path d="M 560,122 V 170 H 510 V 214" /><path d="M 560,122 V 160 H 650 V 192" />
                <path d="M 110,228 V 270 H 60 V 305" /><path d="M 110,228 V 280 H 160 V 305" /><path d="M 110,228 V 325" />
                <path d="M 200,246 V 300 H 220 V 335" /><path d="M 290,218 V 260 H 280 V 285" /><path d="M 290,218 V 270 H 310 V 315" />
                <path d="M 340,266 V 335" /><path d="M 430,238 V 295" />
                <path d="M 510,226 V 270 H 480 V 305" /><path d="M 510,226 V 280 H 530 V 335" />
                <path d="M 650,208 V 250 H 610 V 285" /><path d="M 650,208 V 280 H 660 V 325" /><path d="M 650,208 V 260 H 700 V 305" />
            </g>
            <!-- Critical path -->
            <g class="ai-critical-path" stroke="#E7E70D" stroke-width="2.5" fill="none" stroke-linejoin="round" filter="url(#neon-glow)">
                <path d="M 380,65 V 85 H 560 V 98" /><path d="M 560,122 V 170 H 510 V 214" /><path d="M 510,226 V 280 H 530 V 335" />
            </g>
            <!-- Elbow junctions -->
            <g fill="#E7E70D">
                <circle cx="380" cy="85" r="1.5"/><circle cx="200" cy="85" r="1.5"/><circle cx="560" cy="85" r="1.5"/>
                <circle cx="200" cy="170" r="1.5"/><circle cx="110" cy="170" r="1.5"/><circle cx="290" cy="170" r="1.5"/>
                <circle cx="380" cy="210" r="1.5"/><circle cx="340" cy="210" r="1.5"/><circle cx="380" cy="190" r="1.5"/><circle cx="430" cy="190" r="1.5"/>
                <circle cx="560" cy="170" r="1.5"/><circle cx="510" cy="170" r="1.5"/><circle cx="560" cy="160" r="1.5"/><circle cx="650" cy="160" r="1.5"/>
                <circle cx="110" cy="270" r="1.5"/><circle cx="60" cy="270" r="1.5"/><circle cx="110" cy="280" r="1.5"/><circle cx="160" cy="280" r="1.5"/>
                <circle cx="200" cy="300" r="1.5"/><circle cx="220" cy="300" r="1.5"/><circle cx="290" cy="260" r="1.5"/><circle cx="280" cy="260" r="1.5"/>
                <circle cx="290" cy="270" r="1.5"/><circle cx="310" cy="270" r="1.5"/>
                <circle cx="510" cy="270" r="1.5"/><circle cx="480" cy="270" r="1.5"/><circle cx="510" cy="280" r="1.5"/><circle cx="530" cy="280" r="1.5"/>
                <circle cx="650" cy="250" r="1.5"/><circle cx="610" cy="250" r="1.5"/><circle cx="650" cy="280" r="1.5"/><circle cx="660" cy="280" r="1.5"/>
                <circle cx="650" cy="260" r="1.5"/><circle cx="700" cy="260" r="1.5"/>
            </g>
            <!-- Leaf diamonds -->
            <path d="M 60,305 L 65,310 L 60,315 L 55,310 Z M 110,325 L 115,330 L 110,335 L 105,330 Z M 160,305 L 165,310 L 160,315 L 155,310 Z M 220,335 L 225,340 L 220,345 L 215,340 Z M 280,285 L 285,290 L 280,295 L 275,290 Z M 310,315 L 315,320 L 310,325 L 305,320 Z M 350,335 L 355,340 L 350,345 L 345,340 Z M 430,295 L 435,300 L 430,305 L 425,300 Z M 480,305 L 485,310 L 480,315 L 475,310 Z M 530,335 L 535,340 L 530,345 L 525,340 Z M 610,285 L 615,290 L 610,295 L 605,290 Z M 660,325 L 665,330 L 660,335 L 655,330 Z M 700,305 L 705,310 L 700,315 L 695,310 Z" fill="#FFFFFF" />
            <path d="M 530,335 L 535,340 L 530,345 L 525,340 Z" fill="#E7E70D" />
            <!-- L2 circles -->
            <g stroke="#FFFFFF" stroke-width="1.5">
                <circle cx="110" cy="220" r="7" fill="#2D2D2D" /><circle cx="110" cy="220" r="2" fill="#E7E70D" stroke="none" />
                <circle cx="200" cy="240" r="6" fill="#FFFFFF" stroke="none" />
                <circle cx="290" cy="210" r="7" fill="#2D2D2D" /><circle cx="290" cy="210" r="2.5" fill="#FFFFFF" stroke="none" />
                <circle cx="340" cy="260" r="6" fill="#FFFFFF" stroke="none" />
                <circle cx="430" cy="230" r="7" fill="#2D2D2D" /><circle cx="430" cy="230" r="2" fill="#E7E70D" stroke="none" />
                <circle cx="510" cy="220" r="6" fill="#FFFFFF" stroke="#E7E70D" stroke-width="2" />
                <circle cx="650" cy="200" r="7" fill="#2D2D2D" /><circle cx="650" cy="200" r="2.5" fill="#FFFFFF" stroke="none" />
            </g>
            <!-- L1 squares -->
            <g fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5">
                <rect x="188" y="108" width="24" height="24" /><rect x="195" y="115" width="10" height="10" fill="#FFFFFF" stroke="none" />
                <rect x="368" y="138" width="24" height="24" /><rect x="375" y="145" width="10" height="10" fill="#FFFFFF" stroke="none" />
                <rect x="548" y="98" width="24" height="24" stroke="#E7E70D" /><rect x="555" y="105" width="10" height="10" fill="#FFFFFF" stroke="none" />
            </g>
            <!-- Root diamond -->
            <g><path d="M 380,12 L 413,40 L 380,68 L 347,40 Z" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="2"/><path d="M 380,24 L 398,40 L 380,56 L 362,40 Z" fill="rgba(255,255,255,0.15)" stroke="#FFFFFF" stroke-width="1"/><circle cx="380" cy="40" r="4" fill="#E7E70D" filter="url(#neon-glow)" /></g>
        </svg>
    </div>
</body>
</html>

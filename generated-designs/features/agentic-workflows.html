<!-- aesthetic_dna: minimalist_geometric, ui_paradigm: pure_abstract_vector_canvas, palette: charcoal_white_yellow -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Workflows Illustration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0A0A0A;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        @keyframes flow-dash {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }
        @keyframes reverse-flow-dash {
            from { stroke-dashoffset: -200; }
            to { stroke-dashoffset: 0; }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        @keyframes pulse-glow {
            0% { opacity: 0.4; filter: blur(2px); }
            50% { opacity: 1; filter: blur(4px); }
            100% { opacity: 0.4; filter: blur(2px); }
        }
        .anim-flow {
            stroke-dasharray: 6 8;
            animation: flow-dash 15s linear infinite;
        }
        .anim-flow-fast {
            stroke-dasharray: 4 6;
            animation: flow-dash 8s linear infinite;
        }
        .anim-flow-reverse {
            stroke-dasharray: 8 12;
            animation: reverse-flow-dash 20s linear infinite;
        }
        .ring-pulse-center { transform-origin: center; }
        .pulse-element { animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        .glow-element { animation: pulse-glow 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="relative w-[760px] h-[400px] bg-[#2D2D2D] rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden ring-1 ring-white/5">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
                <line x1="80" y1="0" x2="80" y2="400" />
                <line x1="220" y1="0" x2="220" y2="400" />
                <line x1="380" y1="0" x2="380" y2="400" />
                <line x1="540" y1="0" x2="540" y2="400" />
                <line x1="680" y1="0" x2="680" y2="400" />
                <line x1="0" y1="100" x2="760" y2="100" />
                <line x1="0" y1="200" x2="760" y2="200" />
                <line x1="0" y1="300" x2="760" y2="300" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5">
                <path d="M -20,150 C 40,150 60,60 140,60 C 220,60 260,180 340,180 C 420,180 460,80 540,80 C 620,80 660,150 780,150" />
                <path d="M -20,250 C 40,250 60,340 140,340 C 220,340 260,220 340,220 C 420,220 460,320 540,320 C 620,320 660,250 780,250" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
                <path d="M 80,200 C 130,200 150,100 220,100 L 320,100 C 350,100 350,140 380,140 L 480,140 C 510,140 510,100 540,100 L 620,100 C 650,100 650,140 680,140 L 760,140" />
                <path d="M 0,200 L 220,200 C 270,200 300,240 380,240 C 460,240 460,200 540,200 L 760,200" />
                <path d="M 80,200 C 130,200 150,300 220,300 L 320,300 C 350,300 350,260 380,260 L 480,260 C 510,260 510,300 540,300 L 620,300 C 650,300 650,260 680,260 L 760,260" />
                <path d="M 220,100 L 220,160 C 220,180 240,200 260,200" />
                <path d="M 380,140 C 410,140 410,240 440,240" />
                <path d="M 380,260 C 410,260 410,200 440,200" />
                <path d="M 540,200 L 540,260 C 540,280 560,300 580,300" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
                <path class="anim-flow" d="M 80,200 C 130,200 150,100 220,100 L 320,100" />
                <path class="anim-flow-fast" d="M 220,200 C 270,200 300,240 380,240 C 460,240 460,200 540,200" />
                <path class="anim-flow-reverse" d="M 380,260 L 480,260 C 510,260 510,300 540,300" />
                <path class="anim-flow-fast" stroke="#E7E70D" stroke-opacity="0.6" d="M 540,100 C 490,100 490,140 420,140" />
            </g>
            <g transform="translate(80, 200)">
                <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#ffffff" />
                <circle cx="0" cy="0" r="3" fill="#2D2D2D" />
            </g>
            <g transform="translate(220, 100)"><rect x="-6" y="-6" width="12" height="12" fill="#ffffff" transform="rotate(45)" /></g>
            <g transform="translate(220, 200)">
                <circle cx="0" cy="0" r="8" fill="#ffffff" />
                <circle cx="0" cy="0" r="14" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" />
            </g>
            <g transform="translate(220, 300)"><rect x="-6" y="-6" width="12" height="12" fill="#ffffff" transform="rotate(45)" /></g>
            <g transform="translate(260, 200)"><circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.6" /></g>
            <g transform="translate(320, 100)"><circle cx="0" cy="0" r="5" fill="#ffffff" /></g>
            <g transform="translate(380, 140)"><rect x="-7" y="-7" width="14" height="14" rx="2" fill="#ffffff" /></g>
            <g transform="translate(380, 240)"><rect x="-7" y="-7" width="14" height="14" rx="2" fill="#ffffff" /></g>
            <g transform="translate(380, 260)"><circle cx="0" cy="0" r="5" fill="#ffffff" /></g>
            <g transform="translate(540, 100)"><rect x="-6" y="-6" width="12" height="12" fill="#ffffff" transform="rotate(45)" /></g>
            <g transform="translate(540, 200)"><circle cx="0" cy="0" r="8" fill="#ffffff" /></g>
            <g transform="translate(540, 300)"><rect x="-6" y="-6" width="12" height="12" fill="#ffffff" transform="rotate(45)" /></g>
            <g transform="translate(580, 300)"><circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.6" /></g>
            <g transform="translate(680, 140)"><circle cx="0" cy="0" r="6" fill="#ffffff" /></g>
            <g transform="translate(680, 260)"><circle cx="0" cy="0" r="6" fill="#ffffff" /></g>
            <g transform="translate(380, 200)">
                <circle class="pulse-element ring-pulse-center" cx="0" cy="0" r="16" fill="none" stroke="#E7E70D" stroke-width="1.5" />
                <circle class="glow-element" cx="0" cy="0" r="10" fill="#E7E70D" filter="url(#glow)" opacity="0.5"/>
                <circle cx="0" cy="0" r="7" fill="#E7E70D" />
                <circle cx="0" cy="0" r="3" fill="#2D2D2D" />
                <path d="M -10,-10 L -20,-20 M 10,10 L 20,20 M -10,10 L -20,20 M 10,-10 L 20,-20" stroke="#E7E70D" stroke-width="1.5" opacity="0.5" />
            </g>
            <g transform="translate(420, 140)"><circle cx="0" cy="0" r="5" fill="#E7E70D" /></g>
            <g transform="translate(480, 260)">
                <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#E7E70D" />
                <rect class="pulse-element ring-pulse-center" x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#E7E70D" stroke-width="1" stroke-dasharray="2 3" />
            </g>
            <g transform="translate(620, 100)">
                <circle cx="0" cy="0" r="6" fill="#E7E70D" />
                <circle class="pulse-element ring-pulse-center" cx="0" cy="0" r="12" fill="none" stroke="#E7E70D" stroke-width="1" />
            </g>
            <g transform="translate(620, 300)">
                <rect x="-5" y="-5" width="10" height="10" fill="#E7E70D" transform="rotate(45)" />
                <circle cx="0" cy="0" r="14" fill="none" stroke="#E7E70D" stroke-width="1" stroke-dasharray="1 4" />
            </g>
            <g fill="rgba(255,255,255,0.8)">
                <circle cx="150" cy="100" r="1.5" /><circle cx="160" cy="100" r="1.5" /><circle cx="170" cy="100" r="1.5" />
                <circle cx="340" cy="300" r="1.5" /><circle cx="350" cy="300" r="1.5" />
                <circle cx="500" cy="240" r="1.5" /><circle cx="510" cy="240" r="1.5" />
            </g>
            <g fill="#E7E70D">
                <circle cx="440" cy="240" r="2" /><circle cx="440" cy="200" r="2" />
            </g>
        </svg>
    </div>
</body>
</html>

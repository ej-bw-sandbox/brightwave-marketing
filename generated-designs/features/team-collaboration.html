<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Collaboration</title>
    <style>
        body { background: #121212; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; }
        @keyframes subtle-pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        @keyframes flow { to { stroke-dashoffset: -20; } }
        .animate-flow { animation: flow 2s linear infinite; }
        .pulse-node { transform-origin: center; animation: subtle-pulse 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <div style="width:760px;height:400px;background:#2D2D2D;position:relative;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border-radius:2px;border:1px solid rgba(255,255,255,0.1);">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">
            <defs>
                <marker id="arrow-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 10 0 L 0 5 L 10 10 z" fill="rgba(255,255,255,0.6)" /></marker>
                <marker id="arrow-end" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.6)" /></marker>
                <marker id="arrow-end-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E7E70D" /></marker>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
                <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/></pattern>
            </defs>
            <rect width="760" height="400" fill="url(#grid-pattern)" />
            <circle cx="200" cy="120" r="1" fill="rgba(255,255,255,0.2)"/><circle cx="560" cy="280" r="1" fill="rgba(255,255,255,0.2)"/>
            <!-- Shared workspace -->
            <g transform="translate(380, 200)">
                <circle cx="0" cy="0" r="110" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
                <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="8"/>
                <rect x="-55" y="-55" width="110" height="110" transform="rotate(45)" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <path d="M -80 0 L 80 0 M 0 -80 L 0 80 M -40 -40 L 40 40 M -40 40 L 40 -40" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            </g>
            <!-- Connection paths -->
            <g>
                <path d="M 140 100 L 260 100 L 320 160 L 340 160" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
                <path d="M 120 280 L 220 280 L 300 210 L 340 210" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="6 3" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
                <path d="M 620 90 L 520 90 L 440 170 L 420 170" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
                <path d="M 640 300 L 520 300 L 440 220 L 420 220" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="10 4" marker-end="url(#arrow-end)"/>
                <path d="M 380 60 L 380 120" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
            </g>
            <!-- Overlapping contribution paths -->
            <g>
                <path d="M 160 120 C 240 180, 200 240, 360 260" fill="none" stroke="#E7E70D" stroke-width="1" stroke-opacity="0.4" class="animate-flow" stroke-dasharray="4 6" marker-end="url(#arrow-end-yellow)"/>
                <path d="M 280 80 Q 380 200, 480 340" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="2 4"/>
                <path d="M 600 130 C 500 200, 520 280, 400 320" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="8 8" marker-end="url(#arrow-end)"/>
            </g>
            <!-- User nodes -->
            <g transform="translate(140, 100)"><circle cx="0" cy="0" r="16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 2"/><circle cx="0" cy="0" r="6" fill="#FFFFFF"/></g>
            <g transform="translate(120, 280)"><circle cx="0" cy="0" r="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/><rect x="-5" y="-5" width="10" height="10" fill="#FFFFFF"/></g>
            <g transform="translate(620, 90)"><circle cx="0" cy="0" r="18" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/><circle cx="0" cy="0" r="8" fill="#FFFFFF"/></g>
            <g transform="translate(640, 300)"><circle cx="0" cy="0" r="14" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><polygon points="0,-6 6,0 0,6 -6,0" fill="#FFFFFF"/></g>
            <g transform="translate(380, 60)"><circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/><circle cx="0" cy="0" r="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="4 2"/><circle cx="0" cy="0" r="7" fill="#FFFFFF"/></g>
            <!-- Workspace nodes -->
            <g transform="translate(380, 200)">
                <g class="pulse-node" style="transform-origin: 0px 0px;"><polygon points="0,-16 16,0 0,16 -16,0" fill="#FFFFFF" filter="url(#glow)"/></g>
                <rect x="-44" y="-44" width="8" height="8" fill="#FFFFFF"/><rect x="36" y="-44" width="8" height="8" fill="#FFFFFF"/>
                <rect x="-44" y="36" width="8" height="8" fill="#FFFFFF"/><rect x="36" y="36" width="8" height="8" fill="#FFFFFF"/>
                <circle cx="0" cy="-60" r="4" fill="#FFFFFF"/><circle cx="0" cy="60" r="4" fill="#FFFFFF"/>
                <circle cx="-60" cy="0" r="4" fill="#FFFFFF"/><circle cx="60" cy="0" r="4" fill="#FFFFFF"/>
                <polygon points="40,-20 44,-16 40,-12 36,-16" fill="#FFFFFF"/><polygon points="-40,20 -36,24 -40,28 -44,24" fill="#FFFFFF"/>
            </g>
            <!-- Yellow junctions -->
            <g>
                <circle cx="260" cy="100" r="3.5" fill="#E7E70D"/><circle cx="320" cy="160" r="2.5" fill="#E7E70D"/>
                <circle cx="220" cy="280" r="3" fill="#E7E70D"/><circle cx="520" cy="90" r="3.5" fill="#E7E70D"/>
                <circle cx="440" cy="170" r="2.5" fill="#E7E70D"/><circle cx="520" cy="300" r="3" fill="#E7E70D"/>
                <circle cx="380" cy="120" r="3" fill="#E7E70D"/><circle cx="380" cy="280" r="3" fill="#E7E70D"/>
                <circle cx="300" cy="200" r="3" fill="#E7E70D"/><circle cx="460" cy="200" r="3" fill="#E7E70D"/>
                <circle cx="340" cy="160" r="1.5" fill="#E7E70D"/><circle cx="420" cy="240" r="1.5" fill="#E7E70D"/>
            </g>
            <path d="M 0 0 L 760 0 L 760 400 L 0 400 Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10" />
        </svg>
    </div>
</body>
</html>

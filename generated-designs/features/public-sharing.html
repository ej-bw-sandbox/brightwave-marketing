<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Sharing</title>
    <style>
        body { min-height: 100vh; background: black; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0; overflow: hidden; }
        .animate-pulse-slow { animation: pulse-op 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-op { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div style="width:760px;height:400px;background:#2D2D2D;position:relative;box-shadow:0 0 50px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;flex-shrink:0;">
        <svg viewBox="0 0 760 400" style="position:absolute;inset:0;width:100%;height:100%;" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.03" /></pattern>
                <filter id="coreGlow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/></filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotGrid)" />
            <!-- Technical accents -->
            <g stroke="#ffffff" fill="none" stroke-width="1">
                <path d="M 60 40 L 68 40 M 64 36 L 64 44" opacity="0.4"/>
                <path d="M 700 80 L 708 80 M 704 76 L 704 84" opacity="0.2"/>
                <path d="M 680 340 L 688 340 M 684 336 L 684 344" opacity="0.3"/>
                <path d="M 120 320 L 128 320 M 124 316 L 124 324" opacity="0.15"/>
            </g>
            <!-- Broadcast arcs -->
            <g fill="none">
                <path d="M 190 90 A 130 130 0 0 1 190 310" stroke="#ffffff" opacity="0.15" stroke-width="1.5" stroke-dasharray="2 6" class="animate-pulse-slow"/>
                <path d="M 230 40 A 200 200 0 0 1 230 360" stroke="#ffffff" opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>
                <path d="M 280 -20 A 320 320 0 0 1 280 420" stroke="#ffffff" opacity="0.04" stroke-width="1" stroke-dasharray="8 8"/>
            </g>
            <circle cx="140" cy="200" r="56" stroke="#ffffff" opacity="0.05" stroke-width="1" fill="none"/>
            <circle cx="140" cy="200" r="44" stroke="#ffffff" opacity="0.15" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
            <!-- Connection paths -->
            <g stroke-linejoin="miter" stroke-linecap="butt" fill="none" stroke-width="1.5">
                <path d="M 160 180 L 210 180 L 210 60 L 590 60" stroke="rgba(255,255,255,0.25)" />
                <path d="M 160 190 L 260 190 L 260 130 L 650 130" stroke="rgba(255,255,255,0.35)" />
                <path d="M 160 200 L 690 200" stroke="rgba(255,255,255,0.6)" />
                <path d="M 160 210 L 260 210 L 260 270 L 650 270" stroke="rgba(255,255,255,0.35)" />
                <path d="M 160 220 L 210 220 L 210 340 L 590 340" stroke="rgba(255,255,255,0.25)" />
                <path d="M 450 130 L 450 95 L 560 95" stroke="rgba(255,255,255,0.2)" />
                <path d="M 450 270 L 450 305 L 560 305" stroke="rgba(255,255,255,0.2)" />
                <path d="M 360 165 L 360 235" stroke="rgba(255,255,255,0.25)" />
                <path d="M 360 165 L 500 165" stroke="rgba(255,255,255,0.25)" />
                <path d="M 360 235 L 500 235" stroke="rgba(255,255,255,0.25)" />
            </g>
            <!-- Yellow junctions -->
            <g fill="#E7E70D">
                <circle cx="210" cy="60" r="4" /><circle cx="260" cy="130" r="4" />
                <circle cx="260" cy="270" r="4" /><circle cx="210" cy="340" r="4" />
                <circle cx="360" cy="200" r="4" /><circle cx="450" cy="130" r="4" /><circle cx="450" cy="270" r="4" />
                <circle cx="360" cy="165" r="3.5" /><circle cx="360" cy="235" r="3.5" />
                <circle cx="450" cy="95" r="3.5" /><circle cx="450" cy="305" r="3.5" />
            </g>
            <!-- Endpoint nodes -->
            <g fill="#FFFFFF">
                <circle cx="590" cy="60" r="6" />
                <rect x="555" y="90" width="10" height="10" />
                <g transform="translate(650, 130) rotate(45)"><rect x="-6" y="-6" width="12" height="12" /></g>
                <circle cx="500" cy="165" r="5" />
                <g transform="translate(690, 200) rotate(45)"><rect x="-8" y="-8" width="16" height="16" fill="#FFFFFF" /><rect x="-3" y="-3" width="6" height="6" fill="#2D2D2D" /></g>
                <circle cx="500" cy="235" r="5" />
                <g transform="translate(650, 270) rotate(45)"><rect x="-6" y="-6" width="12" height="12" /></g>
                <rect x="555" y="300" width="10" height="10" />
                <circle cx="590" cy="340" r="6" />
            </g>
            <!-- Central artifact node -->
            <g transform="translate(140, 200)" filter="url(#coreGlow)">
                <rect x="-18" y="-22" width="36" height="44" fill="#FFFFFF" rx="2" />
                <g transform="rotate(45)"><rect x="-10" y="-10" width="20" height="20" fill="#2D2D2D" /></g>
                <circle cx="0" cy="0" r="4.5" fill="#E7E70D" /><circle cx="0" cy="0" r="1.5" fill="#2D2D2D" />
            </g>
            <g fill="none" stroke="#E7E70D" opacity="0.5" stroke-width="1">
                <path d="M 125 150 L 130 150 M 125 250 L 130 250" />
                <path d="M 150 150 L 155 150 M 150 250 L 155 250" />
            </g>
        </svg>
    </div>
</body>
</html>

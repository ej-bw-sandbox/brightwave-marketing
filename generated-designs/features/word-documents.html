<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Documents</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        svg { shape-rendering: geometricPrecision; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;border-radius:8px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);overflow:hidden;border:1px solid rgba(255,255,255,0.1);">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;">
            <defs>
                <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.75" fill="rgba(255,255,255,0.08)" /></pattern>
                <pattern id="cross-grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M 40 37 L 40 43 M 37 40 L 43 40" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" /></pattern>
                <filter id="yellow-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
            </defs>
            <rect width="100%" height="100%" fill="#2D2D2D" />
            <rect width="100%" height="100%" fill="url(#dot-grid)" />
            <rect width="100%" height="100%" fill="url(#cross-grid)" />
            <rect x="20" y="20" width="720" height="360" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
            <path d="M 15 20 L 25 20 M 20 15 L 20 25" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            <path d="M 735 20 L 745 20 M 740 15 L 740 25" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            <path d="M 15 380 L 25 380 M 20 375 L 20 385" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            <path d="M 735 380 L 745 380 M 740 375 L 740 385" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            <!-- Connection paths -->
            <g stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none">
                <path d="M 100 104 L 100 180 L 160 180" />
                <path d="M 100 286 L 100 220 L 160 220" />
                <path d="M 185 150 L 185 100 L 230 100" />
                <path d="M 185 250 L 185 310 L 232 310" />
                <path d="M 250 100 L 340 100 L 340 74 L 460 74" />
                <path d="M 205 175 L 240 175 L 240 122 L 460 122" />
                <path d="M 248 310 L 370 310 L 370 280 L 460 280" />
            </g>
            <!-- Active yellow pipeline -->
            <g stroke="#E7E70D" stroke-width="1.5" fill="none">
                <path d="M 210 200 L 280 200 L 280 185 L 460 185" />
                <rect x="230" y="198.5" width="6" height="3" fill="#E7E70D" stroke="none" />
                <rect x="330" y="183.5" width="8" height="3" fill="#E7E70D" stroke="none" />
                <rect x="400" y="183.5" width="8" height="3" fill="#E7E70D" stroke="none" />
            </g>
            <!-- AI processing nodes -->
            <g>
                <polygon points="160,140 220,200 160,260 100,200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <polygon points="160,150 210,200 160,250 110,200" fill="rgba(255,255,255,0.03)" stroke="#FFFFFF" stroke-width="2" />
                <circle cx="160" cy="200" r="12" fill="none" stroke="#FFFFFF" stroke-width="2" />
                <circle cx="160" cy="200" r="4" fill="#E7E70D" />
                <circle cx="100" cy="90" r="14" fill="#1E1E1E" stroke="#FFFFFF" stroke-width="2" />
                <circle cx="100" cy="90" r="4" fill="#FFFFFF" />
                <rect x="86" y="286" width="28" height="28" fill="#FFFFFF" /><rect x="91" y="291" width="18" height="18" fill="#2D2D2D" />
                <polygon points="240,90 250,100 240,110 230,100" fill="#FFFFFF" />
                <circle cx="240" cy="310" r="8" fill="rgba(255,255,255,0.4)" stroke="#FFFFFF" stroke-width="1.5" /><circle cx="240" cy="310" r="2" fill="#2D2D2D" />
            </g>
            <!-- Document framework -->
            <g>
                <rect x="460" y="40" width="260" height="320" rx="4" fill="#222222" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />
                <line x1="500" y1="40" x2="500" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
                <!-- Header -->
                <rect x="478" y="70" width="8" height="8" rx="1" fill="rgba(255,255,255,0.4)" />
                <rect x="520" y="70" width="110" height="8" fill="#FFFFFF" rx="1" />
                <!-- Paragraph 1 -->
                <line x1="476" y1="112" x2="488" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
                <line x1="476" y1="117" x2="488" y2="117" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
                <line x1="476" y1="122" x2="488" y2="122" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
                <rect x="520" y="110" width="170" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <rect x="520" y="122" width="180" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <rect x="520" y="134" width="130" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <!-- Paragraph 2 (AI active) -->
                <rect x="510" y="171" width="195" height="70" fill="rgba(231,231,13,0.05)" stroke="#E7E70D" stroke-width="1" stroke-dasharray="3 3" rx="4" />
                <rect x="478" y="180" width="8" height="8" rx="1" fill="#E7E70D" />
                <rect x="520" y="181" width="160" height="5" fill="#E7E70D" rx="2.5" opacity="0.9" />
                <rect x="520" y="196" width="175" height="5" fill="#E7E70D" rx="2.5" opacity="0.9" />
                <rect x="520" y="211" width="145" height="5" fill="#E7E70D" rx="2.5" opacity="0.9" />
                <rect x="520" y="226" width="60" height="5" fill="#E7E70D" rx="2.5" opacity="0.9" />
                <line x1="588" y1="222" x2="588" y2="232" stroke="#E7E70D" stroke-width="1.5" />
                <rect x="710" y="181" width="3" height="3" fill="#E7E70D" /><rect x="710" y="188" width="3" height="3" fill="#E7E70D" /><rect x="710" y="195" width="3" height="3" fill="#E7E70D" />
                <!-- Paragraph 3 -->
                <rect x="478" y="270" width="8" height="8" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
                <rect x="520" y="270" width="150" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <rect x="520" y="282" width="165" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <rect x="520" y="294" width="90" height="4" fill="rgba(255,255,255,0.25)" rx="2" />
                <!-- Placeholder -->
                <rect x="520" y="315" width="180" height="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2 2" rx="2" />
                <line x1="520" y1="315" x2="700" y2="340" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <line x1="700" y1="315" x2="520" y2="340" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
            </g>
            <!-- Yellow junctions -->
            <g fill="#E7E70D" stroke="#2D2D2D" stroke-width="1.5">
                <circle cx="100" cy="180" r="3.5" /><circle cx="160" cy="180" r="3.5" />
                <circle cx="100" cy="220" r="3.5" /><circle cx="160" cy="220" r="3.5" />
                <circle cx="340" cy="100" r="3.5" /><circle cx="340" cy="74" r="3.5" /><circle cx="460" cy="74" r="3.5" />
                <circle cx="240" cy="175" r="3.5" /><circle cx="240" cy="122" r="3.5" /><circle cx="460" cy="122" r="3.5" />
                <circle cx="280" cy="200" r="4.5" /><circle cx="280" cy="185" r="4.5" />
                <rect x="456" y="181" width="8" height="8" rx="1.5" />
                <circle cx="370" cy="310" r="3.5" /><circle cx="370" cy="280" r="3.5" /><circle cx="460" cy="280" r="3.5" />
            </g>
        </svg>
    </div>
</body>
</html>

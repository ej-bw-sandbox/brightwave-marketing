<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Tasks</title>
    <style>
        body { background: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 2rem; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes reverse-spin { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes dash-flow { to { stroke-dashoffset: -20; } }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 2px rgba(231, 231, 13, 0.4)); transform: scale(1); } 50% { filter: drop-shadow(0 0 8px rgba(231, 231, 13, 0.9)); transform: scale(1.1); } }
        .spin-layer { transform-origin: 160px 200px; animation: slow-spin 40s linear infinite; }
        .spin-layer-reverse { transform-origin: 160px 200px; animation: reverse-spin 60s linear infinite; }
        .flow-line { animation: dash-flow 1s linear infinite; }
        .accent-node { transform-origin: center; transform-box: fill-box; animation: pulse-glow 3s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.5s; } .delay-2 { animation-delay: 1.2s; } .delay-3 { animation-delay: 2.1s; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;border-radius:12px;box-shadow:0 20px 50px -12px rgba(0,0,0,0.5);overflow:hidden;border:1px solid rgba(255,255,255,0.05);">
        <svg viewBox="0 0 760 400" width="760" height="400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">
            <defs>
                <marker id="arrow-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 2 L 8 5 L 0 8 z" fill="rgba(255,255,255,0.6)" /></marker>
                <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 2 L 8 5 L 0 8 z" fill="#E7E70D" /></marker>
                <pattern id="cross-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 19 20 L 21 20 M 20 19 L 20 21" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/></pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#cross-grid)" />
            <line x1="0" y1="200" x2="760" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
            <line x1="160" y1="0" x2="160" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
            <!-- Routing paths -->
            <g stroke-linecap="square" stroke-linejoin="miter">
                <path d="M 240 200 L 680 200" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" marker-end="url(#arrow-white)"/>
                <path d="M 320 200 L 320 120 L 600 120" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" marker-end="url(#arrow-white)"/>
                <path d="M 440 200 L 440 280 L 560 280" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" marker-end="url(#arrow-white)"/>
                <path d="M 520 120 L 520 160 L 640 160" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"/>
                <path d="M 680 180 C 700 180, 720 150, 720 100 C 720 40, 680 40, 600 40 L 220 40 C 160 40, 160 80, 160 110" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 6" fill="none" class="flow-line" marker-end="url(#arrow-white)"/>
                <path d="M 600 110 C 620 110, 620 70, 580 70 L 380 70 C 340 70, 340 120, 340 150" stroke="#E7E70D" stroke-width="1" stroke-dasharray="3 5" opacity="0.6" fill="none" class="flow-line" marker-end="url(#arrow-yellow)"/>
            </g>
            <!-- Clock mechanism -->
            <g>
                <circle cx="160" cy="200" r="110" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
                <path class="spin-layer-reverse" d="M 160 90 A 110 110 0 1 1 50 200" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" marker-end="url(#arrow-white)"/>
                <circle class="spin-layer" cx="160" cy="200" r="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="8 8" fill="none" />
                <circle cx="160" cy="200" r="60" stroke="#FFFFFF" stroke-width="1" opacity="0.8" fill="none" />
                <g fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" transform="translate(160,200)">
                    <line x1="0" y1="-50" x2="0" y2="-60" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(30)" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(60)" />
                    <line x1="0" y1="-45" x2="0" y2="-60" transform="rotate(90)" stroke-width="2.5" opacity="1" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(120)" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(150)" />
                    <line x1="0" y1="-45" x2="0" y2="-60" transform="rotate(180)" stroke-width="2.5" opacity="1" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(210)" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(240)" />
                    <line x1="0" y1="-45" x2="0" y2="-60" transform="rotate(270)" stroke-width="2.5" opacity="1" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(300)" />
                    <line x1="0" y1="-50" x2="0" y2="-60" transform="rotate(330)" />
                </g>
                <circle cx="160" cy="200" r="28" fill="#2D2D2D" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <rect x="153" y="193" width="14" height="14" fill="none" stroke="#FFFFFF" stroke-width="1.5" transform="rotate(45 160 200)" />
                <circle cx="160" cy="200" r="3" fill="#E7E70D" class="accent-node" />
                <path d="M 235 200 L 220 200 L 220 180" stroke="#FFFFFF" stroke-width="1.5" fill="none" />
                <rect x="235" y="197" width="6" height="6" fill="#FFFFFF" />
            </g>
            <!-- Task nodes -->
            <g fill="#FFFFFF" stroke="#2D2D2D" stroke-width="2">
                <polygon points="280,190 290,200 280,210 270,200" />
                <circle cx="380" cy="200" r="8" />
                <rect x="492" y="192" width="16" height="16" />
                <polygon points="620,190 630,200 620,210 610,200" />
                <circle cx="400" cy="120" r="6" />
                <rect x="554" y="114" width="12" height="12" />
                <circle cx="580" cy="160" r="5" />
                <polygon points="490,274 496,280 490,286 484,280" />
                <circle cx="560" cy="280" r="6" />
            </g>
            <!-- Yellow accent junctions -->
            <g fill="#E7E70D">
                <circle cx="240" cy="200" r="3.5" class="accent-node" />
                <circle cx="320" cy="200" r="4" class="accent-node delay-1" />
                <circle cx="320" cy="120" r="3" />
                <circle cx="440" cy="200" r="4" class="accent-node delay-2" />
                <circle cx="440" cy="280" r="3" />
                <circle cx="520" cy="120" r="3" class="accent-node delay-3" />
                <circle cx="680" cy="200" r="4" class="accent-node" />
                <circle cx="160" cy="110" r="3.5" class="accent-node delay-2" />
            </g>
            <!-- Corner details -->
            <g fill="rgba(255,255,255,0.3)"><rect x="18" y="18" width="4" height="4" /><rect x="738" y="18" width="4" height="4" /><rect x="18" y="378" width="4" height="4" /><rect x="738" y="378" width="4" height="4" /></g>
            <path d="M 20 40 L 20 60 M 40 20 L 60 20" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />
            <path d="M 740 360 L 740 340 M 720 380 L 700 380" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />
        </svg>
    </div>
</body>
</html>

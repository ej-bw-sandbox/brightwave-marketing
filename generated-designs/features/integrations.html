<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations</title>
    <style>
        body { background-color: #0d0d0d; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        @keyframes dash { to { stroke-dashoffset: -100; } }
        .flow-line { stroke-dasharray: 4 6; animation: dash 3s linear infinite; }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;border-radius:12px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:0;"></div>
        <svg viewBox="0 0 760 400" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;position:relative;z-index:10;" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.04" /></pattern>
                <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur1" /><feGaussianBlur stdDeviation="6" result="blur2" /><feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
                <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="blur" /><feComponentTransfer in="blur" result="glow"><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode in="glow" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
                <g id="node-hex"><polygon points="0,-16 13.85,-8 13.85,8 0,16 -13.85,8 -13.85,-8" fill="#2D2D2D" stroke="#ffffff" stroke-width="2" /><polygon points="0,-7 6.06,-3.5 6.06,3.5 0,7 -6.06,3.5 -6.06,-3.5" fill="#ffffff" /></g>
                <g id="node-dia"><polygon points="0,-18 18,0 0,18 -18,0" fill="#2D2D2D" stroke="#ffffff" stroke-width="2" /><polygon points="0,-8 8,0 0,8 -8,0" fill="#ffffff" filter="url(#whiteGlow)" /></g>
                <g id="node-sq"><rect x="-14" y="-14" width="28" height="28" fill="#2D2D2D" stroke="#ffffff" stroke-width="2" /><rect x="-5" y="-5" width="10" height="10" fill="#ffffff" /></g>
                <g id="node-circ"><circle cx="0" cy="0" r="14" fill="#2D2D2D" stroke="#ffffff" stroke-width="2" /><circle cx="0" cy="0" r="5" fill="#ffffff" /></g>
                <circle id="junc-dot" cx="0" cy="0" r="3.5" fill="#E7E70D" />
                <g id="junc-bus"><circle cx="0" cy="0" r="7" fill="none" stroke="#E7E70D" stroke-width="1.5" stroke-opacity="0.6" filter="url(#neonGlow)"/><circle cx="0" cy="0" r="3" fill="#E7E70D" filter="url(#neonGlow)" /></g>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotGrid)" />
            <line x1="0" y1="185" x2="760" y2="185" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08" />
            <line x1="0" y1="215" x2="760" y2="215" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08" />
            <line x1="0" y1="200" x2="760" y2="200" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.75" />
            <line x1="0" y1="194" x2="760" y2="194" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4" class="flow-line" />
            <line x1="0" y1="206" x2="760" y2="206" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
            <line x1="180" y1="200" x2="220" y2="200" stroke="#ffffff" stroke-width="5" stroke-opacity="0.5" />
            <line x1="500" y1="200" x2="530" y2="200" stroke="#ffffff" stroke-width="5" stroke-opacity="0.3" />
            <!-- Cluster 1: Top Left Hexagons -->
            <path d="M 200 200 L 200 120" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 100 120 L 300 120" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 100 120 L 100 80" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 200 120 L 200 60" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 300 120 L 300 140" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 204 190 L 204 124 L 296 124 L 296 140" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" class="flow-line" />
            <use href="#junc-bus" x="200" y="200" /><use href="#junc-dot" x="200" y="120" /><use href="#junc-dot" x="100" y="120" />
            <use href="#node-hex" x="100" y="80" /><use href="#node-hex" x="200" y="60" /><use href="#node-hex" x="300" y="140" />
            <!-- Cluster 2: Top Right Diamonds -->
            <path d="M 500 200 L 500 80" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" />
            <path d="M 600 200 L 600 60" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" />
            <path d="M 700 200 L 700 100" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" />
            <line x1="500" y1="120" x2="700" y2="120" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <line x1="600" y1="160" x2="700" y2="160" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.2" />
            <path d="M 506 200 L 506 126 L 594 126 L 594 60" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" class="flow-line" />
            <use href="#junc-bus" x="500" y="200" /><use href="#junc-bus" x="600" y="200" /><use href="#junc-bus" x="700" y="200" />
            <circle cx="500" cy="120" r="2.5" fill="#E7E70D" /><circle cx="600" cy="120" r="2.5" fill="#E7E70D" /><circle cx="700" cy="120" r="2.5" fill="#E7E70D" />
            <circle cx="600" cy="160" r="2.5" fill="#ffffff" opacity="0.8" /><circle cx="700" cy="160" r="2.5" fill="#ffffff" opacity="0.8" />
            <use href="#node-dia" x="500" y="80" /><use href="#node-dia" x="600" y="60" /><use href="#node-dia" x="700" y="100" />
            <!-- Cluster 3: Bottom Left Squares -->
            <path d="M 140 320 L 140 260 L 240 260 L 240 200" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 240 360 L 240 260" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 340 280 L 340 240 L 280 240 L 280 200" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <line x1="240" y1="240" x2="280" y2="240" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 144 320 L 144 264 L 236 264 L 236 200" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" class="flow-line" />
            <use href="#junc-bus" x="240" y="200" /><use href="#junc-bus" x="280" y="200" />
            <use href="#junc-dot" x="140" y="260" /><use href="#junc-dot" x="240" y="260" /><use href="#junc-dot" x="240" y="240" /><use href="#junc-dot" x="280" y="240" /><use href="#junc-dot" x="340" y="240" />
            <use href="#node-sq" x="140" y="320" /><use href="#node-sq" x="240" y="360" /><use href="#node-sq" x="340" y="280" />
            <!-- Cluster 4: Bottom Right Circles -->
            <path d="M 460 340 L 460 320 L 500 280 L 500 200" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 560 300 L 560 260 L 520 220 L 520 200" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 660 340 L 660 300 L 580 220 L 545 220 L 545 200" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
            <path d="M 656 340 L 656 302 L 582 228 L 549 228" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" class="flow-line" />
            <use href="#junc-dot" x="460" y="320" /><use href="#junc-dot" x="500" y="280" /><use href="#junc-dot" x="560" y="260" /><use href="#junc-dot" x="520" y="220" />
            <use href="#junc-dot" x="660" y="300" /><use href="#junc-dot" x="580" y="220" /><use href="#junc-dot" x="545" y="220" />
            <use href="#node-circ" x="460" y="340" /><use href="#node-circ" x="560" y="300" /><use href="#node-circ" x="660" y="340" />
            <!-- Ambient details -->
            <rect x="198" y="150" width="4" height="4" fill="#ffffff" opacity="0.8" />
            <rect x="250" y="118" width="4" height="4" fill="#ffffff" opacity="0.5" />
            <rect x="600" y="100" width="4" height="4" fill="#ffffff" opacity="0.8" />
            <rect x="240" y="300" width="4" height="4" fill="#ffffff" opacity="0.9" />
            <line x1="20" y1="190" x2="20" y2="210" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />
            <line x1="740" y1="190" x2="740" y2="210" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />
        </svg>
        <div style="position:absolute;inset:0;background:linear-gradient(to top right, transparent, rgba(255,255,255,0.03), transparent);pointer-events:none;border-radius:12px;"></div>
    </div>
</body>
</html>

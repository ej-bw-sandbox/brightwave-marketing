<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Apps</title>
    <style>
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .pulse-core { transform-origin: center; animation: pulse-slow 4s infinite ease-in-out; }
        .spin-slow { transform-origin: center; animation: spin 30s linear infinite; }
        .spin-reverse-slow { transform-origin: center; animation: spin-reverse 40s linear infinite; }
        .data-flow-1 { stroke-dasharray: 4 12; animation: flow 20s linear infinite; }
        .data-flow-2 { stroke-dasharray: 2 8; animation: flow-reverse 15s linear infinite; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.2; transform: scale(0.9); } 50% { opacity: 0.5; transform: scale(1.1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes flow { to { stroke-dashoffset: -100; } }
        @keyframes flow-reverse { to { stroke-dashoffset: 100; } }
    </style>
</head>
<body>
    <div style="width:760px;height:400px;background:#2D2D2D;position:relative;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,0.05);">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
            </defs>
            <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
                <line x1="190" y1="0" x2="190" y2="400" /><line x1="380" y1="0" x2="380" y2="400" /><line x1="570" y1="0" x2="570" y2="400" />
                <line x1="0" y1="100" x2="760" y2="100" /><line x1="0" y1="200" x2="760" y2="200" /><line x1="0" y1="300" x2="760" y2="300" />
            </g>
            <g stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none">
                <path d="M 380 200 L 480 100 L 650 100 L 650 180" stroke-dasharray="4 4" />
                <path d="M 280 200 L 280 300 L 160 300 L 100 240" stroke-dasharray="2 4" />
                <path d="M 380 200 L 380 60 L 220 60 L 220 120" />
                <path d="M 500 200 L 500 280 L 600 280" />
                <path d="M 380 200 L 480 100 L 650 100 L 650 180" class="data-flow-1" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                <path d="M 280 200 L 280 300 L 160 300 L 100 240" class="data-flow-2" stroke="rgba(231,231,13,0.3)" stroke-width="1.5"/>
            </g>
            <g stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none" stroke-linejoin="round">
                <path d="M 420 200 L 520 200 L 580 140 L 580 80" />
                <path d="M 420 200 L 600 200 L 660 260 L 680 260" />
                <path d="M 380 240 L 380 280 L 420 320 L 540 320 L 580 280" />
                <path d="M 380 240 L 380 280 L 300 360 L 180 360 L 140 320" />
                <path d="M 300 360 L 300 380" />
                <path d="M 340 200 L 240 200 L 200 160 L 80 160" />
                <path d="M 380 160 L 380 100 L 340 60 L 160 60 L 140 80" />
            </g>
            <g transform="translate(568, 68)"><rect width="24" height="24" stroke="#ffffff" stroke-width="2" fill="#2D2D2D" /><rect x="8" y="8" width="8" height="8" fill="#ffffff" /></g>
            <g transform="translate(680, 260)"><circle cx="0" cy="0" r="14" stroke="#ffffff" stroke-width="2" fill="#2D2D2D" /><circle cx="0" cy="0" r="6" stroke="#ffffff" stroke-width="1" fill="none" /></g>
            <g transform="translate(540, 320)"><rect x="-8" y="-8" width="16" height="16" stroke="#ffffff" stroke-width="2" fill="#2D2D2D" transform="rotate(45)" /><circle cx="0" cy="0" r="3" fill="#E7E70D" /></g>
            <g transform="translate(580, 280)"><circle cx="0" cy="0" r="8" fill="#ffffff" /></g>
            <g transform="translate(140, 320)"><rect x="-16" y="-16" width="32" height="32" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" /><rect x="-10" y="-10" width="20" height="20" fill="#ffffff" /></g>
            <g transform="translate(80, 160)"><rect x="-12" y="-12" width="24" height="24" stroke="#ffffff" stroke-width="2" fill="#2D2D2D" transform="rotate(45)" /><line x1="-8" y1="0" x2="8" y2="0" stroke="#ffffff" stroke-width="1" /><line x1="0" y1="-8" x2="0" y2="8" stroke="#ffffff" stroke-width="1" /></g>
            <g transform="translate(140, 80)"><circle cx="0" cy="0" r="16" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-dasharray="2 3" /><circle cx="0" cy="0" r="8" fill="#ffffff" /></g>
            <circle cx="650" cy="180" r="4" fill="#ffffff" />
            <circle cx="220" cy="120" r="3" stroke="#ffffff" stroke-width="1" fill="none" />
            <rect x="298" y="378" width="4" height="4" fill="#ffffff" />
            <g style="mix-blend-mode: screen;">
                <circle cx="520" cy="200" r="12" fill="#E7E70D" opacity="0.1" /><circle cx="520" cy="200" r="4" fill="#E7E70D" />
                <circle cx="580" cy="140" r="3" fill="#E7E70D" />
                <circle cx="600" cy="200" r="12" fill="#E7E70D" opacity="0.15" /><circle cx="600" cy="200" r="4" fill="#E7E70D" />
                <circle cx="420" cy="320" r="4" fill="#E7E70D" />
                <circle cx="300" cy="360" r="8" fill="#E7E70D" opacity="0.1" /><circle cx="300" cy="360" r="4" fill="#E7E70D" />
                <circle cx="240" cy="200" r="4" fill="#E7E70D" /><circle cx="200" cy="160" r="3" fill="#E7E70D" />
                <circle cx="340" cy="60" r="12" fill="#E7E70D" opacity="0.1" /><circle cx="340" cy="60" r="4" fill="#E7E70D" />
                <circle cx="160" cy="60" r="3" fill="#E7E70D" />
            </g>
            <g transform="translate(380, 200)">
                <circle cx="0" cy="0" r="55" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" />
                <circle cx="0" cy="0" r="40" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none" stroke-dasharray="4 6" class="spin-slow" />
                <circle cx="0" cy="0" r="32" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" stroke-dasharray="1 3" class="spin-reverse-slow" />
                <circle cx="0" cy="0" r="24" stroke="#ffffff" stroke-width="2" fill="#2D2D2D" />
                <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="1.5" transform="rotate(45)" />
                <rect x="-8" y="-8" width="16" height="16" fill="#ffffff" />
                <circle cx="0" cy="0" r="18" fill="#E7E70D" class="pulse-core" style="mix-blend-mode: plus-lighter;" />
                <circle cx="0" cy="0" r="4" fill="#E7E70D" filter="url(#glow)" />
                <circle cx="0" cy="0" r="2" fill="#ffffff" />
            </g>
            <g fill="#ffffff" opacity="0.15">
                <rect x="50" y="30" width="2" height="2" /><rect x="700" y="50" width="4" height="4" transform="rotate(45 700 50)" />
                <circle cx="620" cy="350" r="1.5" /><circle cx="80" cy="280" r="2" /><polygon points="450,40 454,46 446,46" />
            </g>
        </svg>
    </div>
</body>
</html>

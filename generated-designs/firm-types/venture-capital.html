            flex-shrink: 0;

        @keyframes pulse-origin {
            0% { filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.4)); }
            50% { filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9)); }
            100% { filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.4)); }
        }
        .origin-glow { animation: pulse-origin 4s ease-in-out infinite; }
        .glow-yellow { filter: drop-shadow(0 0 8px rgba(231, 231, 13, 0.8)); }
        .glow-white { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6)); }
        @keyframes drawLine {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }
        .anim-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-line-delay-1 { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 3s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards; }
        .anim-line-delay-2 { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 3s cubic-bezier(0.2, 0.8, 0.2, 1) 1s forwards; }

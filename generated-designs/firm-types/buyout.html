<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyout Illustration</title>
    <style>
        body {
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(231, 231, 13, 0.4)); opacity: 1; }
            50% { filter: drop-shadow(0 0 12px rgba(231, 231, 13, 0.9)); opacity: 0.8; }
        }
        @keyframes data-flow {
            0% { stroke-dashoffset: 40; }
            100% { stroke-dashoffset: 0; }
        }
        .anim-glow {
            animation: pulse-glow 4s infinite ease-in-out;
        }
        .anim-flow {
            stroke-dasharray: 4 8;
            animation: data-flow 1.5s linear infinite;
        }
    </style>
</head>
<body>
    <div style="position:relative;width:760px;height:400px;background:#2D2D2D;box-shadow:0 20px 50px rgba(0,0,0,0.5);border-radius:2px;overflow:hidden;flex-shrink:0;">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;">
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur1" />
                    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
            <g id="environmental-scaffolding">
                <line x1="0" y1="200" x2="760" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
                <line x1="380" y1="0" x2="380" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
                <line x1="0" y1="80" x2="760" y2="80" stroke="rgba(255,255,255,0.015)" stroke-width="1" />
                <line x1="0" y1="320" x2="760" y2="320" stroke="rgba(255,255,255,0.015)" stroke-width="1" />
                <line x1="80" y1="0" x2="80" y2="400" stroke="rgba(255,255,255,0.015)" stroke-width="1" />
                <line x1="680" y1="0" x2="680" y2="400" stroke="rgba(255,255,255,0.015)" stroke-width="1" />
                <path d="M -20 360 H 260 L 320 300 V 230" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="16" stroke-linejoin="round" />
                <path d="M 780 40 H 500 L 440 100 V 170" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="16" stroke-linejoin="round" />
                <circle cx="380" cy="200" r="240" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
                <circle cx="380" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="1 4" />
                <circle cx="380" cy="200" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 6" />
                <circle cx="380" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="2 4" />
            </g>
            <g id="network-tertiary" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linejoin="round">
                <path d="M 40 120 H 100 L 120 140" />
                <path d="M 80 50 V 90 L 120 130" />
                <path d="M 720 160 H 660 L 640 180" />
                <path d="M 680 80 V 120 L 640 160" />
                <path d="M 120 280 H 140 L 160 260" />
                <path d="M 620 120 H 600 L 580 140" stroke-dasharray="2 2"/>
            </g>
            <g id="network-secondary" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linejoin="round">
                <path d="M 120 140 L 160 140 H 180" />
                <path d="M 120 130 L 130 140 H 160" />
                <path d="M 120 320 H 140 L 160 260" />
                <path d="M 640 180 L 620 180 H 580" />
                <path d="M 640 160 L 630 180" />
            </g>
            <g id="network-primary" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round">
                <path d="M 180 140 L 220 180 H 260" />
                <path d="M 160 260 L 200 220 H 240 L 260 200 V 180" />
                <path d="M 580 180 L 540 220 H 500" />
                <path d="M 620 300 L 580 260 H 520 L 500 240 V 220" />
                <path d="M 380 40 V 100 L 360 120 V 150" stroke-width="2" stroke="rgba(255,255,255,0.7)"/>
                <path d="M 380 360 V 300 L 400 280 V 250" stroke-width="2" stroke="rgba(255,255,255,0.7)"/>
            </g>
            <g id="network-core-trunks" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="miter">
                <path d="M 260 180 L 280 200 H 330" />
                <path d="M 500 220 L 480 200 H 430" />
                <path d="M 380 100 V 150" />
                <path d="M 380 300 V 250" />
            </g>
            <g id="data-packets" fill="none" stroke-width="3">
                <line x1="60" y1="120" x2="80" y2="120" stroke="#FFFFFF" />
                <line x1="680" y1="180" x2="655" y2="180" stroke="#E7E70D" />
                <line x1="380" y1="60" x2="380" y2="85" stroke="#FFFFFF" stroke-width="5" />
                <line x1="190" y1="150" x2="205" y2="165" stroke="#E7E70D" />
                <line x1="565" y1="195" x2="550" y2="210" stroke="#FFFFFF" />
                <path d="M 280 200 H 325" stroke="#E7E70D" stroke-width="2" class="anim-flow" />
            </g>
            <g id="peripheral-nodes">
                <circle cx="120" cy="140" r="4" fill="#FFFFFF" />
                <rect x="76" y="46" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                <rect x="175" y="135" width="10" height="10" fill="none" stroke="#FFFFFF" stroke-width="2" />
                <polygon points="160,254 166,260 160,266 154,260" fill="#FFFFFF" />
                <circle cx="280" cy="200" r="6" fill="#FFFFFF" />
                <rect x="636" y="176" width="8" height="8" fill="#FFFFFF" />
                <circle cx="580" cy="180" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" />
                <polygon points="480,192 488,200 480,208 472,200" fill="#FFFFFF" />
                <circle cx="620" cy="300" r="4" fill="#FFFFFF" />
                <rect x="676" y="76" width="8" height="8" fill="none" stroke="#FFFFFF" stroke-width="1" />
                <rect x="375" y="95" width="10" height="10" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
                <circle cx="380" cy="300" r="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
                <circle cx="360" cy="120" r="3" fill="#FFFFFF" />
            </g>
            <g id="voltage-junctions" fill="#E7E70D">
                <circle cx="220" cy="180" r="2" />
                <circle cx="260" cy="200" r="3" />
                <circle cx="540" cy="220" r="2.5" />
                <circle cx="500" cy="240" r="3" />
                <circle cx="380" cy="40" r="4" />
                <polygon points="260,170 270,180 260,190 250,180" class="anim-glow" />
                <rect x="494" y="214" width="12" height="12" class="anim-glow" />
                <polygon points="380,355 386,360 380,365 374,360" />
                <path d="M 370 110 L 380 100 L 390 110" fill="none" stroke="#E7E70D" stroke-width="1.5" stroke-linejoin="miter" />
                <path d="M 370 290 L 380 300 L 390 290" fill="none" stroke="#E7E70D" stroke-width="1.5" stroke-linejoin="miter" />
            </g>
            <g id="monolith-core">
                <polygon points="380,100 480,200 380,300 280,200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4 4" />
                <polygon points="380,130 450,200 380,270 310,200" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <polygon points="380,150 430,200 380,250 330,200" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="miter" />
                <polygon points="380,165 415,200 380,235 345,200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <polygon points="380,175 405,200 380,225 355,200" fill="#FFFFFF" />
                <polygon points="380,192 388,200 380,208 372,200" fill="#E7E70D" filter="url(#neon-glow)" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5">
                <path d="M 20 40 L 20 20 L 40 20" />
                <path d="M 740 20 L 740 40 M 740 20 L 720 20" />
                <path d="M 20 360 L 20 380 L 40 380" />
                <path d="M 740 360 L 740 380 L 720 380" />
            </g>
        </svg>
    </div>
</body>
</html>

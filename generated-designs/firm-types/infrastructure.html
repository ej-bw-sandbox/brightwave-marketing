<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Illustration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .line-bg { stroke: #ffffff; stroke-width: 1px; stroke-opacity: 0.06; }
        .line-m-light { stroke: #ffffff; stroke-width: 1px; stroke-opacity: 0.15; }
        .line-m { stroke: #ffffff; stroke-width: 1.5px; stroke-opacity: 0.4; }
        .line-fg { stroke: #ffffff; stroke-width: 2px; stroke-opacity: 0.8; }
        .line-accent { stroke: #E7E70D; stroke-width: 1px; stroke-opacity: 0.6; stroke-dasharray: 4 4; }
        .node-w { fill: #ffffff; }
        .node-w-hollow { fill: #2D2D2D; stroke: #ffffff; stroke-width: 1.5px; }
        .node-y { fill: #E7E70D; }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <g id="n-circle-s"><circle cx="0" cy="0" r="3" class="node-w" /></g>
                <g id="n-circle-m"><circle cx="0" cy="0" r="4.5" class="node-w" /></g>
                <g id="n-circle-hollow"><circle cx="0" cy="0" r="5" class="node-w-hollow" /></g>
                <g id="n-square-s"><rect x="-3" y="-3" width="6" height="6" class="node-w" /></g>
                <g id="n-square-hollow"><rect x="-4.5" y="-4.5" width="9" height="9" class="node-w-hollow" /></g>
                <g id="n-hex"><polygon points="0,-4.6 4,-2.3 4,2.3 0,4.6 -4,2.3 -4,-2.3" class="node-w" transform="scale(1.1)" /></g>
                <g id="n-hex-hollow"><polygon points="0,-5.8 5,-2.9 5,2.9 0,5.8 -5,2.9 -5,-2.9" class="node-w-hollow" /></g>
                <g id="n-yellow"><circle cx="0" cy="0" r="4" class="node-y" /></g>
                <g id="n-yellow-glow">
                    <circle cx="0" cy="0" r="10" class="node-y" opacity="0.15" />
                    <circle cx="0" cy="0" r="6" class="node-y" opacity="0.4" />
                    <circle cx="0" cy="0" r="4" class="node-y" />
                </g>
            </defs>
            <g class="line-bg">
                <line x1="0" y1="40" x2="760" y2="40" />
                <line x1="0" y1="100" x2="760" y2="100" />
                <line x1="0" y1="160" x2="760" y2="160" />
                <line x1="0" y1="220" x2="760" y2="220" />
                <line x1="0" y1="280" x2="760" y2="280" />
                <line x1="0" y1="360" x2="760" y2="360" />
                <line x1="40" y1="0" x2="40" y2="400" />
                <line x1="120" y1="0" x2="120" y2="400" />
                <line x1="280" y1="0" x2="280" y2="400" />
                <line x1="480" y1="0" x2="480" y2="400" />
                <line x1="640" y1="0" x2="640" y2="400" />
                <line x1="720" y1="0" x2="720" y2="400" />
            </g>
            <g class="line-m-light">
                <path d="M 60 160 L 260 160 M 60 220 L 260 220 M 60 280 L 260 280" />
                <path d="M 60 160 L 60 360 M 100 160 L 100 280 M 140 160 L 140 360 M 180 160 L 180 280 M 220 160 L 220 360 M 260 160 L 260 360" />
                <path d="M 60 220 L 100 160 M 100 220 L 140 160 M 140 220 L 180 160 M 180 220 L 220 160 M 220 220 L 260 160" />
                <path d="M 60 160 L 100 220 M 100 160 L 140 220 M 140 160 L 180 220 M 180 160 L 220 220 M 220 160 L 260 220" />
                <path d="M 320 360 L 380 260 L 440 360" />
                <path d="M 330 300 L 430 300" />
                <path d="M 340 240 L 420 240" />
                <path d="M 350 180 L 410 180" />
                <path d="M 360 120 L 400 120" />
                <path d="M 370 60 L 390 60" />
                <path d="M 520 280 L 700 280 M 520 320 L 700 320 M 520 360 L 700 360" />
                <path d="M 520 200 L 520 360 M 560 220 L 560 360 M 600 240 L 600 360 M 640 260 L 640 360 M 680 280 L 680 360" />
            </g>
            <g class="line-m">
                <line x1="260" y1="220" x2="340" y2="220" />
                <line x1="420" y1="280" x2="520" y2="280" />
                <line x1="400" y1="180" x2="560" y2="220" />
                <line x1="220" y1="120" x2="360" y2="120" />
            </g>
            <g class="line-fg">
                <line x1="380" y1="360" x2="380" y2="40" />
                <path d="M 310 360 L 350 180 L 375 40" fill="none" />
                <path d="M 450 360 L 410 180 L 385 40" fill="none" />
                <line x1="320" y1="360" x2="440" y2="360" />
                <line x1="345" y1="280" x2="415" y2="280" />
                <line x1="40" y1="160" x2="280" y2="160" />
                <line x1="40" y1="220" x2="280" y2="220" />
                <line x1="140" y1="220" x2="140" y2="360" />
                <line x1="220" y1="220" x2="220" y2="320" />
                <line x1="40" y1="360" x2="720" y2="360" />
                <path d="M 520 280 L 680 280" />
                <path d="M 520 200 L 600 240 L 680 280 L 720 280" fill="none" />
                <line x1="600" y1="360" x2="600" y2="240" />
                <line x1="680" y1="360" x2="680" y2="140" />
                <line x1="620" y1="140" x2="720" y2="140" />
                <line x1="680" y1="140" x2="650" y2="200" />
            </g>
            <g class="line-accent">
                <line x1="140" y1="160" x2="140" y2="80" />
                <line x1="140" y1="80" x2="330" y2="80" />
                <line x1="450" y1="140" x2="620" y2="140" />
                <line x1="430" y1="360" x2="520" y2="280" />
            </g>
            <use href="#n-square-s" x="60" y="160" />
            <use href="#n-square-s" x="100" y="160" />
            <use href="#n-hex-hollow" x="140" y="160" />
            <use href="#n-circle-m" x="180" y="160" />
            <use href="#n-hex-hollow" x="220" y="160" />
            <use href="#n-square-s" x="260" y="160" />
            <use href="#n-circle-s" x="280" y="160" />
            <use href="#n-square-hollow" x="140" y="220" />
            <use href="#n-circle-hollow" x="220" y="220" />
            <use href="#n-circle-s" x="140" y="280" />
            <use href="#n-circle-s" x="140" y="360" />
            <use href="#n-circle-s" x="220" y="320" />
            <use href="#n-hex" x="380" y="40" />
            <use href="#n-circle-s" x="375" y="40" />
            <use href="#n-circle-s" x="385" y="40" />
            <use href="#n-square-s" x="380" y="120" />
            <use href="#n-circle-hollow" x="380" y="180" />
            <use href="#n-hex-hollow" x="380" y="240" />
            <use href="#n-square-hollow" x="380" y="280" />
            <use href="#n-hex" x="380" y="360" />
            <use href="#n-circle-s" x="360" y="120" />
            <use href="#n-circle-s" x="400" y="120" />
            <use href="#n-square-s" x="350" y="180" />
            <use href="#n-square-s" x="410" y="180" />
            <use href="#n-circle-m" x="340" y="240" />
            <use href="#n-circle-m" x="420" y="240" />
            <use href="#n-square-hollow" x="320" y="360" />
            <use href="#n-square-hollow" x="440" y="360" />
            <use href="#n-hex-hollow" x="520" y="200" />
            <use href="#n-circle-hollow" x="520" y="280" />
            <use href="#n-circle-s" x="520" y="360" />
            <use href="#n-circle-m" x="600" y="240" />
            <use href="#n-square-s" x="600" y="360" />
            <use href="#n-square-hollow" x="680" y="280" />
            <use href="#n-circle-s" x="680" y="360" />
            <use href="#n-square-s" x="720" y="280" />
            <use href="#n-hex" x="680" y="140" />
            <use href="#n-circle-s" x="650" y="200" />
            <use href="#n-yellow-glow" x="180" y="220" />
            <use href="#n-yellow-glow" x="345" y="280" />
            <use href="#n-yellow-glow" x="415" y="280" />
            <use href="#n-yellow-glow" x="380" y="80" />
            <use href="#n-yellow" x="330" y="80" />
            <use href="#n-yellow" x="140" y="80" />
            <use href="#n-yellow-glow" x="620" y="140" />
            <use href="#n-yellow" x="450" y="140" />
        </svg>
    </div>
</body>
</html>

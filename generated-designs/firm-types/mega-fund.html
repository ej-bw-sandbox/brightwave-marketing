<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega-Cap PE Illustration</title>
    <style>
        body {
            background-color: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            position: relative;
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 2px;
            flex-shrink: 0;
        }
        @keyframes pulse-flow {
            0% { stroke-dashoffset: 200; }
            100% { stroke-dashoffset: 0; }
        }
        .animated-path { stroke-dasharray: 4 6; animation: pulse-flow 15s linear infinite; }
        .animated-path-reverse { stroke-dasharray: 2 8; animation: pulse-flow 20s linear infinite reverse; }
    </style>
</head>
<body>
    <div class="card">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">
            <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
                </pattern>
                <pattern id="micro-grid" width="4" height="4" patternUnits="userSpaceOnUse">
                    <rect width="4" height="4" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.5" />
                </pattern>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
            <g stroke="rgba(255, 255, 255, 0.04)" fill="none">
                <circle cx="200" cy="200" r="280" stroke-width="1" />
                <circle cx="200" cy="200" r="285" stroke-width="0.5" stroke-dasharray="2 4" />
                <circle cx="200" cy="200" r="380" stroke-width="2" />
                <circle cx="580" cy="200" r="160" stroke-width="1" />
                <circle cx="580" cy="200" r="240" stroke-width="0.5" stroke-dasharray="1 6" />
                <circle cx="380" cy="800" r="650" stroke-width="4" stroke="rgba(255,255,255,0.02)" />
            </g>
            <g fill="none">
                <g stroke="rgba(255,255,255,0.15)" stroke-width="0.5">
                    <path d="M 0 40 L 760 40" stroke-dasharray="4 4" />
                    <path d="M 0 360 L 760 360" stroke-dasharray="4 4" />
                    <path d="M 200 0 L 200 400" />
                    <path d="M 580 0 L 580 400" />
                    <path d="M -50 150 L 200 400" />
                    <path d="M -50 250 L 200 0" />
                    <path d="M 580 0 L 780 200" />
                    <path d="M 580 400 L 780 200" />
                </g>
                <g stroke="#FFFFFF" stroke-linejoin="round">
                    <line x1="320" y1="200" x2="480" y2="200" stroke-width="3" />
                    <line x1="316" y1="192" x2="492" y2="192" stroke-width="1" />
                    <line x1="320" y1="196" x2="486" y2="196" stroke-width="1" />
                    <line x1="320" y1="204" x2="486" y2="204" stroke-width="1" />
                    <line x1="316" y1="208" x2="492" y2="208" stroke-width="1" />
                    <path d="M 304 140 L 374 70 L 760 70" stroke-width="2" />
                    <path d="M 304 135 L 369 70" stroke-width="0.5" />
                    <path d="M 390 70 L 760 70" stroke-width="0.5" class="animated-path" />
                    <path d="M 304 260 L 374 330 L 760 330" stroke-width="2" />
                    <path d="M 390 330 L 760 330" stroke-width="0.5" class="animated-path-reverse" />
                    <line x1="680" y1="200" x2="760" y2="200" stroke-width="3" />
                    <line x1="676" y1="196" x2="760" y2="196" stroke-width="0.5" />
                    <line x1="676" y1="204" x2="760" y2="204" stroke-width="0.5" />
                    <path d="M 96 140 L 36 80 L 0 80" stroke-width="1.5" />
                    <path d="M 96 260 L 36 320 L 0 320" stroke-width="1.5" />
                    <path d="M 80 200 L 0 200" stroke-width="2" />
                    <path d="M 200 80 L 200 0" stroke-width="2" />
                    <path d="M 200 320 L 200 400" stroke-width="2" />
                </g>
            </g>
            <g transform="translate(0,0)">
                <polygon points="200,40 360,200 200,360 40,200" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                <polygon points="200,50 350,200 200,350 50,200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                <polygon points="200,80 304,140 304,260 200,320 96,260 96,140" fill="rgba(30,30,30,0.8)" stroke="#FFFFFF" stroke-width="2" />
                <g clip-path="url(#hex-clip)">
                    <clipPath id="hex-clip">
                        <polygon points="200,90 295,145 295,255 200,310 105,255 105,145" />
                    </clipPath>
                    <rect x="100" y="80" width="220" height="250" fill="url(#micro-grid)" opacity="0.5" />
                    <circle cx="200" cy="200" r="60" fill="#2D2D2D" />
                </g>
                <circle cx="200" cy="200" r="70" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="4 4" />
                <polygon points="200,140 260,200 200,260 140,200" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
                <rect x="188" y="188" width="24" height="24" fill="#FFFFFF" transform="rotate(45 200 200)" />
            </g>
            <g transform="translate(0,0)">
                <circle cx="580" cy="200" r="100" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <polygon points="580,100 680,200 580,300 480,200" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="2" />
                <path d="M 500 180 L 660 180 M 490 200 L 670 200 M 500 220 L 660 220" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <circle cx="580" cy="200" r="40" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1" />
                <polygon points="580,175 601,187 601,212 580,225 559,212 559,187" fill="#FFFFFF" />
            </g>
            <g fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5">
                <rect x="364" y="60" width="20" height="20" transform="rotate(45 374 70)" />
                <circle cx="550" cy="70" r="8" />
                <polygon points="650,60 658,65 658,75 650,80 642,75 642,65" fill="#FFFFFF" />
                <rect x="364" y="320" width="20" height="20" transform="rotate(45 374 330)" />
                <circle cx="620" cy="330" r="6" fill="#FFFFFF" />
                <circle cx="480" cy="330" r="8" />
                <polygon points="36,70 44,75 44,85 36,90 28,85 28,75" />
                <polygon points="36,310 44,315 44,325 36,330 28,325 28,315" />
                <rect x="-5" y="195" width="10" height="10" fill="#FFFFFF" />
                <circle cx="480" cy="200" r="6" />
                <circle cx="680" cy="200" r="6" />
            </g>
            <g fill="#E7E70D" filter="url(#glow)">
                <circle cx="400" cy="200" r="3" />
                <circle cx="440" cy="192" r="2" />
                <circle cx="460" cy="208" r="2" />
                <circle cx="720" cy="200" r="3" />
                <circle cx="200" cy="200" r="5" />
                <circle cx="200" cy="80" r="3.5" />
                <circle cx="200" cy="320" r="3.5" />
                <circle cx="96" cy="140" r="3.5" />
                <circle cx="96" cy="260" r="3.5" />
                <circle cx="304" cy="140" r="3.5" />
                <circle cx="304" cy="260" r="3.5" />
                <circle cx="140" cy="200" r="3" />
                <circle cx="260" cy="200" r="3" />
                <circle cx="580" cy="200" r="3" />
                <circle cx="374" cy="70" r="3" />
                <circle cx="374" cy="330" r="3" />
                <circle cx="700" cy="70" r="2" />
                <circle cx="680" cy="330" r="2" />
                <circle cx="60" cy="80" r="2" />
                <circle cx="60" cy="320" r="2" />
                <circle cx="260" cy="65" r="1.5" />
                <circle cx="110" cy="340" r="2" />
                <circle cx="520" cy="120" r="1.5" />
                <circle cx="640" cy="280" r="2" />
            </g>
            <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.3">
                <path d="M 20 40 L 20 20 L 40 20" />
                <path d="M 20 360 L 20 380 L 40 380" />
                <path d="M 740 40 L 740 20 L 720 20" />
                <path d="M 740 360 L 740 380 L 720 380" />
                <line x1="380" y1="0" x2="380" y2="8" stroke-width="1" />
                <line x1="380" y1="392" x2="380" y2="400" stroke-width="1" />
                <line x1="0" y1="200" x2="8" y2="200" stroke-width="1" />
                <line x1="752" y1="200" x2="760" y2="200" stroke-width="1" />
            </g>
        </svg>
    </div>
</body>
</html>

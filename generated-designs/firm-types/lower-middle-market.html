<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Mid-Market Illustration</title>
    <style>
        body {
            background-color: #0A0A0A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
            overflow: hidden;
            border-radius: 2px;
        }
        @keyframes pulse-yellow {
            0%, 100% { fill-opacity: 1; transform: scale(1); }
            50% { fill-opacity: 0.6; transform: scale(0.8); }
        }
        @keyframes flow-line {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        .accent-node { animation: pulse-yellow 4s infinite ease-in-out; transform-origin: center; transform-box: fill-box; }
        .accent-node:nth-child(even) { animation-delay: -2s; animation-duration: 5s; }
        .accent-ring { animation: pulse-yellow 6s infinite ease-in-out; transform-origin: center; transform-box: fill-box; }
        .data-flow { stroke-dasharray: 4 8; animation: flow-line 20s linear infinite; }
        .data-flow-reverse { stroke-dasharray: 2 12; animation: flow-line 30s linear infinite reverse; }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
                <line x1="0" y1="80" x2="760" y2="80" />
                <line x1="0" y1="160" x2="760" y2="160" />
                <line x1="0" y1="240" x2="760" y2="240" />
                <line x1="0" y1="320" x2="760" y2="320" />

                <line x1="240" y1="0" x2="240" y2="400" />
                <line x1="380" y1="0" x2="380" y2="400" />
                <line x1="520" y1="0" x2="520" y2="400" />
                <line x1="640" y1="0" x2="640" y2="400" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.75" stroke-linejoin="round">
                <path d="M 80 140 L 120 140 L 160 180 L 160 220 L 220 280 L 280 280" />
                <path d="M 120 140 L 120 200 L 160 200 L 180 220 L 180 280" />
                <path d="M 60 200 L 120 200" />
                <path d="M 160 180 L 210 130 L 260 130" />
                <path d="M 280 280 L 320 280 L 360 240 L 420 240 L 460 200 L 520 200" />
                <path d="M 320 280 L 340 300 L 400 300 L 420 280 L 420 240" />
                <path d="M 360 240 L 360 160 L 380 140 L 440 140" />
                <path d="M 260 130 L 280 150 L 280 240 L 320 280" />
                <path d="M 380 320 L 400 300 L 460 300 L 480 280 L 480 240 L 460 220 L 460 200" />
                <path d="M 300 220 L 340 220 L 360 240" />
                <path d="M 520 200 L 560 200 L 600 160 L 660 160 L 680 140" />
                <path d="M 560 200 L 580 220 L 640 220 L 660 200 L 660 160" />
                <path d="M 460 120 L 480 140 L 540 140 L 560 120 L 620 120 L 660 160" />
                <path d="M 600 280 L 640 280 L 660 260 L 660 220" />
                <path d="M 520 200 L 520 260 L 540 280 L 600 280" />
                <path d="M 440 140 L 460 120" stroke-dasharray="2 2" />
                <path d="M 260 130 L 300 90 L 380 90 L 400 110 L 400 160" stroke-dasharray="1 3" />
                <path d="M 660 260 L 700 260 L 720 240" stroke-dasharray="2 4" />
                <path d="M 180 280 L 180 320 L 220 360 L 320 360 L 360 320" stroke-dasharray="1 2" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linejoin="miter">
                <path d="M 120 200 L 160 200 L 200 240 L 280 240 L 320 280 L 400 280 L 420 260 L 420 240 L 460 200 L 560 200 L 600 160" />
                <path d="M 280 240 L 280 150 L 320 110 L 420 110 L 460 150 L 460 200" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" class="data-flow">
                <path d="M 160 200 L 200 240 L 280 240 L 320 280 L 400 280" />

            <g fill="none" class="data-flow-reverse" stroke="#E7E70D" stroke-opacity="0.6" stroke-width="1">
                <path d="M 420 240 L 460 200 L 560 200 L 600 160" />

                <polygon points="280,236 284,240 280,244 276,240" />

                <polygon points="420,236 424,240 420,244 416,240" />

                <polygon points="560,196 564,200 560,204 556,200" />
                <polygon points="660,156 664,160 660,164 656,160" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2">
                <rect x="258" y="128" width="4" height="4" />
                <rect x="178" y="278" width="4" height="4" />
                <rect x="298" y="218" width="4" height="4" />
                <rect x="338" y="298" width="4" height="4" />
                <rect x="378" y="138" width="4" height="4" />
                <rect x="478" y="138" width="4" height="4" />
                <rect x="458" y="218" width="4" height="4" />
                <rect x="638" y="278" width="4" height="4" />
                <rect x="598" y="118" width="4" height="4" />
            </g>
            <g fill="white">
                <circle cx="80" cy="140" r="2" />
                <circle cx="60" cy="200" r="2" />
                <circle cx="220" cy="280" r="2" />
                <circle cx="210" cy="130" r="1.5" />
                <circle cx="360" cy="160" r="2" />
                <circle cx="340" cy="220" r="1.5" />
                <circle cx="480" cy="240" r="2" />
                <circle cx="480" cy="280" r="1.5" />
                <circle cx="580" cy="220" r="2" />
                <circle cx="620" cy="120" r="1.5" />
                <circle cx="680" cy="140" r="2" />
                <circle cx="660" cy="260" r="1.5" />
                <circle cx="700" cy="260" r="1" />
                <circle cx="520" cy="260" r="1.5" />
                <circle cx="400" cy="160" r="2" />
                <circle cx="290" cy="260" r="1" />

            </g>
            <g fill="none" stroke="white" stroke-width="1.5">
                <circle cx="160" cy="200" r="5" />
                <circle cx="460" cy="200" r="5" />
                <circle cx="320" cy="110" r="4" />
                <circle cx="600" cy="280" r="4" />
            </g>
            <g fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" class="accent-ring">
                <circle cx="120" cy="200" r="10" />
                <circle cx="320" cy="280" r="12" />
                <circle cx="600" cy="160" r="10" />
                <circle cx="280" cy="150" r="8" />
            </g>
            <g fill="#E7E70D">
                <circle cx="120" cy="200" r="2.5" class="accent-node" filter="url(#glow-yellow)" />
                <circle cx="320" cy="280" r="3" class="accent-node" filter="url(#glow-yellow)" />
                <circle cx="400" cy="280" r="2" />
                <circle cx="420" cy="240" r="2.5" class="accent-node" />
                <circle cx="280" cy="150" r="2.5" class="accent-node" />
                <circle cx="420" cy="110" r="2" />
                <circle cx="520" cy="200" r="2.5" />
                <circle cx="600" cy="160" r="3" class="accent-node" filter="url(#glow-yellow)" />
                <circle cx="640" cy="220" r="2" />
                <circle cx="660" cy="220" r="2.5" class="accent-node" />
            </g>
            <g stroke="rgba(255,255,255,0.2)" stroke-width="1">
                <line x1="20" y1="20" x2="30" y2="20" />
                <line x1="20" y1="20" x2="20" y2="30" />
                <line x1="20" y1="380" x2="30" y2="380" />
                <line x1="20" y1="370" x2="20" y2="380" />

                <line x1="740" y1="380" x2="730" y2="380" />
                <line x1="740" y1="370" x2="740" y2="380" />
                <line x1="377" y1="200" x2="383" y2="200" stroke="rgba(231,231,13,0.3)" />
                <line x1="380" y1="197" x2="380" y2="203" stroke="rgba(231,231,13,0.3)" />
            </g>
        </svg>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Credit Illustration</title>
    <style>
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            border-radius: 2px;
            flex-shrink: 0;
        }
        @keyframes dashFlow {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.3); opacity: 0.2; }
        }
        .flow-line { stroke-dasharray: 8 200; animation: dashFlow 4s linear infinite; }
        .flow-line-slow { stroke-dasharray: 12 300; animation: dashFlow 6s linear infinite; animation-delay: 1s; }
        .pulse-ring { transform-origin: center; transform-box: fill-box; animation: subtlePulse 4s ease-in-out infinite; }
        .pulse-ring-delayed { transform-origin: center; transform-box: fill-box; animation: subtlePulse 4s ease-in-out infinite; animation-delay: 2s; }
    </style>
</head>
<body>
    <div class="card">
        <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 660px 200px, rgba(255,255,255,0.04) 0%, transparent 60%);"></div>
        <svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;inset:0;">
            <defs>
                <pattern id="micro-grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="0.5" fill="rgba(255,255,255,0.03)" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#micro-grid)" />
            <g stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="2 4" fill="none">
                <line x1="0" y1="60" x2="760" y2="60" />
                <line x1="0" y1="140" x2="760" y2="140" />
                <line x1="0" y1="200" x2="760" y2="200" />
                <line x1="0" y1="260" x2="760" y2="260" />
                <line x1="0" y1="340" x2="760" y2="340" />
                <line x1="120" y1="0" x2="120" y2="400" />
                <line x1="300" y1="0" x2="300" y2="400" />
                <line x1="460" y1="0" x2="460" y2="400" />
            </g>
            <g stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none">
                <line x1="120" y1="60" x2="120" y2="120" />
                <line x1="180" y1="280" x2="180" y2="340" />
                <line x1="300" y1="140" x2="300" y2="260" />
                <line x1="400" y1="140" x2="400" y2="260" />
                <line x1="120" y1="120" x2="180" y2="180" />
                <line x1="120" y1="280" x2="180" y2="220" />
            </g>
            <g stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linejoin="miter">
                <path d="M -20 60 H 180 L 260 140 H 400 L 460 200" />
                <path d="M -20 120 H 120 L 180 180 H 300 L 320 200" />
                <path d="M -20 280 H 120 L 180 220 H 300 L 320 200" />
                <path d="M -20 340 H 180 L 260 260 H 400 L 460 200" />
                <line x1="320" y1="200" x2="460" y2="200" stroke-width="1.5" />
                <line x1="460" y1="200" x2="780" y2="200" stroke-width="3" stroke="rgba(255,255,255,0.7)" />
            </g>
            <g stroke-linecap="round" fill="none">
                <path d="M 0 60 H 180 L 260 140 H 400 L 460 200" stroke="rgba(255,255,255,0.9)" stroke-width="3" class="flow-line" />
                <path d="M 0 340 H 180 L 260 260 H 400 L 460 200" stroke="rgba(255,255,255,0.9)" stroke-width="3" class="flow-line-slow" />
                <path d="M 0 120 H 120 L 180 180 H 300 L 320 200" stroke="#E7E70D" stroke-width="3" class="flow-line" />
                <path d="M 0 280 H 120 L 180 220 H 300 L 320 200" stroke="#E7E70D" stroke-width="3" class="flow-line-slow" />
                <path d="M 460 200 H 760" stroke="#E7E70D" stroke-width="4" stroke-dasharray="15 150" class="flow-line" />
            </g>
            <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
                <line x1="480" y1="196" x2="480" y2="204" />
                <line x1="520" y1="196" x2="520" y2="204" />
                <line x1="560" y1="196" x2="560" y2="204" />
                <line x1="600" y1="196" x2="600" y2="204" />
            </g>
            <g stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none">
                <rect x="620" y="140" width="80" height="120" stroke="rgba(255,255,255,0.15)" fill="#2D2D2D" />
                <rect x="630" y="150" width="60" height="100" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2 2" />
                <line x1="660" y1="140" x2="660" y2="160" stroke="rgba(255,255,255,0.4)" />
                <line x1="660" y1="240" x2="660" y2="260" stroke="rgba(255,255,255,0.4)" />
                <path d="M 700 170 H 760 M 700 230 H 760" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="1 3"/>
            </g>
            <g fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5">
                <rect x="116" y="56" width="8" height="8" />
                <rect x="116" y="116" width="8" height="8" />
                <rect x="116" y="276" width="8" height="8" />
                <rect x="116" y="336" width="8" height="8" />
                <rect x="296" y="136" width="8" height="8" />
                <rect x="296" y="256" width="8" height="8" />
            </g>
            <g fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5">
                <circle cx="180" cy="60" r="4.5" />
                <circle cx="180" cy="180" r="4.5" />
                <circle cx="180" cy="220" r="4.5" />
                <circle cx="180" cy="340" r="4.5" />
                <circle cx="400" cy="200" r="5" />
            </g>
            <g fill="#FFFFFF">
                <rect x="256" y="136" width="8" height="8" transform="rotate(45 260 140)" />
                <rect x="256" y="256" width="8" height="8" transform="rotate(45 260 260)" />
                <rect x="316" y="196" width="8" height="8" transform="rotate(45 320 200)" />
                <rect x="396" y="136" width="8" height="8" transform="rotate(45 400 140)" />
                <rect x="396" y="256" width="8" height="8" transform="rotate(45 400 260)" />
            </g>
            <g fill="#FFFFFF">
                <circle cx="220" cy="100" r="2.5" />
                <circle cx="220" cy="300" r="2.5" />
                <circle cx="360" cy="200" r="2.5" />
                <circle cx="430" cy="200" r="2.5" />
            </g>
            <g fill="#E7E70D">
                <rect x="147" y="147" width="6" height="6" transform="rotate(45 150 150)" />
                <rect x="147" y="247" width="6" height="6" transform="rotate(45 150 250)" />
                <circle cx="300" cy="200" r="3.5" />
            </g>
            <g>
                <circle cx="460" cy="200" r="14" fill="#E7E70D" class="pulse-ring" />
                <circle cx="460" cy="200" r="8" fill="#2D2D2D" stroke="#E7E70D" stroke-width="1.5" />
                <circle cx="460" cy="200" r="3" fill="#E7E70D" />
            </g>
            <g>
                <circle cx="660" cy="200" r="24" fill="#E7E70D" class="pulse-ring-delayed" />
                <circle cx="660" cy="200" r="16" fill="#E7E70D" opacity="0.15" />
                <circle cx="660" cy="200" r="12" fill="none" stroke="#E7E70D" stroke-width="1" stroke-dasharray="2 2" />
                <circle cx="660" cy="200" r="5" fill="#E7E70D" />
                <rect x="659" y="193" width="2" height="14" fill="#2D2D2D" />
                <rect x="653" y="199" width="14" height="2" fill="#2D2D2D" />
            </g>
        </svg>
    </div>
</body>
</html>

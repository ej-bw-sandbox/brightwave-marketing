<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund of Funds Illustration</title>
    <style>
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background: radial-gradient(circle at 50% 50%, #353535 0%, #2D2D2D 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        svg { display: block; shape-rendering: geometricPrecision; }
        .pulse-glow {
            animation: pulse-op 4s ease-in-out infinite alternate;
        }
        .flow-line {
            stroke-dasharray: 8 8;
            animation: flow-anim 20s linear infinite;
        }
        @keyframes pulse-op {
            0% { opacity: 0.4; filter: drop-shadow(0 0 2px #E7E70D); }
            100% { opacity: 0.9; filter: drop-shadow(0 0 6px #E7E70D); }
        }
        @keyframes flow-anim {
            from { stroke-dashoffset: 400; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <rect id="node-outer" x="-6" y="-6" width="12" height="12" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5"/>
                <polygon id="node-middle" points="0,-7 7,0 0,7 -7,0" fill="#FFFFFF"/>
                <circle id="node-inner" r="3.5" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="1.5"/>
                <g id="junction">
                    <circle r="4" fill="#E7E70D" opacity="0.25"/>
                    <circle r="2" fill="#E7E70D"/>
                </g>
                <filter id="yellow-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
            </defs>
            <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
                <line x1="0" y1="40" x2="760" y2="40" />
                <line x1="0" y1="90" x2="760" y2="90" />
                <line x1="0" y1="100" x2="760" y2="100" />
                <line x1="0" y1="130" x2="760" y2="130" />
                <line x1="0" y1="150" x2="760" y2="150" />
                <line x1="0" y1="200" x2="760" y2="200" />
                <line x1="0" y1="250" x2="760" y2="250" />
                <line x1="0" y1="270" x2="760" y2="270" />
                <line x1="0" y1="300" x2="760" y2="300" />
                <line x1="0" y1="310" x2="760" y2="310" />
                <line x1="0" y1="360" x2="760" y2="360" />
                <line x1="90" y1="0" x2="90" y2="400" />
                <line x1="160" y1="0" x2="160" y2="400" />
                <line x1="220" y1="0" x2="220" y2="400" />
                <line x1="260" y1="0" x2="260" y2="400" />
                <line x1="330" y1="0" x2="330" y2="400" />
                <line x1="380" y1="0" x2="380" y2="400" />
                <line x1="430" y1="0" x2="430" y2="400" />
                <line x1="500" y1="0" x2="500" y2="400" />
                <line x1="540" y1="0" x2="540" y2="400" />
                <line x1="600" y1="0" x2="600" y2="400" />
                <line x1="670" y1="0" x2="670" y2="400" />
            </g>
            <g stroke="#ffffff" stroke-width="1" opacity="0.15">
                <path d="M 85 100 h 10 M 90 95 v 10" />
                <path d="M 85 300 h 10 M 90 295 v 10" />
                <path d="M 665 100 h 10 M 670 95 v 10" />
                <path d="M 665 300 h 10 M 670 295 v 10" />
                <path d="M 155 200 h 10 M 160 195 v 10" />
                <path d="M 595 200 h 10 M 600 195 v 10" />
            </g>
            <polygon points="340,60 420,60 560,160 560,240 420,340 340,340 200,240 200,160"
                     fill="rgba(255,255,255,0.015)"
                     stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4 4" />
            <polygon points="360,130 400,130 450,180 450,220 400,270 360,270 310,220 310,180"
                     fill="rgba(255,255,255,0.025)"
                     stroke="rgba(255,255,255,0.15)" stroke-width="1" />
            <g fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
                <path d="M 160 100 L 260 100 L 260 130" />
                <path d="M 90 200 L 90 130 L 260 130" />
                <path d="M 260 130 L 330 130 L 330 200" />
                <path d="M 260 130 L 380 130 L 380 150" />
                <path d="M 160 300 L 260 300 L 260 270" />
                <path d="M 90 200 L 90 270 L 260 270" />
                <path d="M 260 270 L 380 270 L 380 250" />
                <path d="M 260 270 L 330 270 L 330 200" />
                <path d="M 380 40 L 340 40 L 340 90 L 380 90" />
                <path d="M 380 90 L 410 90 L 410 150 L 380 150" />
                <path d="M 380 360 L 420 360 L 420 310 L 380 310" />
                <path d="M 380 310 L 350 310 L 350 250 L 380 250" />
                <path d="M 600 100 L 500 100 L 500 130" />
                <path d="M 670 200 L 670 130 L 500 130" />
                <path d="M 500 130 L 380 130" />
                <path d="M 600 300 L 500 300 L 500 270" />
                <path d="M 670 200 L 670 270 L 500 270" />
                <path d="M 500 270 L 380 270" />
                <path d="M 500 270 L 430 270 L 430 200" />
                <path d="M 670 200 L 540 200 L 540 230 L 430 230 L 430 200" />
                <path d="M 90 200 L 220 200 L 220 170 L 330 170 L 330 200" />
                <path d="M 380 150 L 380 200" />
                <path d="M 430 200 L 380 200" />
                <path d="M 380 250 L 380 200" />
                <path d="M 330 200 L 380 200" />
            </g>
            <g fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8">
                <path d="M 600 100 L 500 100 L 500 130 L 500 200 L 430 200" />
                <path class="flow-line" d="M 600 100 L 500 100 L 500 130 L 500 200 L 430 200" stroke="#E7E70D" stroke-width="2"/>
                <path d="M 160 300 L 260 300 L 260 270 L 330 270 L 330 200" />
                <path class="flow-line" d="M 160 300 L 260 300 L 260 270 L 330 270 L 330 200" stroke="#E7E70D" stroke-width="2"/>
                <path d="M 380 40 L 340 40 L 340 90 L 380 90 L 410 90 L 410 150 L 380 150" />
            </g>
            <g id="outer-nodes">
                <use href="#node-outer" x="380" y="40" />
                <use href="#node-outer" x="600" y="100" />
                <use href="#node-outer" x="670" y="200" />
                <use href="#node-outer" x="600" y="300" />
                <use href="#node-outer" x="380" y="360" />
                <use href="#node-outer" x="160" y="300" />
                <use href="#node-outer" x="90" y="200" />
                <use href="#node-outer" x="160" y="100" />
            </g>
            <g id="middle-nodes">
                <use href="#node-middle" x="380" y="90" />
                <use href="#node-middle" x="500" y="130" />
                <use href="#node-middle" x="540" y="200" />
                <use href="#node-middle" x="500" y="270" />
                <use href="#node-middle" x="380" y="310" />
                <use href="#node-middle" x="260" y="270" />
                <use href="#node-middle" x="220" y="200" />
                <use href="#node-middle" x="260" y="130" />
            </g>
            <g id="inner-nodes">
                <use href="#node-inner" x="380" y="150" />
                <use href="#node-inner" x="430" y="200" />
                <use href="#node-inner" x="380" y="250" />
                <use href="#node-inner" x="330" y="200" />
            </g>
            <g filter="url(#yellow-glow)">
                <use href="#junction" x="260" y="100" />
                <use href="#junction" x="90" y="130" />
                <use href="#junction" x="260" y="300" />
                <use href="#junction" x="90" y="270" />
                <use href="#junction" x="340" y="40" />
                <use href="#junction" x="340" y="90" />
                <use href="#junction" x="500" y="100" />
                <use href="#junction" x="670" y="130" />
                <use href="#junction" x="500" y="300" />
                <use href="#junction" x="670" y="270" />
                <use href="#junction" x="420" y="360" />
                <use href="#junction" x="420" y="310" />
                <use href="#junction" x="410" y="90" />
                <use href="#junction" x="410" y="150" />
                <use href="#junction" x="380" y="130" />
                <use href="#junction" x="500" y="200" />
                <use href="#junction" x="540" y="230" />
                <use href="#junction" x="430" y="230" />
                <use href="#junction" x="430" y="270" />
                <use href="#junction" x="380" y="270" />
                <use href="#junction" x="350" y="310" />
                <use href="#junction" x="350" y="250" />
                <use href="#junction" x="330" y="270" />
                <use href="#junction" x="220" y="170" />
                <use href="#junction" x="330" y="170" />
                <use href="#junction" x="330" y="130" />
            </g>
            <g id="core-hub">
                <circle cx="380" cy="200" r="14" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="2 3" />
                <circle cx="380" cy="200" r="9" fill="none" class="pulse-glow" stroke="#FFFFFF" stroke-width="1.5" />
                <circle cx="380" cy="200" r="5" fill="#FFFFFF" />
            </g>
            <circle cx="50" cy="130" r="1.5" fill="#FFFFFF" opacity="0.3"/>
            <line x1="50" y1="130" x2="60" y2="130" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
            <circle cx="710" cy="270" r="1.5" fill="#FFFFFF" opacity="0.3"/>
            <line x1="700" y1="270" x2="710" y2="270" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
            <circle cx="430" cy="90" r="1.5" fill="#E7E70D" opacity="0.6"/>
            <circle cx="330" cy="310" r="1.5" fill="#E7E70D" opacity="0.6"/>
        </svg>
    </div>
</body>
</html>

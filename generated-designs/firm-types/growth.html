<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Equity Illustration</title>
    <style>
        body {
            background-color: #111111;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div style="width:760px;height:400px;background:#2D2D2D;position:relative;box-shadow:0 20px 50px rgba(0,0,0,0.5);border-radius:2px;overflow:hidden;">
        <svg viewBox="0 0 760 400" width="760" height="400" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
            <defs>
                <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.5" fill="rgba(255, 255, 255, 0.04)" />
                </pattern>
                <filter id="accentGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="softGlow">
                    <feGaussianBlur stdDeviation="1.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotGrid)" />
            <g stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" fill="none">
                <line x1="180" y1="0" x2="180" y2="400" />
                <line x1="340" y1="0" x2="340" y2="400" />
                <line x1="520" y1="0" x2="520" y2="400" />
                <line x1="0" y1="340" x2="760" y2="340" />
                <line x1="0" y1="220" x2="760" y2="220" />
                <line x1="0" y1="140" x2="760" y2="140" />
            </g>
            <g stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" fill="none">
                <path d="M 0 370 L 100 370 L 220 250 L 300 250 L 400 150 L 560 150 L 630 80 L 760 80" />
                <path d="M 180 340 L 180 400" />
                <path d="M 340 220 L 340 300 L 420 300 L 490 230" />
                <path d="M 520 140 L 520 50 L 650 50 L 760 50" stroke-dasharray="2 4" />
                <path d="M 80 200 L 140 200 L 180 160 L 250 160" />
            </g>
            <g stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" stroke-dasharray="5 7" fill="none">
                <path d="M -20 355 L 75 355 L 195 235 L 355 235 L 535 155 L 695 95 L 780 95" />
            </g>
            <g stroke="rgba(255, 255, 255, 0.85)" stroke-width="2" fill="none">
                <path d="M -10 340 L 60 340" />
                <path d="M 60 340 L 120 340 L 180 280" />
                <path d="M 180 280 L 280 280 L 340 220" />
                <path d="M 340 220 L 440 220 L 520 140" />
                <path d="M 520 140 L 620 140 L 680 80" />
                <path d="M 680 80 L 780 80" />
            </g>
            <g stroke="rgba(255, 255, 255, 0.6)" stroke-width="1" fill="none">
                <path d="M 60 340 L 60 280 L 100 280" />
                <path d="M 280 280 L 280 320 L 380 320 L 420 280" />
                <path d="M 440 220 L 440 100 L 500 100" />
            </g>
            <g fill="#E7E70D" filter="url(#accentGlow)">
                <circle cx="120" cy="340" r="3.5" />
                <circle cx="280" cy="280" r="3.5" />
                <circle cx="440" cy="220" r="3.5" />
                <circle cx="620" cy="140" r="4.5" />
                <rect x="58.5" y="278.5" width="3" height="3" />
                <circle cx="100" cy="280" r="2" />
                <circle cx="420" cy="280" r="2.5" />
                <rect x="498" y="98" width="4" height="4" />
                <circle cx="650" cy="50" r="2" />
            </g>
            <g fill="#E7E70D" filter="url(#softGlow)" opacity="0.6">
                <circle cx="35" cy="355" r="1.5" />
                <circle cx="240" cy="235" r="1.5" />
                <circle cx="600" cy="155" r="1.5" />
                <circle cx="730" cy="95" r="1.5" />
            </g>
            <g fill="#2D2D2D">
                 <circle cx="520" cy="140" r="6" />
                 <rect x="668" y="68" width="24" height="24" />
            </g>
            <g fill="#FFFFFF">
                <circle cx="60" cy="340" r="4.5" />
                <path d="M 50 340 A 10 10 0 0 1 70 340" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.4"/>
                <rect x="174" y="274" width="12" height="12" />
                <path d="M 168 270 L 168 268 L 170 268" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
                <path d="M 190 292 L 192 292 L 192 290" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
                <polygon points="340,204 356,220 340,236 324,220" />
                <circle cx="340" cy="220" r="2.5" fill="#2D2D2D" />
                <circle cx="520" cy="140" r="10" />
                <circle cx="520" cy="140" r="4" fill="#2D2D2D" />
                <circle cx="520" cy="140" r="1.5" fill="#FFFFFF" />
                <circle cx="520" cy="140" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="3 4"/>
                <circle cx="520" cy="140" r="26" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                <rect x="662" y="62" width="36" height="36" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
                <rect x="666" y="66" width="28" height="28" fill="none" stroke="#FFFFFF" stroke-width="2" />
                <polygon points="680,68 692,80 680,92 668,80" />
                <path d="M 700 70 L 715 70" stroke="#FFFFFF" stroke-width="2" fill="none" />
                <path d="M 725 70 L 735 70" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
                <path d="M 700 90 L 720 90" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.8"/>
            </g>
        </svg>
    </div>
</body>
</html>

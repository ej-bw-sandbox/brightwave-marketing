<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Management Illustration</title>
    <style>
        body {
            background-color: #0f1115;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            shape-rendering: geometricPrecision;
            border-radius: 2px;
            flex-shrink: 0;
        }
        @keyframes subtlePulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .pulse-node { transform-origin: center; animation: subtlePulse 4s infinite ease-in-out; }
        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .rotate-ring { transform-origin: 380px 200px; animation: slowRotate 120s linear infinite; }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="yellow-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <polygon id="diamond-node" points="0,-6 6,0 0,6 -6,0" fill="none" stroke="#fff" stroke-width="1.5" />
            </defs>
            <g stroke="rgba(255, 255, 255, 0.04)" stroke-width="1">
                <line x1="80" y1="0" x2="80" y2="400" />
                <line x1="680" y1="0" x2="680" y2="400" />
                <line x1="0" y1="50" x2="760" y2="50" />
                <line x1="0" y1="350" x2="760" y2="350" />
                <line x1="380" y1="0" x2="380" y2="20" />
                <line x1="380" y1="380" x2="380" y2="400" />
                <line x1="0" y1="200" x2="20" y2="200" />
                <line x1="740" y1="200" x2="760" y2="200" />
            </g>
            <g fill="none" stroke-width="1">
                <circle cx="380" cy="200" r="240" stroke="rgba(255, 255, 255, 0.06)" />
                <circle cx="380" cy="200" r="160" stroke="rgba(255, 255, 255, 0.12)" stroke-dasharray="4 8" class="rotate-ring" />
                <circle cx="380" cy="200" r="85" stroke="rgba(255, 255, 255, 0.08)" />
            </g>
            <g fill="none" stroke-width="1.5" stroke="rgba(255, 255, 255, 0.5)">
                <path d="M380,200 L440,200 L560,80 L620,80" />
                <line x1="380" y1="200" x2="600" y2="300" />
                <line x1="380" y1="200" x2="660" y2="200" stroke="rgba(255, 255, 255, 0.25)" stroke-dasharray="2 4" />
                <path d="M380,200 L240,200 L120,200 L80,160" />
                <path d="M380,200 L300,200 L200,320" />
                <line x1="380" y1="200" x2="220" y2="80" />
            </g>
            <g fill="none" stroke-width="1" stroke="rgba(255, 255, 255, 0.15)">
                <line x1="560" y1="80" x2="600" y2="300" stroke-dasharray="3 3"/>
                <line x1="220" y1="80" x2="120" y2="200" />
                <line x1="200" y1="320" x2="120" y2="200" stroke-dasharray="2 4" />
                <line x1="440" y1="200" x2="480" y2="280" />
                <line x1="240" y1="200" x2="300" y2="100" />
            </g>
            <g transform="translate(560, 80)">
                <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#fff" stroke-width="1.5" transform="rotate(45)" />
                <circle cx="0" cy="0" r="3" fill="#fff" />
            </g>
            <circle cx="620" cy="80" r="4" fill="none" stroke="#fff" stroke-width="1.5" />
            <line x1="624" y1="80" x2="634" y2="80" stroke="#fff" stroke-width="1" stroke-opacity="0.5" />
            <g transform="translate(600, 300)">
                <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="1.5" />
                <circle cx="0" cy="0" r="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1" />
                <circle cx="0" cy="0" r="2" fill="#E7E70D" />
            </g>
            <use href="#diamond-node" x="480" y="280" />
            <rect x="657" y="197" width="6" height="6" fill="#fff" />
            <circle cx="530" cy="200" r="3" fill="none" stroke="#fff" stroke-width="1" />
            <g transform="translate(120, 200)">
                <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#fff" stroke-width="1.5" />
                <circle cx="0" cy="0" r="4" fill="#fff" />
                <line x1="-15" y1="0" x2="15" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <line x1="0" y1="-15" x2="0" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            </g>
            <use href="#diamond-node" x="80" y="160" />
            <g transform="translate(200, 320)">
                <circle cx="0" cy="0" r="8" fill="none" stroke="#fff" stroke-width="1.5" />
                <circle cx="0" cy="0" r="3" fill="#fff" />
            </g>
            <g transform="translate(220, 80)">
                <polygon points="0,-12 12,0 0,12 -12,0" fill="none" stroke="#fff" stroke-width="1" />
                <rect x="-4" y="-4" width="8" height="8" fill="#fff" />
            </g>
            <circle cx="300" cy="100" r="4" fill="none" stroke="#fff" stroke-width="1.5" />
            <g fill="#E7E70D" filter="url(#yellow-glow)" class="pulse-node">
                <circle cx="440" cy="200" r="3.5" />
                <circle cx="240" cy="200" r="3.5" />
                <circle cx="300" cy="200" r="3.5" />
                <circle cx="380" cy="40" r="2.5" />
                <circle cx="380" cy="115" r="2.5" />
                <circle cx="500" cy="80" r="2.5" />
            </g>
            <g fill="#E7E70D">
                <rect x="598" y="298" width="4" height="4" />
                <circle cx="160" cy="320" r="2" />
                <circle cx="680" cy="100" r="2" />
            </g>
            <g transform="translate(380, 200)">
                <circle cx="0" cy="0" r="42" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" />
                <path d="M0,-46 L0,-38 M0,38 L0,46 M-46,0 L-38,0 M38,0 L46,0" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1" />
                <path d="M-30,-30 L-25,-25 M30,-30 L25,-25 M-30,30 L-25,25 M30,30 L25,25" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
                <polygon points="0,-24 24,0 0,24 -24,0" fill="rgba(45, 45, 45, 0.8)" stroke="#fff" stroke-width="1.5" />
                <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1" transform="rotate(45)" />
                <circle cx="0" cy="0" r="8" fill="#fff" />
                <circle cx="0" cy="0" r="3" fill="#E7E70D" filter="url(#yellow-glow)" />
            </g>
        </svg>
    </div>
</body>
</html>

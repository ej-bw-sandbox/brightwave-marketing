<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Large-Cap Fund Illustration</title>
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: auto;
        }
        .illustration-card {
            width: 760px;
            height: 400px;
            background-color: #2D2D2D;
            position: relative;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
        }
        @keyframes subtlePulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .node-pulse { animation: subtlePulse 4s ease-in-out infinite; transform-origin: center; }
        .node-pulse-delayed { animation: subtlePulse 5s ease-in-out infinite 2s; transform-origin: center; }
        @keyframes flowData { to { stroke-dashoffset: -40; } }
        .data-stream { stroke-dasharray: 8 8; animation: flowData 3s linear infinite; }
    </style>
</head>
<body>
    <div class="illustration-card">
        <svg viewBox="0 0 760 400" width="760" height="400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.06)" />
                </pattern>
                <pattern id="diagonalHatch" width="8" height="8" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
                </pattern>
                <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotGrid)" />
            <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
                <line x1="0" y1="100" x2="760" y2="100" />
                <line x1="0" y1="200" x2="760" y2="200" />
                <line x1="0" y1="300" x2="760" y2="300" />
                <line x1="190" y1="0" x2="190" y2="400" />
                <line x1="380" y1="0" x2="380" y2="400" />
                <line x1="570" y1="0" x2="570" y2="400" />
            </g>
            <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none">
                <path d="M 180 200 V 80 H 60" />
                <path d="M 180 200 V 320 H 120 L 80 280" />
                <path d="M 240 140 L 320 60 H 440" />
                <path d="M 380 0 V 100" />
                <path d="M 380 300 V 400" />
                <path d="M 320 260 L 260 320 H 160" />
                <path d="M 580 200 L 660 120 V 60" />
                <path d="M 580 200 V 320 H 680" />
                <path d="M 500 280 L 440 340 H 360" />
            </g>
            <g stroke="#ffffff" fill="none">
                <path d="M 0 200 H 100" stroke-width="1" stroke="rgba(255,255,255,0.4)" />
                <path d="M 100 200 H 260" stroke-width="3" />
                <path d="M 260 200 H 500" stroke-width="4" stroke="url(#diagonalHatch)" />
                <path d="M 260 198 H 500" stroke-width="1" />
                <path d="M 260 202 H 500" stroke-width="1" />
                <path d="M 500 200 H 660" stroke-width="3" />
                <path d="M 660 200 H 760" stroke-width="1" stroke="rgba(255,255,255,0.4)" />
                <path d="M 440 140 L 520 60 H 640" stroke-width="2" class="data-stream" />
                <path d="M 320 260 L 240 340 H 140" stroke-width="2" />
            </g>
            <g transform="translate(180, 200)">
                <circle cx="0" cy="0" r="80" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" class="node-pulse" />
                <circle cx="0" cy="0" r="60" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="6 6" fill="none" />
                <rect x="-30" y="-30" width="60" height="60" fill="url(#diagonalHatch)" stroke="#ffffff" stroke-width="1" transform="rotate(22.5)" />
                <circle cx="0" cy="0" r="24" fill="#ffffff" />
                <circle cx="-60" cy="0" r="4" fill="#ffffff" />
                <circle cx="0" cy="-60" r="4" fill="#ffffff" />
            </g>
            <g transform="translate(380, 200)">
                <rect x="-70" y="-70" width="140" height="140" stroke="#ffffff" stroke-width="2" fill="rgba(255,255,255,0.03)" />
                <path d="M -70 -50 V -70 H -50 M 70 -50 V -70 H 50 M -70 50 V 70 H -50 M 70 50 V 70 H 50" stroke="#ffffff" stroke-width="4" fill="none" />
                <rect x="-45" y="-45" width="90" height="90" fill="#ffffff" />
                <rect x="-25" y="-25" width="50" height="50" fill="#2D2D2D" />
                <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="2" />
            </g>
            <g transform="translate(580, 200)">
                <polygon points="0,-80 80,0 0,80 -80,0" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-dasharray="10 4" />
                <polygon points="0,-50 50,0 0,50 -50,0" fill="rgba(255,255,255,0.1)" stroke="#ffffff" stroke-width="1" />
                <rect x="-24" y="-24" width="48" height="48" fill="#ffffff" transform="rotate(45)" class="node-pulse-delayed" />
                <line x1="-90" y1="0" x2="90" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
                <line x1="0" y1="-90" x2="0" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            </g>
            <g fill="#ffffff">
                <rect x="55" y="75" width="10" height="10" />
                <circle cx="120" cy="120" r="6" />
                <polygon points="80,270 85,280 75,280" />
                <circle cx="320" cy="60" r="8" fill="none" stroke="#ffffff" stroke-width="2" />
                <circle cx="320" cy="60" r="2" />
                <rect x="436" y="56" width="8" height="8" />
                <rect x="256" y="316" width="8" height="8" />
                <circle cx="360" cy="340" r="5" />
                <polygon points="660,115 665,125 655,125" />
                <rect x="676" y="316" width="8" height="8" fill="none" stroke="#ffffff" stroke-width="1.5" />
            </g>
            <g fill="#E7E70D" filter="url(#yellowGlow)">
                <circle cx="180" cy="120" r="5" />
                <circle cx="180" cy="280" r="5" />
                <circle cx="240" cy="140" r="4.5" />
                <rect x="306" y="126" width="10" height="10" />
                <rect x="444" y="264" width="10" height="10" />
                <circle cx="380" cy="200" r="6" />
                <circle cx="380" cy="100" r="5" />
                <circle cx="380" cy="300" r="5" />
                <circle cx="580" cy="120" r="5" />
                <circle cx="520" cy="60" r="4.5" />
                <circle cx="500" cy="280" r="4.5" />
                <circle cx="100" cy="200" r="4" />
                <circle cx="660" cy="200" r="4" />
                <circle cx="640" cy="60" r="4" />
                <circle cx="160" cy="320" r="4" />
            </g>
            <g stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none">
                <path d="M 20 40 V 20 H 40" />
                <path d="M 740 40 V 20 H 720" />
                <path d="M 20 360 V 380 H 40" />
                <path d="M 740 360 V 380 H 720" />
            </g>
        </svg>
    </div>
</body>
</html>
